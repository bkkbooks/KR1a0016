body:
  text: 伊川易傳卷二宋程子撰周易上經艮下坤上謙序卦有大者不可以盈故受之以謙其有既大不可至於盈滿必在謙損故大有之後受之以謙也為卦坤上艮下地中有山也地體卑下山髙大之物而居地之下謙之象也以崇髙之徳而處卑之下謙之義也謙亨君子有終謙有亨之道也有其徳而不居謂之謙人以謙㢲自處何徃而不亨乎君子有終君子志存乎謙巽達理故樂天而不競内充故退讓而不矜安履乎讓終身不易自卑而人益尊之自晦而徳益光顯此所謂君子有終也在小人則有欲必競有徳必伐雖使勉慕於謙亦不能安行而固守不能有終也彖曰謙亨天道下濟而光明地道卑而上行濟當為際此明謙而能亨之義天之道以其氣下際故能化育萬物其道光明下際謂下交也地之道以其處卑所以其氣上行交於天皆以卑降而亨也天道虧盈而益謙以天行而言盈者則虧謙者則益日月隂陽是也地道變盈而流謙以地勢而言盈滿者傾變而反䧟卑下者流注而益增也鬼神害盈而福謙鬼神謂造化之跡盈滿者禍害之謙損者福祐之凡過而損不足而益者皆是也人道惡盈而好謙人情疾惡於盈滿而好與於謙巽也謙者人之至徳故聖人詳言所以戒盈而勸謙也謙尊而光卑而不可踰君子之終也謙為卑巽也而其道尊大而光顯自處雖卑屈而其徳實高不可加尚是不可踰也君子至誠於謙恒而不變有終也故尊光象曰地中有山謙君子以裒多益寡稱物平施地體卑下山之高大而在地中外卑下而内藴髙大之象故為謙也不云山在地中而曰地中有山言卑下之中藴其崇高也若言崇高藴於卑下之中則文理不順諸象皆然觀文可見君子以裒多益寡稱物平施君子觀謙之象山而在地下是高者下之卑者上之見抑高舉下損過益不及之義以施於事則裒取多者增益寡者稱物之多寡以均其施與使得其平也初六謙謙君子用涉大川吉初六以柔順處謙又居一卦之下為自處卑下之至謙而又謙也故曰謙謙能如是者君子也自處至謙衆所共與也雖用渉險難亦无患害况居平易乎何所不吉也初處謙而以柔居下得无過於謙乎曰柔居下乃其常也但見其謙之至故為謙謙未見其失也象曰謙謙君子卑以自牧也謙謙謙之至也謂君子以謙卑之道自牧也自牧自處也詩云自牧歸荑六二鳴謙貞吉二以柔順居中是為謙徳積於中謙徳充積於中故發於外見於聲音顔色故曰鳴謙居中得正有中正之徳也故云貞吉凡貞吉有為貞且吉者有為得貞則吉者六二之貞吉所自有也象曰鳴謙貞吉中心得也二之謙徳由至誠積於中所以發於聲音中心所自得也非勉為之也九三勞謙君子有終吉三以陽剛之徳而居下體為衆隂所宗履得其位為下之上是上為君所任下為衆所從有功勞而持謙徳者也故曰勞謙古之人有當之者周公是也身當天下之大任上奉幼弱之主謙恭自牧夔夔如畏然可謂有勞而能謙矣既能勞謙又須君子行之有終則吉夫樂高喜勝人之常情平時能謙固已鮮矣况有功勞可尊乎雖使知謙之善勉而為之若矜負之心不忘則不能常久欲其有終不可得也唯君子安履謙順乃其常行故久而不變乃所謂有終有終則吉也九三以剛居正能終者也此爻之徳最盛故象辭特重象曰勞謙君子萬民服也能勞謙之君子萬民所尊服也繫辭云勞而不伐有功而不徳厚之至也語以其功下人者也徳言盛禮言恭謙也者致恭以存其位者也有勞而不自矜伐有功而不自以為徳是其徳𢎞厚之至也言以其功勞而自謙以下於人也徳言盛禮言恭以其徳言之則至盛以其自處之禮言之則至恭此所謂謙也夫謙也者謂致恭以存其位者也存守也致其恭巽以守其位故高而不危滿而不溢是以能終吉也夫君子履謙乃其常行非為保其位而為之也而言存其位者盖能致恭所以能存其位言謙之道如此如言為善有令名君子豈為令名而為善也哉亦言其令名者為善之故也六四无不利撝謙四居上體切近君位六五之君又以謙柔自處九三又有大功徳為上所任衆所宗而已居其上當恭畏以奉謙徳之君卑巽以讓勞謙之臣動作施為无所不利於撝謙也撝施布之象如人手之撝也動息進退必施其謙盖居多懼之地又在賢臣之上故也象曰无不利撝謙不違則也凡人之謙有所宜施不可過其宜也如六五或用侵伐是也唯四以處近君之地據勞臣之上故凡所動作靡不利於施謙如是然後中於法則故曰不違則也謂得其宜也六五不富以其鄰利用侵伐无不利富者衆之所歸唯財為能聚人五以君位之尊而執謙順以接於下衆所歸也故不富而能有其鄰也鄰近也不富而得人之親也為人君而持謙順天下所歸心也然君道不可專尚謙柔必須威武相濟然後能懐服天下故利用行侵伐也威徳並著然後盡君道之宜而无所不利也葢五之謙柔當防於過故發此義象曰利用侵伐征不服也征其文徳謙巽所不能服者也文徳所不能服而不用威武何以平治天下非人君之中道謙之過也上六鳴謙利用行師征邑國六以柔處柔順之極又處謙之極極乎謙者也以極謙而反居高未得遂其謙之志故至發於聲音又柔處謙之極亦必見於聲色故曰鳴謙雖居无位之地非任天下之事然人之行己必須剛柔相濟上謙之極也至於太甚則反為過矣故利在以剛武自治邑國己之私有行師謂用剛武征邑國謂自治其私象曰鳴謙志未得也可用行師征邑國也謙極而居上欲謙之志未得故不勝其切至於鳴也雖不當位謙既過極宜以剛武自治其私故云利用行師征邑國也坤下震上豫序卦有大而能謙必豫故受之以豫承二卦之義而為次也有既大而能謙則有豫樂也豫者安和恱樂之義為卦震上坤下順動之象動而和順是以豫也九四為動之主上下羣隂所共應也坤又承之以順是以動而上下順應故為和豫之義以二象言之雷出於地上陽始潛閉於地中及其動而出地奮發其聲通暢和豫故為豫也豫利建侯行師豫順而動也豫之義所利在於建侯行師夫建侯樹屏所以共安天下諸侯和順則萬民悦服兵師之興衆心和恱則順從而有功故悦豫之道利於建侯行師也又上動而下順諸侯從王師衆順令之象君萬邦聚大衆非和悅不能使之服從也彖曰豫剛應而志行順以動豫剛應謂四為羣隂所應剛得衆應也志行謂陽志上行動而上下順從其志得行也順以動豫震動而坤順為動而順理順理而動又為動而衆順所以豫也豫順以動故天地如之而况建侯行師乎以豫順而動則天地如之而弗違况建侯行師豈有不順乎天地之道萬物之理唯至順而已大人所以先天後天而不違者亦順乎理而已天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服復詳言順動之道天地之運以其順動所以日月之度不過差四時之行不愆忒聖人以順動故經正而民興於善刑罸清簡而萬民服也豫之時義大矣哉既言豫順之道矣然其㫖味淵永言盡而意有餘也故復贊之云豫之時義大矣哉欲人研味其理優柔涵泳而識之也時義謂豫之時義諸卦之時與義用大者皆贊其大矣哉豫以下十一卦是也豫遯姤旅言時義坎睽蹇言時用頤大過解革言時各以其大者也象曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考雷者陽氣奮發隂陽相薄而成聲也陽始潛閉地中及其動則出地奮震也始閉鬱及奮發則通暢和豫故為豫也坤順震發和順積中而發於聲樂之象也先王觀雷出地而奮和暢發於聲之象作樂樂以褒崇功徳其殷盛至於薦之上帝推配之以祖考殷盛也禮有殷奠謂盛也薦上帝配祖考盛之至也初六鳴豫凶初六以隂柔居下四豫之主也而應之是不中正之小人處豫而為上所寵其志意滿極不勝其豫至發於聲音輕淺如是必至於凶也鳴發於聲也象曰初六鳴豫志窮凶也云初六謂其以隂柔處下而志意窮極不勝其豫至於鳴也必驕肆而致凶矣六二介于石不終日貞吉逸豫之道放則失正故豫之諸爻多不得正才與時合也唯六二一爻處中正又无應為自守之象當豫之時獨能以中正自守可謂特立之操是其節介如石之堅也介于石其介如石也人之於豫樂心恱之故遲遲遂至於耽戀不能已也二以中正自守其介如石其去之速不俟終日故貞正而吉也處豫不可安且久也久則溺矣如二可謂見幾而作者也夫子因二之見幾而極言知幾之道曰知幾其神乎君子上交不謟下交不瀆其知幾乎幾者動之㣲吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知㣲知彰知柔知剛萬夫之望夫見事之幾㣲者其神妙矣乎君子上交不至於謟下交不至於瀆者蓋知幾也不知幾則至於過而不已交於上以恭巽故過則為謟交於下以和易故過則為瀆君子見於幾㣲故不至於過也所謂幾者始動之㣲也吉凶之端可先見而未著者也獨言吉者見之於先豈復至有凶也君子明哲見事之幾㣲故能其介如石其守既堅則不惑而明見幾而動豈俟終日也斷别也其判别可見矣㣲與彰柔與剛相對者也君子見㣲則知彰矣見柔則知剛矣知幾如是衆所仰也故贊之曰萬夫之望象曰不終日貞吉以中正也能不終日而貞且吉者以有中正之徳也中正故其守堅而能辨之早去之速爻言六二處豫之道為教之意深矣六三盱豫悔遲有悔六三隂而居陽不中不正之人也以不中正而處豫動皆有悔盱上視也上瞻望於四則以不中正不為四所取故有悔也四豫之主與之切近苟遲遲而不前則見棄絶亦有悔也葢處身不正進退皆有悔吝當如之何在正身而已君子處已有道以禮制心雖處豫時不失中正故无悔也象曰盱豫有悔位不當也自處不當失中正也是以進退有悔九四由豫大有得勿疑朋盍簪豫之所以為豫者由九四也為動之主動而衆隂悦順為豫之義四大臣之位六五之君順從之以陽剛而任上之事豫之所由也故云由豫大有得言得大行其志以致天下之豫也勿疑朋盍簪四居大臣之位承柔弱之君而當天下之任危疑之地也獨當上之倚任而下无同徳之助所以疑也唯當盡其至誠勿有疑慮則朋類自當盍聚夫欲上下之信唯至誠而已苟盡其至誠則何患乎其无助也簪聚也簪之名簪取聚髮也或曰卦唯一陽安得同徳之助曰居上位而至誠求助理必得之姤之九五曰有隕自天是也四以陽剛迫近君位而專主乎豫聖人宜為之戒而不然者豫和順之道也由和順之道不失為臣之正也如此而專主於豫乃是任天下之事而致時於豫者也故唯戒以至誠勿疑象曰由豫大有得志大行也由已而致天下於樂豫故為大有得謂其志得大行也六五貞疾恒不死六五以隂柔居君位當豫之時沈溺於豫不能自立者也權之所主衆之所歸皆在於四四之陽剛得衆非躭惑柔弱之君所能制也乃柔弱不能自立之君受制於専權之臣也居得君位貞也受制於下有疾苦也六居尊位權雖失而位未亡也故云貞疾恒不死言貞而有疾常疾而不死如漢魏末世之君也人君致危亡之道非一而以豫為多在四不言失正而於五乃見其强逼者四本无失故於四言大臣任天下之事之義於五則言柔弱居尊不能自立威權去己之義各據爻以取義故不同也若五不失君道而四主於豫乃是任得其人安享其功如太甲成王也蒙亦以隂居尊位二以陽為蒙之主然彼吉而此疾者時不同也童蒙而資之於人宜也躭豫而失之於人危亡之道也故蒙相應則􅀝任者也豫相逼則失權者也又上下之心專歸於四也象曰六五貞疾乗剛也恒不死中未亡也貞而疾由乗剛為剛所逼也恒不死中之尊位未亡也上六㝠豫成有渝无咎上六隂柔非有中正之徳以隂居上不正也而當豫極之時以君子居斯時亦當戒懼况隂柔乎乃躭肆於豫昏迷不知反者也在豫之終故為昏㝠已成也若能有渝變則可以无咎矣在豫之終有變之義人之失苟能自變皆可以无咎故㝠豫雖已成能變則善也聖人發此義所以勸遷善也故更不言㝠之凶專言渝之无咎象曰㝠豫在上何可長也昏㝠於豫至於終極災咎行及矣其可長然乎當速渝也震下兊上隨序卦豫必有隨故受之以隨夫悦豫之道物所随也隨所以次豫也為卦兊上震下兌為説震為動説而動動而說皆隨之義女隨人者也以少女從長男隨之義也又震為雷兌為澤雷震於澤中澤随而動隨之象也又以卦變言之乾之上來居坤之下坤之初徃居乾之上陽來下於隂也以陽下隂隂必説随為隨之義凡成卦既取二體之義又有取爻義者復有更取卦變之義者如隨之取義尤為詳備隨元亨利貞无咎隨之道可以致大亨也君子之道為衆所隨與己随於人及臨事擇所隨皆隨也随得其道則可以致大亨也凡人君之從善臣下之奉命學者之徙義臨事而從長皆隨也隨之道利在於貞正隨得其正然後能大亨而无咎失其正則有咎矣豈能亨乎彖曰隨剛來而下柔動而說隨大亨貞无咎而天下隨時卦所以為随以剛來而下柔動而説也謂乾之上九來居坤之下坤之初六徃居乾之上以陽剛來下於隂柔是以上下下以貴下賤能如是物之所説随也又下動而上説動而可說也所以隨也如是則可大亨而得正能大亨而得正則為无咎不能亨不得正則非可隨之道豈能使天下隨之乎天下所随者時也故云天下隨時隨時之義大矣哉君子之道隨時而動從宜適變不可為典要非造道之深知幾能權者不能與於此也故贊之曰隨時之義大矣哉凡贊之者欲人知其義之大玩而識之也此贊隨時之義大與豫等諸卦不同諸卦時與義是兩事象曰澤中有雷隨君子以嚮晦入宴息雷震於澤中澤隨震而動為隨之象君子觀象以隨時而動隨時之宜萬事皆然取其最明且近者言之君子以嚮晦入宴息君子晝則自强不息及嚮昏晦則入居於内宴息以安其身起居隨時適其宜也禮君子晝不居内夜不居外隨時之道也初九官有渝貞吉出門交有功九居隨時而震體且動之主有所隨者也官主守也既有所隨是其所主守有變易也故曰官有渝貞吉所隨得正則吉也有渝而不得正乃過動也出門交有功人心所從多所親愛者也常人之情愛之則見其是惡之則見其非故妻孥之言雖失而多從所憎之言雖善為惡也苟以親愛而随之則是私情所與豈合正理故出門而交則有功也出門謂非私暱交不以私故其隨當而有功象曰官有渝從正吉也既有隨而變必所從得正則吉也所從不正則有悔吝出門交有功不失也出門而交非牽於私其交必正矣正則无失而有功六二係小子失丈夫二應五而比初隨先於近柔不能固守故為之戒云若係小子則失丈夫也初陽在下小子也五正應在上丈夫也二若志係於初則失九五之正應是失丈夫也係小子而失丈夫舎正應而從不正其咎大矣二有中正之徳非必至如是也在隨之時當為之戒也象曰係小子弗兼與也人之所隨得正則逺邪從非則失是无兩從之理二苟係初則失五矣弗能兼與也所以戒人從正當專一也六三係丈夫失小子隨有求得利居貞丈夫九四也小子初也陽之在上者丈夫也居下者小子也三雖與初同體而切近於四故係於四也大抵隂柔不能自立常親係於所近者上係於四故下失於初舎初從上得隨之宜也上隨則善也如昏之隨明事之從善上隨也背是從非舎明逐暗下隨也四亦无應无隨之者也近得三之隨必與之親善故三之隨四有求必得也人之随於上而上與之是得所求也又凡所求者可得也雖然固不可非理枉道以隨於上苟取愛說以遂所求如此乃小人邪謟趨利之為也故云利居貞自處於正則所謂有求而必得者乃正事君子之隨也象曰係丈夫志舎下也既隨於上則是其志舎下而不從也舎下而從上舎卑而從高也於隨為善矣九四隨有獲貞凶有孚在道以明何咎九四以陽剛之才處臣位之極若於隨有獲則雖正亦凶有獲謂得天下之心隨於己為臣之道當使恩威一出於上衆心皆隨於君若人心從己危疑之道也故凶居此地者奈何唯孚誠積於中動為合於道以明哲處之則又何咎古之人有行之者伊尹周公孔明是也皆徳及於民而民隨之其得民之隨所以成其君之功致其國之安其至誠存乎中是有孚也其所施為无不中道在道也唯其明哲故能如是以明也復何過咎之有是以下信而上不疑位極而无逼上之嫌勢重而无專强之過非聖人大賢則不能也其次如唐之郭子儀威震主而主不疑亦由中有誠孚而處无甚失也非明哲能如是乎象曰隨有𫉬其義凶也有孚在道明功也居近君之位而有𫉬其義固凶能有孚而在道則无咎蓋明哲之功也九五孚于嘉吉九五居尊得正而中實是其中誠在於隨善其吉可知嘉善也自人君至於庻人隨道之吉唯在隨善而已下應二之正中為随善之義象曰孚于嘉吉位正中也處正中之位由正中之道孚誠所隨者正中也所謂嘉也其吉可知所孚之嘉謂六二也隨以得中為善隨之所防者過也蓋心所說随則不知其過矣上六拘係之乃從維之王用亨于西山上六以柔順而居隨之極極乎隨者也拘係之謂随之極如拘持縻係之乃從維之又從而維繫之也謂隨之固結如此王用亨于西山隨之極如是昔者太王用此道亨王業于西山太王避狄之難去豳來岐豳人老稚扶攜以隨之如歸市盖其人心之隨固結如此用此故能亨盛其王業於西山西山岐山也周之王業盖興於此上居隨極固為太過然在得民之隨與隨善之固如此乃為善也施於他則過矣象曰拘係之上窮也隨之固如拘繫維持隨道之窮極也巽下艮上蠱序卦以喜隨人者必有事故受之以蠱承二卦之義以為次也夫喜悦以隨於人者必有事也无事則何喜何隨蠱所以次隨也蠱事也蠱非訓事蠱乃有事也為卦山下有風風在山下遇山而回則物亂是為蠱象蠱之義壊亂也在文為蟲皿皿之有蟲蠱壞之義左氏傳云風落山女惑男以長女下於少男亂其情也風遇山而回物皆撓亂是為有事之象故云蠱者事也既蠱而治之亦事也以卦之象言之所以成蠱也以卦之才言之所以治蠱也蠱元亨利涉大川既蠱則有復治之理自古治必因亂亂則開治理自然也如卦之才以治蠱則能致元亨也蠱之大者濟時之艱難險阻也故曰利涉大川先甲三日後甲三日甲數之首事之始也如辰之甲乙甲第甲令皆謂首也事之端也治蠱之道當思慮其先後三日蓋推原先後為救弊可乆之道先甲謂先於此究其所以然也後甲謂後於此慮其將然也一日二日至於三日言慮之深推之逺也究其所以然則知救之之道慮其將然則知備之之方善救則前弊可革善備則後利可久此古之聖王所以新天下而垂後世也後之治蠱者不明聖人先甲後甲之誡慮淺而事近故勞於救世而亂不革功未及成而弊已生矣甲者事之首庚者變更之首制作政教之類則云甲舉其首也發號施令之事則云庚庚猶更也有所更變也象曰蠱剛上而柔下巽而止蠱以卦變及二體之義而言剛上而柔下謂乾之初九上而為上九坤之上六下而為初六也陽剛尊而在上者也今徃居於上隂柔卑而在下者也今來居於下男雖少而居上女雖長而在下尊卑得正上下順理治蠱之道也由剛之上柔之下變而為艮巽艮止也巽順也下巽而上止止於巽順也以巽順之道治蠱是以元亨也蠱元亨而天下治也治蠱之道如卦之才則元亨而天下治矣夫治亂者苟能使尊卑上下之義正在下者巽順在上者能止齊安定之事皆止於順則何蠱之不治也其道大善而亨也如此則天下治矣利涉大川徃有事也方天下壞亂之際宜涉艱險以徃而濟之是徃有所事也先甲三日後甲三日終則有始天行也夫有始則必有終既終則必有始天之道也聖人知終始之道故能原始而究其所以然要終而備其將然先甲後甲而為之慮所以能治蠱而致元亨也象曰山下有風蠱君子以振民育徳山下有風風遇山而回則物皆散亂故為有事之象君子觀有事之象以振濟於民養育其徳也在己則養徳於天下則濟民君子之所事无大於此二者初六幹父之蠱有子考无咎厲終吉初六雖居最下成卦由之有主之義居内在下而為主子幹父蠱也子幹父蠱之道能堪其事則為有子而其考得无咎不然則為父之累故必惕厲則得終吉也處卑而尸尊事自當兢畏以六之才雖能巽順體乃隂柔在下无應而主幹非有能濟之義若以不克幹而言則其義甚小故專言為子幹蠱之道必克濟則不累其父能厲則可以終吉乃備見為子幹蠱之大法也象曰幹父之蠱意承考也子幹父蠱之道意在承當於父之事也故祗敬其事以置父於无咎之地常懷惕厲則終得其吉也盡誠於父事吉之道也九二幹母之蠱不可貞九二陽剛為六五所應是以陽剛之才在下而幹夫在上隂柔之事也故取子幹母蠱為義以剛陽之臣輔柔弱之君義亦相近二巽體而處柔順義為多幹母之蠱之道也夫子之於母當以柔巽輔導之使得於義不順而致敗蠱則子之罪也從容將順豈无道乎以婦人言之則隂柔可知若伸已剛陽之道遽然矯拂則傷恩所害大矣亦安能入乎在乎屈己下意巽順將承使之身正事治而已故曰不可貞謂不可貞固盡其剛直之道如是乃中道也又安能使之為甚高之事乎若於柔弱之君盡誠竭忠致之於中道則可矣又安能使之大有為乎且以周公之聖輔成王成王非甚柔弱也然能使之為成王而已守成不失道則可矣固不能使之為羲黄堯舜之事也二巽體而得中是能巽順而得中道合不可貞之義得幹母蠱之道也象曰幹母之蠱得中道也二得中道而不過剛幹母蠱之善者也九三幹父之蠱小有悔无大咎三以剛陽之才居下之上主幹者也子幹父之蠱也以陽處剛而不中剛之過也然而在巽體雖剛過而不為无順順事親之本也又居得正故无大過以剛陽之才克幹其事雖以剛過而有小小之悔終无大過咎也然有小悔已非善事親也象曰幹父之蠱終无咎也以三之才幹父之蠱雖小有悔終无大咎也蓋剛斷能幹不失正而有順所以終无咎也六四裕父之蠱徃見吝四以隂居隂柔順之才也所處得正故為寛裕以處其父事者也夫柔順之才而處正僅能循常自守而已若徃幹過常之事則不勝而見吝也以隂柔而无應助徃安能濟象曰裕父之蠱徃未得也以四之才守常居寛裕之時則可矣欲有所徃則未得也加其所任則不勝矣六五幹父之蠱用譽五居尊位以隂柔之質當人君之幹而下應於九二是能任剛陽之臣也雖能下應剛陽之賢而􅀝任之然已實隂柔故不能為創始開基之事承其舊業則可矣故為幹父之蠱夫創業垂統之事非剛明之才則不能繼世之君雖柔弱之資苟能任剛賢則可以為善繼而成令譽也太甲成王皆以臣而用譽者也象曰幹父用譽承以徳也幹父之蠱而用有令譽者以其在下之賢承輔之以剛中之徳也上九不事王侯高尚其事上九居蠱之終无繫應於下處事之外无所事之地也以剛明之才无應援而處无事之地是賢人君子不偶於時而高潔自守不累於世務者也故云不事王侯高尚其事古之人有行之者伊尹太公望之始曾子子思之徒是也不屈道以徇時既不得施設於天下則自善其身尊高敦尚其事守其志節而已士之自髙尚亦非一道有懐抱道徳不偶於時而髙潔自守者有知止足之道退而自保者有量能度分安於不求知者有清介自守不屑天下之事獨潔其身者所處雖有得失小大之殊皆自髙尚其事者也象所謂志可則者進退合道者也象曰不事王侯志可則也如上九之處事外不累於世務不臣事於王侯盖進退以道用舍隨時非賢者能之乎其所存之志可為法則也兑下坤上臨序卦有事而後可大故受之以臨臨者大也蠱者事也有事則可大矣故受之以臨也韓康伯云可大之業由事而生二陽方長而盛大故為臨也為卦澤上有地澤上之地岸也與水相際臨近乎水故為臨天下之物密近相臨者莫若地與水故地上有水則為比澤上有地則為臨也臨者臨民臨事凡所臨皆是在卦取自上臨下臨民之義臨元亨利貞以卦才言也臨之道如卦之才則大亨而正也至于八月有凶二陽方長於下陽道嚮盛之時聖人豫為之戒曰陽雖方長至於八月則其道消矣是有凶也大率聖人為戒必於方盛之時方盛而慮衰則可以防其滿極而圗其永久若既衰而後戒亦无及矣自古天下安治未有久而不亂者盖不能戒於盛也方其盛而不知戒故狃安富而驕侈生樂舒肆則綱紀壊忘禍亂則釁孽萌是以浸淫不知亂之至也彖曰臨剛浸而長説而順剛中而應大亨以正天之道也浸漸也二陽長於下而漸進也下兌上坤和説而順也剛得中道而有應助是以能大亨而得正合天之道剛正而和順天之道也化育之功所以不息者剛正和順而已以此臨人臨事臨天下莫不大亨而得正也兌為説説乃和也夬彖云決而和至于八月有凶消不久也臨二陽生陽方漸盛之時故聖人為之戒云陽雖方長然至于八月則消而凶矣八月謂陽生之八月陽始生於復自復至遯凡八月自建子至建未也二隂長而陽消矣故云消不久也在隂陽之氣言之則消長如循環不可易也以人事言之則陽為君子隂為小人方君子道長之時聖人為之誡使知極則有凶之理而虞備之常不至於滿極則无凶也象曰澤上有地臨君子以教思无窮容保民无疆澤之上有地澤岸也水之際也物之相臨與含容无若水之在地故澤上有地為臨也君子觀親臨之象則教思无窮親臨於民則有教導之意思也无窮至誠无斁也觀含容之象則有容保民之心无疆廣大无疆限也含容有廣大之意故為无窮无疆之義初九咸臨貞吉咸感也陽長之時感動於隂四應於初感之者也比他卦相應尤重四近君之位初得正位與四感應是以正道為當位所信任得行其志獲乎上而得行其正道是以吉也他卦初上爻不言得位失位盖初終之義為重也臨則以初得位居正為重凡言貞吉有既正且吉者有得正則吉者有貞固守之則吉者各隨其事也象曰咸臨貞吉志行正也所謂貞吉九之志在於行正也以九居陽又應四之正其志正也九二咸臨吉无不利二方陽長而漸盛感動於六五中順之君其交之親故見信任得行其志所臨吉而无不利也吉者已然如是故吉也无不利者將然於所施為无所不利也象曰咸臨吉无不利未順命也未者非遽之辭孟子或問勸齊伐燕有諸曰未也又云仲子所食之粟伯夷之所樹歟抑亦盗跖之所樹歟是未可知也史記侯嬴曰人固未易知古人用字之意皆如此今人大率用對已字故意似異然實不殊也九二與五感應以臨下盖以剛徳之長而又得中至誠相感非由順上之命也是以吉而无不利五順體而二説體又隂陽相應故象特明其非由説順也六三甘臨无攸利既憂之无咎三居下之上臨人者也隂柔而説體又處不中正以甘説臨人者也在上而以甘説臨下失徳之甚无所利也兌性既説又乗二陽之上陽方長而上進故不安而益甘既知危懼而憂之若能持謙守正至誠以自處則无咎也邪説由已能憂而改之復何咎乎象曰甘臨位不當也既憂之咎不長也隂柔之人處不中正而居下之上復乗二陽是處不當位也既能知懼而憂之則必強勉自改故其過咎不長也六四至臨无咎四居上之下與下體相比是切臨於下臨之至也臨道尚近故以比為至四居正位而下應於剛陽之初處近君之位守正而任賢以親臨於下是以无咎所處當也象曰至臨无咎位當也居近君之位為得其任以隂處四為得其正與初相應為下賢所以无咎盖由位之當也六五知臨大君之宜吉五以柔中順體居尊位而下應於二剛中之臣是能􅀝任於二不勞而治以知臨下者也夫以一人之身臨乎天下之廣若區區自任豈能周於萬事故自任其知者適足為不知惟能取天下之善任天下之聰明則无所不周是不自任其知則其知大矣五順應於九二剛中之賢任之以臨下乃已以明知臨天下大君之所宜也其吉可知象曰大君之宜行中之謂也君臣道合盖以氣類相求五有中徳故能倚任剛中之賢成大君之宜成知臨之功盖由行其中徳也人君之於賢才非道同徳合豈能用也上六敦臨吉无咎上六坤之極順之至也而居臨之終敦厚於臨也與初二雖非正應然大率隂求於陽又其至順故志在從乎二陽尊而應卑髙而從下尊賢取善敦厚之至也故曰敦臨所以吉而无咎隂柔在上非能臨者宜有咎也以其敦厚於順剛是以吉而无咎六居臨之終而不取極義臨无過極故止為厚義上无位之地止以在上言象曰敦臨之吉志在内也志在内應乎初與二也志順剛陽而敦篤其吉可知也坤下巽上觀序卦臨者大也物大然後可觀故受之以觀觀所以次臨也凡觀視於物則為觀為觀於下則為觀如樓觀謂之觀者為觀於下也人君上觀天道下觀民俗則為觀修徳行政為民瞻仰則為觀風行地上徧觸萬類周觀之象也二陽在上四隂在下陽剛居尊為羣下所觀仰觀之義也在諸爻則惟取觀見隨時為義也觀盥而不薦有孚顒若予聞之胡翼之先生曰君子居上為天下之表儀必極其荘敬則下觀仰而化也故為天下之觀當如宗廟之祭始盥之時不可如既薦之後則下民盡其至誠顒然瞻仰之矣盥謂祭祀之始盥手酌鬱鬯於地求神之時也薦謂獻腥獻熟之時也盥者事之始人心方盡其精誠嚴肅之至也至既薦之後禮數繁縟則人心㪚而精一不若始盥之時矣居上者正其表儀以為下民之觀當荘嚴如始盥之初勿使誠意少㪚如既薦之後則天下之人莫不盡其孚誠顒然瞻仰之矣顒仰望也彖曰大觀在上順而巽中正以觀天下五居尊位以剛陽中正之徳為下所觀其徳甚大故曰大觀在上下坤而上巽是能順而巽也五居中正以巽順中正之徳為觀於天下也觀盥而不薦有孚顒若下觀而化也為觀之道嚴敬如始盥之時則下民至誠瞻仰而從化也不薦謂不使誠意少㪚也觀天之神道而四時不忒聖人以神道設教而天下服矣天道至神故曰神道觀天之運行四時无有差忒則見其神妙聖人見天道之神體神道以設教故天下莫不服也夫天道至神故運行四時化育萬物无有差忒至神之道莫可名言惟聖人黙契體其妙用設為政教故天下之人涵泳其徳而不知其功鼓舞其化而莫測其用自然仰觀而戴服故曰以神道設教而天下服矣象曰風行地上觀先王以省方觀民設教風行地上周及庶物為由歴周覽之象故先王體之為省方之禮以觀民俗而設政教也天子巡省四方觀視民俗設為政教如奢則約之以儉儉則示之以禮是也省方觀民也設教為民觀也初六童觀小人无咎君子吝六以隂柔之質居逺於陽是以觀見者淺近如童稚然故曰童觀陽剛中正在上賢聖之君也近之則見其道徳之盛所觀深逺初乃逺之所見不明如童蒙之觀也小人下民也所見昏淺不能識君子之道乃常分也不足謂之過咎若君子而如是則可鄙吝也象曰初六童觀小人道也所觀不明如童稚乃小人之分故曰小人道也六二闚觀利女貞二應於五觀於五也五剛陽中正之道非二隂暗柔弱所能觀見也故但如闚覘之觀耳闚覘之觀雖少見而不能甚明也二既不能明見剛陽中正之道則利如女子之貞雖見之不能甚明而能順從者女子之道也在女子為貞也二既不能明見九五之道能如女子之順從則不失中正乃為利也象曰闚觀女貞亦可醜也君子不能觀見剛陽中正之大道而僅闚覘其彷彿雖能順從乃同女子之貞亦可羞醜也六三觀我生進退三居非其位處順之極能順時以進退者也若居當其位則无進退之義也觀我生我之所生謂動作施為出於己者觀其所生而隨宜進退所以處雖非正而未至失道也隨時進退求不失道故无悔咎以能順也象曰觀我生進退未失道也觀已之生而進退以順乎宜故未至於失道也六四觀國之光利用賓于王觀莫明於近五以剛陽中正居尊位聖賢之君也四切近之觀見其道故云觀國之光觀見國之盛徳光輝也不指君之身而云國者在人君而言豈止觀其行一身乎當觀天下之政化則人君之道徳可見矣四雖隂柔而巽體居正切近於五觀見而能順從者也利用賓于王夫聖明在上則懐抱才徳之人皆願進于朝廷輔戴之以康濟天下四既觀見人君之徳國家之治光華盛羙所宜賓于王朝效其智力上輔於君以施澤天下故云利用賓于王也古者有賢徳之人則人君賓禮之故士之仕進於王朝則謂之賓象曰觀國之光尚賓也君子懐負才業志在乎兼善天下然有卷懐自守者盖時无明君莫能用其道不得已也豈君子之志哉故孟子曰中天下而立定四海之民君子樂之既觀見國之盛徳光華古人所謂非常之遇也所以志願登進王朝以行其道故云觀國之光尚賓也尚謂志尚其志意願慕賓于王朝也九五觀我生君子无咎九五居人君之位時之治亂俗之羙惡繫乎已而已觀已之生若天下之俗皆君子矣則是已之所為政化善也乃无咎矣若天下之俗未合君子之道則是已之所為政治未善不能免於咎也象曰觀我生觀民也我生出於己者人君欲觀己之施為善否當觀於民民俗善則政化善也王弼云觀民以察已之道是也上九觀其生君子无咎上九以陽剛之徳處於上為下之所觀而不當位是賢人君子不在於位而道徳為天下所觀仰者也觀其生觀其所生也謂出於已者徳業行義也既為天下所觀仰故自觀其所生若皆君子矣則无過咎也苟未君子則何以使人觀仰矜式是其咎也象曰觀其生志未平也雖不在位然以人觀其徳用為儀法故當自慎省觀其所生常不失於君子則人不失所望而化之矣不可以不在於位故安然放意无所事也是其志意未得安也故云志未平也平謂安寜也震下離上噬嗑序卦可觀而後有所合故受之以噬嗑嗑者合也既有可觀然後有來合之者也噬嗑所以次觀也噬齧也嗑合也口中有物間之齧而後合之也卦上下二剛爻而中柔外剛中虚人頥口之象也中虚之中又一剛爻為頥中有物之象口中有物則隔其上下不得嗑必齧之則得嗑故為噬嗑聖人以卦之象推之於天下之事在口則為有物隔而不得合在天下則為有強梗或讒邪間隔於其間故天下之事不得合也當用刑罰小則懲戒大則誅戮以除去之然後天下之治得成矣凡天下至於一國一家至於萬事所以不和合者皆由有間也无間則合矣以至天地之生萬物之成皆合而後能遂凡未合者皆有間也若君臣父子親戚朋友之間有離貳怨隙者盖讒邪間於其間也除去之則和合矣故間隔者天下之大害也聖人觀噬嗑之象推之於天下萬事皆使去其間隔而合之則无不和且治矣噬嗑者治天下之大用也去天下之間在任刑罰故卦取用刑為義在二體明照而威震乃用刑之象也噬嗑亨利用獄噬嗑亨卦自有亨義也天下之事所以不得亨者以有間也噬而嗑之則亨通矣利用獄噬而嗑之之道宜用刑獄也天下之間非刑獄何以去之不云利用刑而云利用獄者卦有明照之象利於察獄也獄者所以究察情偽得其情則知為間之道然後可以設防與致刑也彖曰頥中有物曰噬嗑噬嗑而亨頥中有物故為噬嗑有物間於頥中則為害噬而嗑之則其害亡乃亨通也故云噬嗑而亨剛柔分動而明雷電合而章以卦才言也剛爻與柔爻相間剛柔分而不相雜為明辨之象明辨察獄之本也動而明下震上離其動而明也雷電合而章雷震而電耀相須並見合而章也照與威並行用獄之道也能照則无所隠情有威則莫敢不畏上既以二象言其動而明故復言威照並用之意柔得中而上行雖不當位利用獄也六五以柔居中為用柔得中之義上行謂居尊位雖不當位謂以柔居五為不當而利於用獄者治獄之道全剛則傷於嚴暴過柔則失於寛縱五為用獄之主以柔處剛而得中得用獄之宜也以柔居剛為利用獄以剛居柔為利否曰剛柔質也居用也用柔非治獄之宜也象曰雷電噬嗑先王以明罰敕法象无倒置者疑此文互也雷電相須並見之物亦有嗑象電明而雷威先王觀雷電之象法其明與威以明其刑罰飭其法令法者明事理而為之防者也初九屨校滅趾无咎九居初最下无位者也下民之象為受刑之人當用刑之始罪小而刑輕校木械也其過小故屨之於足以滅傷其趾人有小過校而滅其趾則當懲懼不敢進於惡矣故得无咎繫辭云小懲而大誡此小人之福也言懲之於小與初故得无咎也初與上无位為受刑之人餘四爻皆為用刑之人初居最下无位者也上處尊位之上過於尊位亦无位者也王弼以為无隂陽之位隂陽係於竒偶豈容无也然諸卦初上不言當位不當位者盖初終之義為大臨之初九則以位為正若需上六云不當位乾上九云无位爵位之位非隂陽之位也象曰屨校滅趾不行也屨校而滅傷其趾則知懲誡而不敢長其惡故云不行也古人制刑有小罪則校其趾盖取禁止其行使不進於惡也六二噬膚滅鼻无咎二應五之位用刑者也四爻皆取噬為義二居中得正是用刑得其中正也用刑得其中正則罪惡者易服故取噬膚為象噬齧人之肌膚為易入也滅沒也深入至沒其鼻也二以中正之道其刑易服然乗初剛是用刑于剛強之人刑剛強之人必須深痛故至滅鼻而无咎也中正之道易以服人與嚴刑以待剛強義不相妨象曰噬膚滅鼻乗剛也深至滅鼻者乗剛故也乗剛乃用刑於剛強之人不得不深嚴也深嚴則得宜乃所謂中也六三噬腊肉遇毒小吝无咎三居下之上用刑者也六居三處不當位自處不得其當而刑于人則人不服而怨懟悖犯之如噬齧乾腊堅韌之物而遇毒惡之味反傷于口也用刑而人不服反致怨傷是可鄙吝也然當噬嗑之時大要噬間而嗑之雖其身處位不當而強梗難服至於遇毒然用刑非為不當也故雖可吝而亦小噬而嗑之非有咎也象曰遇毒位不當也六三以隂居陽處位不當自處不當故所刑者難服而反毒之也九四噬乾胏得金矢利艱貞吉九四居近君之位當噬嗑之任者也四已過中是其間愈大而用刑愈深也故云噬乾胏胏肉之有聨骨者乾肉而兼骨至堅難噬者也噬至堅而得金矢金取剛矢取直九四陽徳剛直為得剛直之道雖用剛直之道利在克艱其事而貞固其守則吉也九四剛而明體陽而居柔剛明則傷於果故戒以知難居柔則守不固故戒以堅貞剛而不貞者有矣凡失剛者皆不貞也在噬嗑四最為善象曰利艱貞吉未光也凡言未光其道未光大也戒於利艱貞盖其所不足也不得中正故也六五噬乾肉得黄金貞厲无咎五在卦愈上而為噬乾肉反易於四之乾胏者五居尊位乗在上之勢以刑於下其勢易也在卦將極矣其為間甚大非易嗑也故為噬乾肉也得黄金黄中色金剛物五居中為得中道處剛而四輔以剛得黄金也五无應而四居大臣之位得其助也貞厲无咎六五雖處中剛然實柔體故戒以必正固而懐危厲則得无咎也以柔居尊而當噬嗑之時豈可不貞固而懐危懼哉象曰貞厲无咎得當也所以能无咎者以所為得其當也所謂當居中用剛而能守正慮危也上九何校滅耳凶上過乎尊位无位者也故為受刑者居卦之終是其間大噬之極也繫辭所謂惡積而不可揜罪大而不可解者也故何校而滅其耳凶可知矣何負也謂在頸也象曰何校滅耳聰不明也人之聾暗不悟積其罪惡以至於極古人制法罪之大者何之以校為其无所聞知積成其惡故以校而滅傷其耳誡聰之不明也離下艮上賁序卦嗑者合也物不可以苟合而已故受之以賁賁者飾也物之合則必有文文乃飾也如人之合聚則有威儀上下物之合聚則有次序行列合則必有文也賁所以次噬嗑也為卦山下有火山者草木百物之所聚也下有火則照見其上草木品彚皆被其光彩有賁飾之象故為賁也賁亨小利有攸往物有飾而後能亨故曰无本不立无文不行有實而加飾則可以亨矣文飾之道可増其光彩故能小利於進也彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也卦為賁飾之象以上下二體剛柔交相為文飾也下體本乾柔来文其中而為離上體本坤剛往文其上而為艮乃為山下有火止於文明而成賁也天下之事无飾不行故賁則能亨也柔来而文剛故亨柔来文於剛而成文明之象文明所以為賁也賁之道能􅆀亨實由飾而能亨也分剛上而文柔故小利有攸往分乾之中爻往文於艮之上也事由飾而加盛由飾而能行故小利有攸往夫往而能利者以有本也賁飾之道非能増其實也但加之文彩耳事由文而顯盛故為小利有攸往亨者亨通也往者加進也二卦之變共成賁義而彖分言上下各主一事者盖離明足以致亨文柔又能小進也天文也文明以止人文也此承上文言隂陽剛柔相文者天之文也止於文明者人之文也止謂處於文明也質必有文自然之理理必有對待生生之本也有上則有下有此則有彼有質則有文一不獨立二則為文非知道者孰能識之天文天之理也人文人之道也觀乎天文以察時變天文謂日月星辰之錯列寒暑隂陽之代變觀其運行以察四時之遷改也觀乎人文以化成天下人文人理之倫序觀人文以教化天下天下成其禮俗乃聖人用賁之道也賁之象取山下有火又取卦變柔来文剛剛上文柔凡卦有以二體之義及二象而成者如屯取動乎險中與雲雷訟取上剛下險與天水違行是也有取一爻者成卦之由也柔得位而上下應之曰小畜柔得尊位大中而上下應之曰大有是也有取二體又取消長之義者雷在地中復山附于地剥是也有取二象兼取二爻交變為義者風雷益兼取損上益下山下有澤損兼取損下益上是也有既以二象成卦復取爻之義者夬之剛决柔姤之柔遇剛是也有以用成卦者巽乎水而上水井木上有火鼎是也鼎又以卦形為象有以形為象者山下有雷頥頥中有物曰噬嗑是也此成卦之義也如剛上柔下損上益下謂剛居上柔在下損於上益於下據成卦而言非謂就卦中升降也如訟无妄云剛来豈自上體而来也凡以柔居五者皆云柔進而上行柔居下者也乃居尊位是進而上也非謂自下體而上也卦之變皆自乾坤先儒不達故謂賁本是泰卦豈有乾坤重而為泰又由泰而變之理下離本乾中爻變而成離上艮本坤上爻變而成艮離在内故云柔来艮在上故云剛上非自下體而上也乾坤變而為六子八卦重而為六十四皆由乾坤之變也象曰山下有火賁君子以明庶政无敢折獄山者草木百物之所聚生也火在其下而上照庶類皆被其光明為賁飾之象也君子觀山下有火明照之象以修明其庶政成文明之治而无果敢於折獄也折獄者人君之所致慎也豈可恃其明而輕自用乎乃聖人之用心也為戒湥矣象之所取唯以山下有火明照庶物以用明為戒而賁亦自有无敢折獄之義折獄者專用情實有文飾則沒其情矣故无敢用文以折獄也初九賁其趾舍車而徒初九以剛陽居明體而處下君子有剛明之徳而在下者也君子在无位之地无所施於天下惟自賁飾其所行而已趾取在下而所以行也君子修飾之道正其所行守節處義其行不苟義或不當則舎車輿而寜徒行衆人之所羞而君子以為賁也舎車而徒之義兼於比應取之初比二而應四應四正也與二非正也九之剛明守義不近與於二而逺應于四舍易而從難如舎車而徒行也守節義君子之賁也是故君子所賁世俗所羞世俗所貴君子所賤以車徒為言者因趾與行為義也象曰舎車而徒義弗乗也舎車而徒行者於義不可以乗也初應四正也從二非正也近舎二之易而從四之難舍車而徒行也君子之賁守其義而已六二賁其須卦之為賁雖由兩爻之變而文明之義為重二實賁之主也故主言賁之道飾於物者不能大變其質也因其質而加飾耳故取須義須隨頥而動者也動止唯繫於所附猶善惡不由于賁也二之文明惟為賁飾善惡則繫其質也象曰賁其須與上興也以須為象者謂其與上同興也隨上而動動止惟繫所附也猶加飾于物因其質而賁之善惡在其質也九三賁如濡如永貞吉三處文明之極與二四二隂間處相賁賁之盛者也故云賁如如辭助也賁飾之盛光彩潤澤故云濡如光彩之盛則有潤澤詩云麀鹿濯濯永貞吉三與二四非正應相比而成相賁故戒以常永貞正賁者飾也賁飾之事難乎常也故永貞則吉三與四相賁又下比於二二柔文一剛上下交賁為賁之盛也象曰永貞之吉終莫之陵也飾而不常且非正人所陵侮也故戒能永正則吉也其賁既常而正誰能陵之乎六四賁如皤如白馬翰如匪㓂婚媾四與初為正應相賁者也本當賁如而為三所隔故不獲相賁而皤如皤白也未獲賁也馬在下而動者也未獲相賁故云白馬其從正應之志如飛故云翰如匪為九三之㓂讐所隔則婚媾遂其相親矣已之所乗與動於下者馬之象也初四正應終必獲親第始為其間隔耳象曰六四當位疑也匪㓂婚媾終无尤也四與初相逺而三介於其間是所當之位為可疑也雖為三㓂讐所隔未得親於婚媾然其正應理直義勝終必得合故云終无尤也尤怨也終得相賁故无怨尤也六五賁于丘園束帛戔戔吝終吉六五以隂柔之質密比于上九剛陽之賢隂比于陽復无所繫應從之者也受賁於上九也自古設險守國故城壘多依丘坂丘謂在外而近且髙者園圃之地最近城邑亦在外而近者丘園謂在外而近者指上九也六五雖居君位而隂柔之才不足自守與上之剛陽相比而志從焉𫉬賁於外比之賢賁于丘園也若能受賁於上九受其裁制如束帛而戔戔則雖其柔弱不能自為為可吝少然能從於人成賁之功終𫉬其吉也戔戔剪裁分裂之狀帛未用則束之故謂之束帛及其制為衣服必剪裁分裂戔戔然束帛喻六五本質戔戔謂受人剪製而成用也其資於人與蒙同而蒙不言吝者盖童蒙而賴於人乃其宜也非童幼而資賁於人為可吝耳然享其功終為吉也象曰六五之吉有喜也能從人以成賁之功亨其吉美是有喜也上九白賁无咎上九賁之極也賁飾之極則失於華偽惟能質白其賁則无過失之咎白素也尚質素則不失其本真所謂尚質素者非无飾也不使華沒實耳象曰白賁无咎上得志也白賁无咎以其在上而得志也上九為得志者在上而文柔成賁之功六五之君又受其賁故雖居无位之地而實尸賁之功為得志也與他卦居極者異矣既在上而得志處賁之極將有華偽失實之咎故戒以質素則无咎飾不可過也坤下艮上剝序卦賁者飾也致飾然後亨則盡矣故受之以剝天物至于文飾亨之極也極則必反故賁終則剝也卦五隂而一陽隂始自下生漸長至于盛極羣隂消剝於陽故為剝也以二體言之山附於地山髙起地上而反附著於地頽剝之象也剝不利有攸往剝者羣隂長盛消剝於陽之時衆小人剝䘮於君子故君子不利有所往惟當巽言晦迹隨時消息以免小人之害也彖曰剝剝也柔變剛也不利有攸往小人長也剝剝也謂剝落也柔變剛也柔長而剛變也夏至一隂生而漸長一隂長則一陽消至於建戌則極而成剝是隂柔變剛陽也隂小人之道方長盛而剝消於陽故君子不利有所往也順而止之觀象也君子尚消息盈虚天行也君子當剝之時知不可有所往順時而止乃能觀剝之象也卦有順止之象乃處剝之道君子當觀而體之君子尚消息盈虚天行也君子存心消息盈虚之理而能順之乃合乎天行也理有消衰有息長有盈滿有虚損順之則吉逆之則凶君子隨時敦尚所以事天也象曰山附於地剝上以厚下安宅艮重於坤山附于地也山髙起于地而反附著于地圯剝之象也上謂人君與居人上者觀剝之象而厚固其下以安其居也下者上之本未有基本固而能剝者也故上之剝必自下下剝則上危矣為人上者知理之如是則安養人民以厚其本乃所以安其居也書曰民惟邦本本固邦寜初六剝牀以足蔑貞吉隂之剝陽自下而上以牀為象者取身之所處也自下而剝漸至于身也剝牀以足剝牀之足也剝始自下故為剝足隂自下進漸消蔑于貞正凶之道也蔑无也謂消亡於正道也隂剝陽柔變剛是邪侵正小人消君子其凶可知象曰剝牀以足以滅下也取牀足為象者以隂侵沒陽于下也滅沒也侵滅正道自下而上也六二剝牀以辨蔑貞凶辨分隔上下者牀之幹也隂漸進而上剝至于辨愈蔑於正也凶益甚矣象曰剝牀以辨未有與也隂之侵剝於陽得以益盛至於剥辨者以陽未有應與故也小人侵剝君子若君子有與則可以勝小人不能為害矣唯其无與所以被蔑而凶當消剝之時而无徒與豈能自存也言未有與剝之未盛有與猶可勝也示人之意湥矣六三剝之无咎衆隂剝陽之時而三獨居剛應剛與上下之隂異矣志從於正在剝之時為无咎者也三之為可謂善矣不言吉何也曰方羣隂剝陽衆小人害君子三雖從正其勢孤弱所應在无位之地於斯時也難乎免矣安得吉也其義為无咎耳言其无咎所以勸也象曰剝之无咎失上下也三居剝而无咎者其所處與上下諸隂不同是與其同類相失於處剝之道為无咎如東漢之吕強是也六四剝牀以膚凶始剝於牀足漸至于膚膚身之外也將滅其身矣其凶可知隂長已盛陽剝已甚貞道已消故更不言蔑貞直言凶也象曰剝牀以膚切近災也五為君位剝已及四在人則剝其膚矣剝及其膚身垂于亡矣切近於災禍也六五貫魚以宫人寵无不利剝及君位剝之極也其凶可知故更不言剝而别設義以開小人遷善之門五羣隂之主也魚隂物故以為象五能使羣隂順序如貫魚然反獲寵愛於在上之陽如宫人則无所不利也宫人宫中之人妻妾侍使也以隂言且取獲寵愛之義以一陽在上衆隂有順從之道故發此義象曰以宫人寵終无尤也羣隂消剝於陽以至於極六五若能長率羣隂駢首順序反獲寵愛於陽則終无過尤也於剝之將終復發此義聖人勸遷善之意湥切之至也上九碩果不食君子得輿小人剝廬諸陽消剝已盡獨有上九一爻尚存如碩大之果不見食將見復生之理上九亦變則純隂矣然陽无可盡之理變於上則生於下无間可容息也聖人發明此理以見陽與君子之道不可亡也或曰剝盡則為純坤豈復有陽乎曰以卦配月則坤當十月以氣消息言則陽剝為坤陽来為復陽未嘗盡也剝盡於上則復生於下矣故十月謂之陽月恐疑其无陽也隂亦然聖人不言耳隂道盛極之時其亂可知亂極則自當思治故衆心願載於君子君子得輿也詩匪風下泉所以居變風之終也理既如是在卦亦衆隂宗陽為共載之象小人剝廬若小人則當剝之極剝其廬矣无所容其身也更不論爻之隂陽但言小人處剝極則及其廬矣廬取在上之象或曰隂陽之消必待盡而後復生於下此在上便有復生之義何也夬之上六何以言終有凶曰上九居剝之極上有一陽陽无可盡之理故明其有復生之義見君子之道不可亡也夬者陽消隂隂小人之道也故但言其消亡耳何用更言却有復生之理乎象曰君子得輿民所載也小人剝廬終不可用也正道消剝既極則人復思治故陽剛君子為民所承載也若小人處剝之極則小人之窮耳終不可用也非謂九為小人但言剝極之時小人如是也震下坤上復序卦物不可以終盡剝窮上反下故受之以復物无剝盡之理故剝極則復来隂極則陽生陽剝極於上而復生於下窮上而反下也復所以次剝也為卦一陽生於五隂之下隂極而陽復也嵗十月隂盛既極冬至則一陽復生於地中故為復也陽君子之道陽消極而復反君子之道消極而復長也故為反善之義復亨出入无疾朋來无咎復亨既復則亨也陽氣復生於下漸亨盛而生育萬物君子之道既復則漸以亨通澤於天下故復則有亨盛之理也出入无疾出入謂生長復生於内入也長進於外出也先云出語順耳陽生非自外也来於内故謂之入物之始生其氣至微故多屯艱陽之始生其氣至微故多摧折春陽之發為隂寒所折觀草木於朝暮則可見矣出入无疾謂微陽生長无害之者也既无害之而其類漸進而来則將亨盛故无咎也所謂咎在氣則為差忒在君子則為抑塞不得盡其理陽之當復雖使有疾之固不能止其復也但為阻礙耳而卦之才有无疾之義乃復道之善也一陽始生至微固未能勝羣隂而發生萬物必待諸陽之来然後能成生物之功而无差忒以朋来而无咎也三陽子丑寅之氣生成萬物衆陽之功也若君子之道既消而復豈能便勝於小人必待其朋類漸盛則能恊力以勝之也反復其道七日來復利有攸往謂消長之道反復迭至陽之消至七日而来復姤陽之始消也七變而成復故云七日謂七更也臨云八月有凶謂陽長至于隂長歷八月也陽進則隂退君子道長則小人道消故利有攸往也彖曰復亨剛反動而以順行是以出入无疾朋來无咎復亨謂剛反而亨也陽剛消極而来反既来反則漸長盛而亨通矣動而以順行是以出入无疾朋来无咎以卦才言其所以然也下動而上順是動而以順行也陽剛反而順動是以得出入无疾朋来而无咎也朋之来亦順動也反復其道七日來復天行也利有攸往剛長也復其見天地之心乎其道反復往来迭消迭息七日而来復者天地之運行如是也消長相因天之理也陽剛君子之道長故利有攸往一陽復於下乃天地生物之心也先儒皆以静為見天地之心盖不知動之端乃天地之心也非知道者孰能識之象曰雷在地中復先王以至日閉關商旅不行后不省方雷者隂陽相薄而成聲當陽之微未能發也雷在地中陽始復之時也陽始生於下而甚微安静而後能長先王順天道當至日陽之始生安静以養之故閉關使商旅不得行人君不省視四方觀復之象而順天道也在一人之身亦然當安静以養其陽也初九不逺復无祗悔元吉復者陽反来復也陽君子之道故復為反善之義初剛陽来復處卦之初復之最先者也是不逺而復也失而後有復不失則何復之有惟失之不逺而復則不至於悔大善而吉也袛宜音袛抵也玉篇云適也義亦同无袛悔不至於悔也坎卦曰袛既平无咎謂至既平也顔子无形顯之過夫子謂其庶幾乃无袛悔也過既未形而改何悔之有既未能不勉而中所欲不踰矩是有過也然其明而剛故一有不善未嘗不知既知未嘗不遽改故不至於悔乃不逺復也袛陸徳明音支玉篇五經文字羣經音辨並見衣部象曰不逺之復以修身也不逺而復者君子所以修其身之道也學問之道无他也唯其知不善則速改以從善而已六二休復吉二雖隂爻處中正而切比於初志從於陽能下仁也復之休羙者也復者復於禮也復禮則為仁初陽復復於仁也二比而下之所以羙而吉也象曰休復之吉以下仁也為復之休羙而吉者以其能下仁也仁者天下之公善之本也初復於仁二能親而下之是以吉也六三頻復厲无咎三以隂躁處動之極復之頻數而不能固者也復貴安固頻復頻失不安於復也復善而屢失危之道也聖人開遷善之道與其復而危其屢失故云厲无咎不可以頻失而戒其復也頻失則為危屢復何咎過在失而不在復也象曰頻復之厲義无咎也頻復頻失雖為危厲然復善之義則无咎也六四中行獨復此爻之義最宜詳玩四行羣隂之中而獨能復自處於正下應於陽剛其志可謂善矣不言吉凶者盖四以柔居羣隂之間初方甚微不足以相援无可濟之理故聖人但稱其能獨復而不欲言其獨從道而必凶也曰然則不言无咎何也曰以隂居隂柔弱之甚雖有從陽之志終不克濟非无咎也象曰中行獨復以從道也稱其獨復者以其從陽剛君子之善道也六五敦復无悔六五以中順之徳處君位能敦篤於復善者也故无悔雖本善戒亦在其中矣陽復方微之時以柔居尊下復无助未能致亨吉也能无悔而已象曰敦復无悔中以自考也以中道自成也五以隂居尊處中而體順能敦篤其志以中道自成則可以无悔也自成謂成其中順之徳上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征以隂柔居復之終終迷不復者也迷而不復其凶可知有災眚災天災自外来眚已過由自作既迷不復善在已則動皆過失災禍亦自外而至盖所招也迷道不復无施而可用以行師則終有大敗以之為國則君之凶也十年者數之終至於十年不克征謂終不能行既迷於道何時而可行也象曰迷復之凶反君道也復則合道既迷於復與道相反也其凶可知以其國君凶謂其反君道也人君居上而治衆當從天下之善乃迷於復反君之道也非止人君凡人迷於復者皆反道而凶也震下乾上无妄序卦復則不妄矣故受之以无妄復者反於道也既復於道則合正理而无妄故復之後受之以无妄也為卦乾上震下震動也動以天為无妄動以人欲則妄矣无妄之義大矣哉无妄元亨利貞其匪正有眚不利有攸往无妄者至誠也至誠者天之道也天之化育萬物生生不窮各正其性命乃无妄也人能合无妄之道則所謂與天地合其徳也无妄有大亨之理君子行无妄之道則可以􅆀大亨矣无妄天之道也卦言人由无妄之道也利貞法无妄之道利在貞正失貞正則妄也雖无邪心苟不合正理則妄也乃邪心也故有匪正則為過眚既已无妄不宜有往往則妄也彖曰无妄剛自外來而為主於内謂初九也坤初爻變而為震剛自外而来也震以初爻為主成卦由之故初為无妄之主動以天為无妄動而以天動為主也以剛變柔為以正去妄之象又剛正為主於内无妄之義也九居初正也動而健剛中而應大亨以正天之命也下動而上健是其動剛健也剛健无妄之體也剛中而應五以剛居中正二復以中正相應是順理而不妄也故其道大亨通而貞正乃天之命也天命謂天道也所謂无妄也其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉所謂无妄正而已小失於正則為有過乃妄也所謂匪正盖由有往若无妄而不往何由有匪正乎无妄者理之正也更有往將何之矣乃入於妄也往則悖於天理天道所不祐可行乎哉象曰天下雷行物與无妄先王以茂對時育萬物雷行於天下隂陽交和相薄而成聲於是驚蟄蔵振萌芽發生萬物其所賦與洪纎髙下各正其性命无有差妄物與无妄也先王觀天下雷行發生賦與之象而以茂對天時養育萬物使各得其宜如天與之无妄也茂盛也茂對之為言猶盛行永言之比對時謂順合天時天道生萬物各得其性命而不妄王者體天之道養育人民以至昆蟲草木使各得其宜乃對時育物之道也初九无妄往吉九以陽剛為主於内无妄之象以剛實變柔而居内中誠不妄者也以无妄而往何所不吉卦辭言不利有攸往謂既无妄不可復有往也過則妄矣爻言往吉謂以无妄之道而行則吉也象曰无妄之往得志也以无妄而往无不得其志也盖誠之於物无不能動以之修身則身正以之治事則事得其理以之臨人則人感而化无所往而不得其志也六二不耕穫不菑畬則利有攸往凡理之所然者非妄也人所欲為者乃妄也故以耕穫菑畬譬之六二居中得正又應五之中正居動體而柔順為動能順乎中正乃无妄者也故極言无妄之義耕農之始穫其成終也田一嵗曰菑三嵗曰畬不耕而穫不菑而畬謂不首造其事因其事理所當然也首造其事則是人心所作為乃妄也因事之當然則是順理應物非妄也穫與畬是也盖耕則必有穫菑則必有畬是事理之固然非心意之所造作也或曰聖人制作以利天下者皆造端也豈非妄乎曰聖人隨時制作合乎風氣之宜未嘗先時而開之也若不待時則一聖人足以盡為矣豈待累聖繼作也時乃事之端聖人隨時而為也象曰不耕穫未富也未者非必之辭臨卦曰未順命是也不耕而穫不菑而畬因其事之當然既耕則必有穫既菑則必成畬非必以穫畬之富而為也其始耕菑乃設心在於求穫畬是以其富也心有欲而為者則妄也六三无妄之災或繫之牛行人之得邑人之災三以隂柔而不中正是為妄者也又志應於上欲也亦妄也在无妄之道為災害也人之妄動由有欲也妄動而得亦必有失雖使得其所利其動而妄失已大矣况復凶悔隨之乎知者見妄之得則知其失必與稱也故聖人因六三有妄之象而發明其理云无妄之災或繫之牛行人之得邑人之災言如三之為妄乃无妄之災害也設如有得其失隨至如或繫之牛或謂設或也或繫得牛行人得之以為有得邑人失牛乃是災也借使邑人繫得馬則行人失馬乃是災也言有得則有失不足以為得也行人邑人但言有得則有失非以為彼已也妄得之福災亦隨之妄得之得失亦稱之固不足以為得也人能知此則不為妄動矣象曰行人得牛邑人災也行人得牛乃邑人之災也有得則有失何足以為得乎九四可貞无咎四剛陽而居乾體復无應與无妄者也剛而无私豈有妄乎可貞固守此自无咎也九居隂得為正乎曰以陽居乾體若復處剛則為過矣過則妄也居四无尚剛之志也可貞與利貞不同可貞謂其所處可貞固守之利貞謂利於貞也象曰可貞无咎固有之也貞固守之則无咎也九五无妄之疾勿藥有喜九以中正當尊位下復以中正順應之可謂无妄之至者也其道无以加矣疾為之病者也以九五之无妄如其有疾勿以藥治則有喜也人之有疾則以藥石攻去其邪以養其正若氣體平和本无疾病而攻治之則反害其正矣故勿藥則有喜也有喜謂疾自亡也无妄之所謂疾者謂若治之而不治率之而不從化之而不革以妄而為无妄之疾舜之有苖周公之管蔡孔子之叔孫武叔是也既已无妄而有疾之者則當自如无妄之疾不足患也若遂自攻治乃是渝其无妄而遷於妄也五既處无妄之極故惟戒在動動則妄矣象曰九妄之藥不可試也人之有妄理必修改既无妄矣復藥以治之是反為妄也其可用乎故云不可試也試暫用也猶曰少嘗之也上九无妄行有𤯝无攸利上九居卦之終无妄之極者也極而復行過於理也過於理則妄也故上九而行則有過眚而无所利矣象曰无妄之行窮之災也无妄既極而復加進乃為妄矣是窮極而為災害也乾下艮上大畜序卦有无妄然後可畜故受之以大畜无妄則為有實故可畜聚大畜所以次无妄也為卦艮上乾下天而在於山中所畜至大之象畜為畜止又為畜聚止則聚矣取天在山中之象則為藴畜取艮之止乾則為畜止止而後有積故止為畜義大畜利貞不家食吉利涉大川莫大於天而在山中艮在上而止乾於下皆藴畜至大之象也在人為學術道徳充積於内乃所畜之大也凡所畜聚皆是專言其大者人之藴畜宜得正道故云利貞若夫異端偏學所畜至多而不正者固有矣既道徳充積於内宜在上位以享天禄施為於天下則不獨於一身之吉天下之吉也若窮處而自食於家道之否也故不家食則吉所畜既大宜施之於時濟天下之艱險乃大畜之用也故利渉大川此只據大畜之義而言彖更以卦之才徳而言諸爻則惟有止畜之義盖易體道隨宜取明且近者彖曰大畜剛健篤實輝光日新其徳以卦之才徳而言也乾體剛健艮體篤實人之才剛健篤實則所畜能大充實而有輝光畜之不已則其徳日新也剛上而尚賢能止健大正也剛上陽居上也陽剛居尊位之上為尚賢之義止居健上為能止健之義止乎健者非大正則安能以剛陽在上與尊尚賢徳能止至健皆大正之道也不家食吉養賢也利渉大川應乎天也大畜之人所宜施其所畜以濟天下故不食於家則吉謂居天位享天禄也國家養賢賢者得行其道也利渉大川謂大有藴畜之人宜濟天下之艱險也彖更發明卦才云所以能渉大川者以應乎天也六五君也下應乾之中爻乃大畜之君應乾而行也所行能應乎天无艱險之不可濟况其他乎象曰天在山中大畜君子以多識前言往行以畜其徳天為至大而在山之中所畜至大之象君子觀象以大其藴畜人之藴畜由學而大在多聞前古聖賢之言與行考跡以觀其用察言以求其心識而得之以畜成其徳乃大畜之義也初九有厲利己大畜艮止畜乾也故乾三爻皆取被止為義艮三爻皆取止之為義初以陽剛又健體而居下必上進者也六四在上畜止於已安能敵在上得位之勢若犯之而進則有危厲故利在已而不進也在他卦則四與初為正應相援者也在大畜則相應乃為相止畜上與三皆陽則為合志盖陽皆上進之物故有同志之象而无相止之義象曰有厲利己不犯災也有危則宜已不可犯災危而行也不度其勢而進有災必矣九二輿説輹二為六五所畜止勢不可進也五據在上之勢豈可犯也二雖剛健之體然其處得中道故進止无失雖志於進度其勢之不可則止而不行如車輿脱去輪輹謂不行也象曰輿説輹中无尤也輿説輹而不行者盖其處得中道動不失宜故无過尤也善莫善於剛中柔中者不至於過柔耳剛中中而才也初九處不得中故戒以有危宜已二得中進止自无過差故但言輿説輹謂其能不行也不行則无尤矣初輿二乾體剛健而不足以進四與五隂柔而能止時之盛衰勢之強弱學易者所宜湥識也九三良馬逐利艱貞日閑輿衞利有攸往三剛健之極而上九之陽亦上進之物又處畜之極而思變也與三乃不相畜而志同相應以進者也三以剛健之才而在上者與合志而進其進如良馬之馳逐言其速也雖其進之勢速不可恃其才之健與上之應而忘備與慎也故宜艱難其事而由貞正之道輿者用行之物衞者所以自防當自日常閑習其車輿與其防衞則利有攸往矣三乾體而居正能貞者也當其鋭進故戒以知難與不失其貞也志既鋭於進雖剛明有時而失不得不戒也象曰利有攸往上合志也所以利有攸往者以與在上者合志也上九陽性上進且畜已極故不下畜三而與合志上進也六四童牛之牿元吉以位而言則四下應於初畜初者也初居最下陽之㣲者微而畜之則易制猶童牛而加牿大善而吉也槩論畜道則四艮體居上位而得正是以正徳居大臣之位當畜之任者也大臣之任上畜止人君之邪心下畜止天下之惡人人之惡止於初則易既盛而後禁則扞格而難勝故上之惡既甚則雖聖人救之不能免違拂下之惡既甚則雖聖人治之不能免刑戮莫若止之於初如童牛而加牿則元吉也牛之性觝觸以角故牿以制之若童犢始角而加之以牿使觝觸之性不發則易而无傷以况六四能畜止上下之惡於未發之前則大善之吉也象曰六四元吉有喜也天下之惡已盛而止之則上勞於禁制而下傷於刑誅故畜止於微小之前則大善而吉不勞而无傷故可喜也四之畜初是也上畜亦然六五豶豕之牙吉六五居君位止畜天下之邪惡夫以億兆之衆發其邪欲之心人君欲力以制之雖密法嚴刑不能勝也夫物有總攝事有機㑹聖人操得其要則視億兆之心猶一心道之斯行止之則戢故不勞而治其用若豶豕之牙也豕剛躁之物而牙為猛利若強制其牙則用力勞而不能止其躁猛雖縶之維之不能使之變也若豶去其勢則牙雖存而剛躁自止其用如此所以吉也君子發豶豕之義知天下之惡不可以力制也則察其機持其要塞絶其本原故不假刑法嚴峻而惡自止也且如止盜民有欲心見利則動苟不知教而迫於飢寒雖刑殺日施其能勝億兆利欲之心乎聖人則知所以止之之道不尚威刑而修政教使之有農桑之業知廉恥之道雖賞之不竊矣故止惡之道在知其本得其要而已不嚴刑於彼而修政於此是猶患豕牙之利不制其牙而豶其勢也象曰六五之吉有慶也在上者不知止惡之方嚴刑以敵民欲則其傷甚而无功若知其本制之有道則不勞无傷而俗革天下之福慶也上九何天之衢亨予聞之胡先生曰天之衢亨誤加何字事極則反理之常也故畜極而亨小畜畜之小故極而成大畜畜之大故極而散極既當變又陽性上行故遂散也天衢天路也謂虚空之中雲氣飛鳥往来故謂之天衢天衢之亨謂其亨通曠濶无有蔽阻也在畜道則變矣變而亨非畜道之亨也象曰何天之衢道大行也何以謂之天衢以其无止礙道路大通行也以天衢非常語故象特設問曰何謂天之衢以道路大通行取空豁之狀也以象有何字故爻下亦誤加之震下艮上頥序卦物畜然後可養故受之以頥夫物既畜聚則必有以養之无養則不能存息頥所以次大畜也卦上艮下震上下二陽爻中含四隂上止而下動外實而中虚人頥頷之象也頥養也人口所以飲食養人之身故名為頥聖人設卦推養之義大至於天地養育萬物聖人養賢以及萬民與人之養生養形養徳養人皆頥養之道也動息節宣以養生也飲食衣服以養形也威儀行義以養徳也推已及物以養人也頥貞吉觀頥自求口實頥之道以正則吉也人之養身養徳養人養於人皆以正道則吉也天地造化養育萬物各得其宜者亦正而已矣觀頥自求口實觀人之所頥與其自求口實之道則善惡吉凶可見矣彖曰頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也貞吉所養者正則吉也所養謂所養之人與養之之道自求口實謂其自求養身之道皆以正則吉也天地養萬物聖人養賢以及萬民頤之時大矣哉聖人極言頤之道而贊其大天地之道則養育萬物養育萬物之道正而已矣聖人則養賢才與之共天位使之食天祿俾施澤於天下養賢以及萬民也養賢所以養萬民也夫天地之中品物之衆非養則不生聖人裁成天地之道輔相天地之宜以養天下至於鳥獸草木皆有養之之政其道配天地故夫子推頤之道贊天地與聖人之功曰頤之時大矣哉或云義或云用或止云時以其大者也萬物之生與養時為大故云時象曰山下有雷頤君子以慎言語節飲食以二體言之山下有雷雷震於山下山之生物皆動其根荄發其萌芽為養之象以上下之義言之艮止而震動上止下動頤頷之象以卦形言之上下二陽中含四隂外實中虚頤口之象口所以養身也故君子觀其象以養其身慎言語以養其徳節飲食以養其體不唯就口取養義事之至近而所繫至大者莫過於言語飲食也在身為言語於天下則凡命令政教出於身者皆是慎之則必當而无失在身為飲食於天下則凡貨資財用養於人者皆是節之則適宜而无傷推養之道養徳養天下莫不然也初九舍爾靈龜觀我朶頤凶蒙之初六蒙者也爻乃主發蒙而言頤之初九亦假外而言爾謂初也舍爾之靈龜乃觀我而朶頤我對爾而設初之所以朶頤者四也然非四謂之也假設之辭爾九陽體剛明其才智足以養正者也龜能咽息不食靈龜喻其明智而可以不求養於外也才雖如是然以陽居動體而在頤之時求頤人所欲也上應於四不能自守志在上行説所欲而朶頥者也心既動則其自失必矣迷欲而失已以陽而從隂則何所不至是以凶也朶頥為朶動其頥頷又人見食而欲之則動頥垂涎故以為象象曰觀我朶頥亦不足貴也九動體朶頥謂其説隂而志動既為欲所動則雖有剛健明智之才終必自失故其才亦不足貴也人之貴乎剛者為其能立而不屈於欲也貴乎明者為其能照而不失於正也既惑所欲而失其正何剛明之有為可賤也六二顛頥拂經于丘頥征凶女不能自處必從男隂不能獨立必從陽二隂柔不能自養待養於人者也天子養天下諸侯養一國臣食君上之祿民頼司牧之養皆以上養下理之正也二既不能自養必求養於剛陽若反下求於初則為顛倒故云顛頥顛則拂違經常不可行也若求養於丘則往必有凶丘在外而髙之物謂上九也卦止二陽既不可顛頥于初若求頥于上九往則有凶在頥之時相應則相養者也上非其應而往求養非道妄動是以凶也顛頥則拂經不獲其養爾妄求於上往則得凶也今有人才不足以自養見在上者勢力足以養人非其族類妄往求之取辱得凶必矣六二中正在他卦多吉而凶何也曰時然也隂柔既不足以自養初上二爻皆非其與故往求則悖理而得凶也象曰六二征凶行失類也征而從上則凶者非其類故也往求而失其類得凶宜矣行往也六三拂頥貞凶十年勿用无攸利頤之道唯正則吉三以隂柔之質而處不中正又在動之極是柔邪不正而動者也其養如此拂違於頤之正道是以凶也得頤之正則所養皆吉求養養人則合於義自養則成其徳三乃拂違正道故戒以十年勿用十數之終謂終不可用无所徃而利也象曰十年勿用道大悖也所以戒終不可用以其所由之道大悖義理也六四顛頤吉虎視眈眈其欲逐逐无咎四在人上大臣之位六以隂居之隂柔不足以自養况養天下乎初九以剛陽居下在下之賢也與四為應四又柔順而正是能順於初賴初之養也以上養下則為順今反求下之養顛倒也故曰顛頤然已不勝其任求在下之賢而順從之以濟其事則天下得其養而已无曠敗之咎故為吉也夫居上位者必有才徳威望為下民所尊畏則事行而衆心服從若或下易其上則政出而人違刑施而怨起輕於陵犯亂之由也六四雖能順從剛陽不廢厥職然質本隂柔賴人以濟人之所輕故必養其威嚴耽耽然如虎視則能重其體貌下不敢易又從於人者必有常若間或无繼則其政敗矣其欲謂所須用者必逐逐相繼而不乏則其事可濟若取於人而无繼則困窮矣既有威嚴又所施不窮故能无咎也二顛頤則拂經四則吉何也曰二在上而反求養於下下非其應類故為拂經四則居上位以貴下賤使在下之賢由已以行其道上下之志相應而施於民何吉如之自三以下養口體者也四以上養徳義者也以君而資養於臣以上位而賴養於下皆養德也象曰顛頤之吉上施光也顛倒求養而所以吉者盖得剛陽之應以濟其事􅆀已居上之徳施光明被于天下吉孰大焉六五拂經居貞吉不可渉大川六五頤之時居君位養天下者也然其隂柔之質才不足以養天下上有剛陽之賢故順從之賴其養己以濟天下君者養人者也反賴人之養是違拂於經常既以己之不足而順從於賢師傅上師傅之位也必居守貞固篤於委信則能輔翼其身澤及天下故吉也隂柔之質无貞剛之性故戒以能居貞則吉以隂柔之才雖􅀝賴剛賢能持循於平時不可處艱難變故之際故云不可渉大川也以成王之才不至甚柔弱也當管蔡之亂幾不保於周公况其下者乎故書曰王亦未敢誚公頼二公得終信故艱險之際非剛明之主不可恃也不得已而濟艱險者則有矣發此義者所以湥戒於為君也於上九則據為臣致身盡忠之道言故不同也象曰居貞之吉順以從上也居貞之吉者謂能堅固順從於上九之賢以養天下也上九由頤厲吉利渉大川上九以剛陽之徳居師傅之任六五之君柔順而從於己賴已之養是當天下之任天下由之以養也以人臣而當是任必常懐危厲則吉也如伊尹周公何嘗不憂勤兢畏故得終吉夫以君之才不足而􅀝賴於己身當天下大任宜竭其才力濟天下之艱危成天下之治安故曰利渉大川得君如此之專受任如此之重苟不濟天下艱危何足稱委遇而謂之賢乎當盡誠竭力而不顧慮然惕厲則不可忘也象曰由頤厲吉大有慶也若上九之當大任如是能兢畏如是天下被其徳澤是大有福慶也巽下兑上大過序卦曰頤者養也不養則不可動故受之以大過凡物養而後能成成則能動動則有過大過所以次頤也為卦上兑下巽澤在木上滅木也澤者潤養於木乃至滅沒於木為大過之義大過者陽過也故為大者過過之大與大事過也聖賢道徳功業大過於人凡事之大過於常者皆是也夫聖人盡人道非過於理也其制事以天下之正理矯失之用小過於中者則有之如行過乎恭䘮過乎哀用過乎儉是也盖矯之小過而後能及於中乃求中之用也所謂大過者常事之大者耳非有過於理也惟其大故不常見以其比常所見者大故謂之大過如堯舜之禪譲湯武之放伐皆由道也道无不中无不常以世人所不常見故謂之大過於常也大過棟橈利有攸往亨小過隂過於上下大過陽過於中陽過於中而上下弱矣故為棟橈之象棟取其勝重四陽聚於中可謂重矣九三九四皆取棟象謂任重也橈取其本末弱中強而本末弱是以橈也隂弱而陽強君子盛而小人衰故利有攸往而亨也棟今人謂之檁彖曰大過大者過也大者過謂陽過也在事為事之大者過與其過之大棟橈本末弱也謂上下二隂衰弱陽盛則隂衰故為大者過在小過則曰小者過隂過也剛過而中巽而説行利有攸往乃亨言卦才之善也剛雖過而二五皆得中是處不失中道也下巽上兑是以巽順和説之道而行也在大過之時以中道巽説而行故利有攸往乃所以能亨也大過之時大矣哉大過之時其事甚大故贊之曰大矣哉如立非常之大事興百世之大功成絶俗之大徳皆大過之事也象曰澤滅木大過君子以獨立不懼遯世无悶澤潤養於木者也乃至滅沒於木則過甚矣故為大過君子觀大過之象以立其大過人之行君子所以大過人者以其能獨立不懼遯世无悶也天下非之而不顧獨立不懼也舉世不見知而不悔遯世无悶也如此然後能自守所以為大過人也初六藉用白茅无咎初以隂柔巽體而處下過于畏慎者也以柔在下用茅藉物之象不錯諸地而藉以茅過於慎也是以无咎茅之為物雖薄而用可重者以用之能成敬慎之道也慎守斯術而行豈有失乎大過之用也繫辭云苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其无所失矣言敬慎之至也茅雖至薄之物然用之可甚重以之藉薦則為重慎之道是用之重也人之過於敬慎為之非難而可以保其安而无過苟能慎斯道推而行之於事其无所失矣象曰藉用白茅柔在下也以隂柔處卑下之道惟當過於敬慎而已以柔在下為以茅藉物之象敬慎之道也九二枯楊生稊老夫得其女妻无不利陽之大過比隂則合故二與五皆有生象九二當大過之初得中而居柔與初密比而相與初既切比於二二復无應於上其相與可知是剛過之人而能以中自處用柔相濟者也過剛則不能有所為九三是也得中用柔則能成大過之功九二是也楊者陽氣易感之物陽過則枯矣楊枯槁而復生稊陽過而未至於極也九二陽過而與初老夫得女妻之象老夫而得女妻則能成生育之功二得中居柔而與初故能復生稊而无過極之失无所不利也在大過陽爻居隂則善二與四是也二不言吉方言无所不利未遽至吉也稊根也劉琨勸進表云生繁華於枯荑謂枯根也鄭𤣥易亦作荑字與稊同象曰老夫女妻過以相與也老夫之説少女少女之順老夫其相與過於常分謂九二初六隂陽相與之和過於常也九三棟橈凶夫居大過之時興大過之功立大過之事非剛柔得中取於人以自輔則不能也既過於剛強則不能與人同常常之功尚不能獨立况大過之事乎以聖人之才雖小事必取於人當天下之大任則可知矣九三以大過之陽復以剛自居而不得中剛過之甚者也以過甚之剛動則違於中和而拂於衆心安能當大過之任乎故不勝其任如棟之橈傾敗其室是以凶也取棟為象者以其无輔而不能勝重任也或曰三巽體而應於上豈无用柔之象乎曰言易者貴乎識勢之重輕時之變易三居過而用剛巽既終而且變豈復有用柔之義應者謂志相從也三方過剛上能繫其志乎象曰棟橈之凶不可以有輔也剛強之過則不能取於人人亦不能親輔之如棟橈折不可支輔也棟當室之中不可加助是不可以有輔也九四棟隆吉有它吝四居近君之位當大過之任者也居柔為能用柔相濟既不過剛則能勝其任如棟之隆起是以吉也隆起取不下橈之義大過之時非陽剛不能濟以剛處柔為得宜矣若又與初六之隂相應則過也既剛柔得宜而志復應隂是有它也有它則有累於剛雖未至於大害亦可吝也盖大過之時動則過也有它謂更有它志吝為不足之義謂可少也或曰二比初則无不利四若應初則為吝何也曰二得中而比於初為以柔相濟之義四與初為正應志相繫者也九既居四剛柔得宜矣復牽繫於隂以害其剛則可吝也象曰棟隆之吉不橈乎下也棟隆起則吉不橈曲以就下也謂不下繫於初也九五枯楊生華老婦得其士夫无咎无譽九五當大過之時本以中正居尊位然下无應助固不能成大過之功而上比過極之隂其所相濟者如枯楊之生華枯楊下生根稊則能復生如大過之陽興成事功也上生華秀雖有所發无益於枯也上六過極之隂老婦也五雖非少比老婦則為壯矣於五无所賴也故反稱婦得過極之隂得陽之相濟不為无益也以士夫而得老婦雖无罪咎殊非羙也故云无咎无譽象復言其可醜也象曰枯楊生華何可久也老婦士夫亦可醜也枯楊不生根而生華旋復枯矣安能久乎老婦而得士夫豈能成生育之功為可醜也上六過渉滅頂凶无咎上六以隂柔處過極是小人過常之極者也小人之所謂大過非能為大過人之事也直過常越理不恤危亡履險蹈禍而已如過渉於水至滅沒其頂其凶可知小人狂躁以自禍盖其宜也復將何尤故曰无咎言自為之无所怨咎也因澤之象而取渉義象曰過渉之凶不可咎也過渉至溺乃自為之不可以有咎也言无所怨咎坎下坎上習坎序卦物不可以終過故受之以坎坎者䧟也理无過而不已過極則必䧟坎所以次大過也習謂重習他卦雖重不加其名獨坎加習者見其重險險中復有險其義大也卦中一陽上下二隂陽實隂虚上下无據一陽䧟於二隂之中故為坎䧟之義陽居隂中則為䧟隂居陽中則為麗凡陽在上者止之象在中䧟之象在下動之象隂在上説之象在中麗之象在下巽之象䧟則為險習重也如學習温習皆重復之義也坎䧟也卦之所言處險難之道坎水也一始於中有生之最先者也故為水䧟水之體也習坎有孚維心亨行有尚陽實在中為中有孚信維心亨維其心誠一故能亨通至誠可以通金石蹈水火何險難之不可亨也行有尚謂以誠一而行則能出險有可嘉尚謂有功也不行則常在險中矣彖曰習坎重險也水流而不盈行險而不失其信習坎者謂重險也上下皆坎兩險相重也初六云坎窞是坎中之坎重險也水流而不盈陽動於險中而未出於險乃水性之流行而未盈於坎既盈則出乎坎矣行險而不失其信陽剛中實居險之中行險而不失其信者也坎中實水就下皆為信義有孚也維心亨乃以剛中也維其心可以亨通者乃以其剛中也中實為有孚之象至誠之道何所不通以剛中之道而行則可以濟險難而亨通也行有尚往有功也以其剛中之才而往則有功故可嘉尚若止而不行則常在險中矣坎以能行為功天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉髙不可升者天之險也山川丘陵地之險也王公君人者觀坎之象知險之不可陵也故設為城郭溝池之險以守其國保其民人是有用險之時其用甚大故贊其大矣哉山河城池設險之大端也若夫尊卑之辨貴賤之分明等威異物采凡所以杜絶陵僣限隔上下者皆體險之用也象曰水洊至習坎君子以常徳行習教事坎為水水流仍洊而至兩坎相習水流仍洊之象也水自涓滴至于尋丈至于江海洊習而不驟者也其因勢就下信而有常故君子觀坎水之象取其有常則常久其徳行人之徳行不常則偽也故當如水之有常取其洊習相受則以習熟其教令之事夫發政行教必使民熟於聞聴然後能從故三令五申之若驟告未喻遽責其從雖嚴刑以驅之不能也故當如水之洊習初六習坎入于坎窞凶初以隂柔居坎險之下柔弱无援而處不得當非能出乎險也唯益䧟於湥險耳窞坎中之䧟處已在習坎中更入坎窞其凶可知象曰習坎入坎失道凶也由習坎而更入坎窞失道也是以凶能出於險乃不失道也九二坎有險求小得二當坎險之時陷上下二隂之中乃至險之地是有險也然其剛中之才雖未能出乎險中亦可小自濟不至如初益陷入于湥險是所求小得也君子處險難而自能保者剛中而已剛則才足自衞中則動不失宜象曰求小得未出中也方為二隂所陷在險之地以剛中之才不至陷于湥險是所求小得然未能出坎中之險也六三來之坎坎險且枕入于坎窞勿用六三在坎陷之時以隂柔而居不中正其處不善進退與居皆不可者也来下則入于險之中之上則重險也退来與進之皆險故云来之坎坎既進退皆險而居亦險枕謂支倚居險而支倚以處不安之甚也所處如此唯益入於湥險耳故云入于坎窞如三所處之道不可用也故戒勿用象曰來之坎坎終无功也進退皆險處又不安若用此道當益入于險終豈能有功乎以隂柔處不中正雖平易之地尚致悔咎况處險乎險者人之所欲出也必得其道乃能去之求去而失其道益困窮耳故聖人戒如三所處不可用也六四樽酒簋貳用缶納約自牖終无咎六四隂柔而下无助非能濟天下之險者以其在髙位故言為臣處險之道大臣當險難之時唯至誠見信於君其交固而不可間又能開明君心則可保无咎矣夫欲上之篤信唯當盡其質實而已多儀而尚飾莫如燕亨之禮故以燕享喻之言當不尚浮飾唯以質實所用一樽之酒二簋之食復以瓦缶為器質之至也其質實如此又須納約自牖納約謂進結於君之道牖開通之義室之暗也故設牖所以通明自牖言自通明之處以况君心所明處詩云天之牖民如壎如篪毛公訓牖為道亦開通之謂人臣以忠信善道結於君心必自其所明處乃能入也人心有所蔽有所通所蔽者暗處也所通者明處也當就其明處而告之求信則易也故云納約自牖能如是則雖艱險之時終得无咎也且如君心蔽於荒樂唯其蔽也故爾雖力詆其荒樂之非如其不省何必於所不蔽之事推而及之則能悟其心矣自古能諫其君者未有不因其所明者也故訐直強勁者率多取忤而温厚明辯者其説多行且如漢祖愛戚姬將易太子是其所蔽也羣臣争之者衆矣嫡庶之義長幼之序非不明也如其蔽而不察何四老者髙祖素知其賢而重之此其不蔽之明心也故因其所明而及其事則悟之如反手且四老人之力孰與張良羣公卿及天下之士其言之切孰與周昌叔孫通然而不從彼而從此者由攻其蔽與就其明之異耳又如趙王太后愛其少子長安君不肯使質於齊此其蔽於私愛也大臣諫之雖強既曰蔽矣其能聴乎愛其子而欲使之長久富貴者其心之所明也故左師觸龍因其明而導之以長久之計故其聴也如響非惟告於君者如此為教者亦然夫教必就人之所長所長者心之所明也從其心之所明而入然後推及其餘孟子所謂成徳達才是也象曰樽酒簋貳剛柔際也象只舉首句如此比多矣樽酒簋貳質實之至剛柔相際接之道能如此則可終保无咎君臣之交能固而常者在誠實而已剛柔指四與五謂君臣之交際也九五坎不盈袛既平元咎九五在坎之中是不盈也盈則乎而出矣袛宜音柢抵也復卦云无袛悔必抵於己平則无咎既曰不盈則是未平而尚在險中未得无咎也以九五剛中之才居尊位宜可以濟於險然下无助也二陷於險中未能出餘皆隂柔无濟險之才人君雖才安能獨濟天下之險居君位而不能致天下出於險則為有咎必袛既平乃得无咎象曰坎不盈中未大也九五剛中之才而得尊位當濟天下之險難而坎尚不盈乃未能平乎險難是其剛中之道未光大也險難之時非君臣恊力其能濟乎五之道未大以无臣也人君之道不能濟天下之險難則為未大不稱其位也上六繫用徽纆寘于叢棘三嵗不得凶上六以隂柔而居險之極其陷之湥者也以其陷之湥取牢獄為喻如繫縛之以徽纆因寘于叢棘之中隂柔而陷之湥其不能出矣故云至于三嵗之久不得免也其凶可知象曰上六失道凶三嵗也以隂柔而自處極險之地是其失道也故其凶至於三嵗也三嵗之久而不得免焉終凶之辭也言久有曰十有曰三隨其事也陷于獄至于三嵗久之極也他卦以年數言者亦各以其事也如三嵗不興十年乃字是也離下離上離序卦坎者陷也陷必有所麗故受之以離離者麗也陷於險難之中則必有所附麗理自然也離所以次坎也離麗也明也取其隂麗於上下之陽則為附麗之義取其中虚則為明義離為火火體虚麗於物而明者也又為日亦以虚明之象離利貞亨畜牝牛吉離麗也萬物莫不皆有所麗有形則有麗矣在人則為所親附之人所由之道所主之事皆箕所麗也人之所麗利於貞正得其正則可以亨通故曰離利貞亨畜牝牛吉牛之性順而又牝焉順之至也既附麗於正必能順於正道如牝牛則吉也畜牝牛謂養其順徳人之順徳由養以成既麗於正當養習以成其順徳也彖曰離麗也日月麗乎天百榖草木麗乎土離麗也謂附麗也如日月則麗於天百榖草木則麗於土萬物莫不各有所麗天地之中无无麗之物在人當審其所麗麗得其正則能亨也重明以麗乎正乃化成天下以卦才言也上下皆離重明也五二皆處中正麗乎正也君臣上下皆有明徳而處中正可以化天下成文明之俗也柔麗乎中正故亨是以畜牝牛吉也二五以柔順麗於中正所以能亨人能養其至順以麗中正則吉故曰畜牝牛吉也或曰二則中正矣五以隂居陽得為正乎曰離主於所麗五中正之位六麗於正位乃為正也學者知時義而不失輕重則可以言易矣象曰明兩作離大人以繼明照于四方若云兩明則是二明不見繼明之義故云明兩明而重兩謂相繼也作離明兩而為離繼明之義也震巽之類亦取洊隨之義然離之義尤重也大人以徳言則聖人以位言則王者大人觀離明相繼之象以世繼其明徳照臨于四方大凡以明相繼皆繼明也舉其大者故以世襲繼照言之初九履錯然敬之无咎陽固好動又居下而離體陽居下則欲進離性炎上志在上麗幾於躁動其履錯然謂交錯也雖未進而跡已動矣動則失居下之分而有咎也然其剛明之才若知其義而敬慎之則不至於咎矣初在下无位者也明其身之進退乃所麗之道也其志既動不能敬慎則妄動是不明所麗乃有咎也象曰履錯之敬以辟咎也履錯然欲動而知敬慎不敢進所以求辟免過咎也居明而剛故知而能辟不剛明則妄動矣六二黄離元吉二居中得正麗於中正也黄中之色文之羙也文明中正羙之盛也故云黄離以文明中正之徳上同於文明中順之君其明如是所麗如是大善之吉也象曰黄離元吉得中道也所以元吉者以其得中道也不云正者離以中為重所以成文明由中也正在其中矣九三日昃之離不鼓缶而歌則大耋之嗟凶八純卦皆有二體之義乾内外皆健坤上下皆順震威震相繼巽上下順隨坎重險相習離二明繼照艮内外皆止兑彼已相説而離之義在人事最大九三居下體之終是前明將盡後明當繼之時人之始終時之革易也故為日昃之離日下昃之明也昃則將沒矣以理言之盛必有衰始必有終常道也達者順理為樂缶常用之器也鼓缶而歌樂其常也不能如是則以大耋為嗟憂乃為凶也大耋傾沒也人之終盡達者則知其常理樂天而已遇常皆樂如鼓缶而歌不達者則恐怛有將盡之悲乃大耋之嗟為其凶也此處死生之道也耋與昳同象曰日昃之離何可久也日既傾昃明能久乎明者知其然也故求人以繼其事退處以休其身安常處順何足以為凶也九四突如其來如焚如死如棄如九四離下體而升上體繼明之初故言繼承之義在上而近君繼承之地也以陽居離體而處四剛躁而不中正且重剛以不正而剛盛之勢突如而来非善繼者也夫善繼者必有巽讓之誠順承之道若舜唘然今四突如其来失善繼之道也又承六五隂柔之君其剛盛陵爍之勢氣焰如焚然故云焚如四之所行不善如此必被禍害故曰死如失繼紹之義承上之道皆逆徳也衆所棄絶故云棄如至於死棄禍之極矣故不假言凶也象曰突如其来如无所容也上陵其君不順所承人惡衆棄天下所不容也六五出涕沱若戚嗟若吉六五居尊位而守中有文明之徳可謂善矣然以柔居上在下无助獨附麗於剛強之間危懼之勢也唯其明也故能畏懼之湥至於出涕憂慮之湥至于戚嗟所以能保其吉也出涕戚嗟極言其憂懼之湥耳時當然也居尊位而文明知憂畏如此故得吉若自恃其文明之徳與所麗中正泰然不懼則安能保其吉也象曰六五之吉離王公也六五之吉者所麗得王公之正位也據在上之勢而明察事理畏懼憂虞以持之所以能吉也不然豈能安乎上九王用出征有嘉九以陽居上在離之終剛明之極者也明則能照剛則能斷能照足以察邪惡能斷足以行威刑故王者宜用如是剛明以辨天下之邪惡而行其征伐則有嘉羙之功也征伐用刑之大者折首獲匪其醜无咎夫明極則无微不照斷極則无所寛宥不約之以中則傷於嚴察矣去天下之惡若盡究其漸㴎詿誤則何可勝誅所傷殘亦甚矣故但當折取其魁首所執獲者非其醜類則无殘暴之咎也書曰殲厥渠魁脅從罔治象曰王用出征以正邦也王者用此上九之徳明照而剛斷以察除天下之惡所以正治其邦國剛明居上之道也伊川易傳卷二
