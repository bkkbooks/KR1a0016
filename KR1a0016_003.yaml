body:
  text: 伊川易傳卷三宋程子撰周易下經艮下兊上咸序卦有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯天地萬物之本夫婦人倫之始所以上經首乾坤下經首咸繼以恆也天地二物故二卦分為天地之道男女交合而成夫婦故咸與恆皆二體合為夫婦之義咸感也以說為主恆常也以正為本而說之道自有正也正之道固有說焉㢲而動剛柔皆應說也咸之為卦兊上艮下少女少男也男女相感之深莫如少者故二少為咸也艮體篤實止為誠慤之義男志篤實以下交女心說而上應男感之先也男先以誠感則女說而應也咸亨利貞取女吉咸感也不曰感者咸有皆義男女交相感也物之相感莫如男女而少復甚焉凡君臣上下以至萬物皆有相感之道物之相感則有亨通之理君臣能相感則君臣之道通上下能相感則上下之志通以至父子夫婦親戚朋友皆情意相感則和順而亨通事物皆然故咸有亨之理也利貞相感之道利在於正也不以正則入於惡矣如夫婦之以淫姣君臣之以媚說上下之以邪僻皆相感之不以正也取女吉以卦才言也卦有柔上剛下二氣感應相與止而說男下女之義以此義取女則得正而吉也彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也咸之義感也在卦則柔爻上而剛爻下柔上變剛而成兌剛下變柔而成艮隂陽相交為男女交感之義又兌女在上艮男居下亦柔上剛下也隂陽二氣相感相應而和合是相與也止而說止於說為堅慤之意艮止於下篤誠相下也兌說於上和說相應也以男下女和之至也相感之道如此是以能亨通而得正取女如是則吉也卦才如此大率感道利於正也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣既言男女相感之義復推極感道以盡天地之理聖人之用天地二氣交感而化生萬物聖人至誠以感億兆之心而天下和平天下之心所以和平由聖人感之也觀天地交感化生萬物之理與聖人感人心致和平之道則天地萬物之情可見矣感通之理知道者默而觀之可也象曰山下有澤咸君子以虛受人澤性潤下土性受潤澤在山上而其漸潤通徹是二物之氣相感通也君子觀山澤通氣之象而虛其中以受於人夫人中虛則能受實則不能入矣虛中者無我也中無私主則無感不通以量而容之擇合而受之非聖人有感必通之道也初六咸其拇初六在下卦之下與四相感以微處初其感未深豈能動於人故如人拇之動未足以進也拇足大指人之相感有淺深輕重之異識其時勢則所處不失其宜矣象曰咸其拇志在外也初志之動感於四也故曰在外志雖動而感未深如拇之動未足以進也六二咸其腓凶居吉二以隂居下與五為應故設咸腓之戒腓足肚行則先動足乃舉之非如腓之自動也二若不守道待上之求而如腓自動則躁妄自失所以凶也安其居而不動以待上之求則得進退之道而吉也二中正之人以其在咸而應五故為此戒復云居吉若安其分不自動則吉也象曰雖凶居吉順不害也二居中得正所應又中正其才本善以其在咸之時質柔而上應故戒以先動求君則凶居以自守則吉象復明之云非戒之不得相感唯順理則不害謂守道不先動也九三咸其股執其隨往吝九三以陽居剛有剛陽之才而為主於內居下之上是宜自得於正道以感於物而乃應於上六陽好上而說隂上居感說之極故三感而從之股者在身之下足之上不能自由隨身而動者也故以為象言九三不能自主隨物而動如股然其所執守者隨於物也剛陽之才感於所說而隨之如此而往可羞吝也象曰咸其股亦不處也志在隨人所執下也云亦者蓋象辭本不與易相比自作一處故諸爻之象辭意有相續者此言亦者承上爻辭也上云咸其拇志在外也雖凶居吉順不害也咸其股亦不處也前二隂爻皆有感而動三雖陽爻亦然故云亦不處也不處謂動也有剛陽之質而不能自主志反在於隨人是所操執者卑下之甚也九四貞吉悔亡憧憧往來朋從爾思感者人之動也故皆就人身取象拇取在下而動之微腓取先動股取其隨九四無所取直言感之道不言咸其心感乃心也四在中而居上當心之位故為感之主而言感之道貞正則吉而悔亡感不以正則有悔也又四說體居隂而應初故戒於貞感之道無所不通有所私係則害於感通乃有悔也聖人感天下之心如寒暑雨暘無不通無不應者亦貞而已矣貞者虛中無我之謂也憧憧往來朋從爾思夫貞一則所感無不通若往來憧憧然用其私心以感物則思之所及者有能感而動所不及者不能感也是其朋類則從其思也以有係之私心既主於一隅一事豈能廓然無所不通乎繫辭曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮夫子因咸極論感通之道夫以思慮之私心感物所感狹矣天下之理一也塗雖殊而其歸則同慮雖百而其致則一雖物有萬殊事有萬變統之以一則無能違也故貞其意則窮天下無不感通焉故曰天下何思何慮用其思慮之私心豈能無所不感也日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉往者屈也來者信也屈信相感而利生焉此以往來屈信明感應之理屈則有信信則有屈所謂感應也故日月相推而明生寒暑相推而歲成功用由是而成故曰屈信相感而利生焉感動也有感必有應凡有動皆為感感則必有應所應復為感感復有應所以不已也尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也前云屈信之理矣復取物以明之尺蠖之行先屈而後信蓋不屈則無信信而後有屈觀尺蠖則知感應之理矣龍蛇之藏所以存息其身而後能奮迅也不蟄則不能奮矣動息相感乃屈信也君子潛心精微之義入於神妙所以致其用也潛心精微積也致用施也積與施乃屈信也利用安身以崇德也承上文致用而言利其施用安處其身所以崇大其德業也所為合理則事正而身安聖人能事盡於此矣故云過此以往未之或知也窮神知化德之盛也既云過此以往未之或知更以此語終之云窮極至神之妙知化育之道德之至盛也無加於此矣象曰貞吉悔亡未感害也憧憧往來未光大也貞則吉而悔亡未為私感所害也係私應則害於感矣憧憧往來以私心相感感之道狹矣故云未光大也九五咸其脢無悔九居尊位當以至誠感天下而應二比上若係二而說上則偏私淺狹非人君之道豈能感天下乎脢背肉也與心相背而所不見也言能背其私心感非其所見而說者則得人君感天下之正而無悔也象曰咸其脢志末也戒使背其心而咸脢者為其存心淺末係二而說上感於私欲也上六咸其輔頰舌上隂柔而說體為說之主又居感之極是其欲感物之極也故不能以至誠感物而發見於口舌之間小人女子之常態也豈能動於人乎不直云口而云輔頰舌亦猶今人謂口過曰唇吻曰頰舌也輔頰舌皆所用以言也象曰咸其輔頰舌滕口說也唯至誠為能感人乃以柔說騰揚於口舌言說豈能感於人乎㢲下震上恆序卦夫婦之道不可以不久也故受之以恆恆久也咸夫婦之道夫婦終身不變者也故咸之後受之以恆也咸少男在少女之下以男下女是男女交感之義恆長男在長女之上男尊女卑夫婦居室之常道也論交感之情則少為親切論尊卑之序則長當謹正故兊艮為咸而震㢲為恆也男在女上男動于外女順于內人理之常故為恆也又剛上柔下雷風相與㢲而動剛柔相應皆恆之義也恆亨無咎利貞有攸往恆者常久也恆之道可以亨通恆而能亨乃無咎也恆而不可以亨非可恆之道也為有咎矣如君子之恆於善可恆之道也小人恆於惡失可恆之道也恆所以能亨由貞正也故云利貞夫所謂恆謂可恆久之道非守一隅而不知變也故利於有往唯其有往故能恆也一定則不能常矣又常久之道何往不利彖曰恆久也恆者長久之義剛上而柔下雷風相與㢲而動剛柔皆應恆卦才有此四者成恆之義也剛上而柔下謂乾之初上居於四坤之初下居於初剛爻上而柔爻下也二爻易處則成震㢲震上㢲下亦剛上而柔下也剛處上而柔居下乃恆道也雷風相與雷震則風發二者相須交助其勢故云相與乃其常也㢲而動下巽順上震動為以㢲而動天地造化恆久不已者順動而已㢲而動常久之道也動而不順豈能常也剛柔皆應一卦剛柔之爻皆相應剛柔相應理之常也此四者恆之道也卦所以為恆也恆亨無咎利貞久於其道也恆之道可致亨而無過咎但所恆宜得其正失正則非可恆之道也故曰久於其道其道可恆之正道也不恆其德與恆於不正皆不能亨而有咎也天地之道恆久而不已也天地之所以不已蓋有恆久之道人能恆於可恆之道則合天地之理也利有攸往終則有始也天下之理未有不動而能恆者也動則終而復始所以恆而不窮凡天地所生之物雖山嶽之堅厚未有能不變者也故恆非一定之謂也一定則不能恆矣唯隨時變易乃常道也故云利有攸往明理之如是懼人之泥於常也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣此極言常理日月隂陽之精氣耳唯其順天之道往來盈縮故能久照而不已得天順天理也四時隂陽之氣耳往來變化生成萬物亦以得天故常久不已聖人以常久之道行之有常而天下化之以成美俗也觀其所恆謂觀日月之久照四時之久成聖人之道所以能常久之理觀此則天地萬物之情理可見矣天地常久之道天下常久之理非知道者孰能識之象曰雷風恆君子以立不易方君子觀雷風相與成恆之象以常久其德自立於大中常久之道不變易其方所也初六浚恆貞凶無攸利初居下而四為正應柔暗之人能守常而不能度勢四震體而陽性以剛居髙志上而不下又為二三所隔應初之志異乎常矣而初乃求望之深是知常而不知變也浚深之也浚恆謂求恆之深也守常而不度勢求望於上之深堅固守此凶之道也泥常如此無所往而利矣世之責望故素而致悔咎者皆浚恆者也志既上求之深是不能恆安其處者也柔微而不恆安其處亦致凶之道凡卦之初終淺與深微與盛之地也在下而求深亦不知時矣象曰浚恆之凶始求深也居恆之始而求望於上之深是知常而不知度勢之甚也所以凶隂暗不得恆之宜也九二悔亡在恆之義居得其正則常道也九陽爻居隂位非常理也處非其常本當有悔而九二以中德而應於五五復居中以中而應中其處與動皆得中也是能恆久於中也能恆久於中則不失正矣中重於正中則正矣正不必中也九二以剛中之德而應於中德之勝也足以亡其悔矣人能識重輕之勢則可以言易矣象曰九二悔亡能久中也所以得悔亡者由其能恆久於中也人能恆久於中豈止亡其悔德之善也九三不恆其德或承之羞貞吝三陽爻居陽位處得其位是其常處也乃志從於上六不唯隂陽相應風復從雷於恆處而不處不恆之人也其德不恆則羞辱或承之矣或承之謂有時而至也貞吝固守不恆以為恆豈不可羞吝乎象曰不恆其德無所容也人既無恆何所容處當處之地既不能恆處非其據豈能恆哉是不恆之人無所容處其身也九四田無禽以陽居隂處非其位處非其所雖常何益人之所為得其道則久而成功不得其道則雖久何益故以田為喻言九之居四雖使恆久如田獵而無禽獸之獲謂徒用力而無功也象曰久非其位安得禽也處非其位雖久何所得乎以田為喻故云安得禽也六五恆其德貞婦人吉夫子凶五應於二以隂柔而應陽剛居中而所應又中隂柔之正也故恆久其德則為貞也夫以順從為恆者婦人之道在婦人則為貞故吉若丈夫而以順從於人為恆則失其剛陽之正乃凶也五君位而不以君道言者如六五之義在大夫猶凶况人君之道乎在它卦六居君位而應剛未為失也在恆故不可耳君道豈可以柔順為恆也象曰婦人貞吉從一而終也夫子制義從婦凶也如五之從二在婦人則為正而吉婦人以從為正以順為德當終守於從一夫子則以義制者也從婦人之道則為凶也上六振恆凶六居恆之極在震之終恆極則不常震終則動極以隂居上非其安處又隂柔不能堅固其守皆不常之義也故為振恆以振為恆也振者動之速也如振衣如振書抖擻運動之意在上而其動無節以此為恆其凶宜矣象曰振恆在上大無功也居上之道必有恆德乃能有功若躁動不常豈能有所成乎居上而不恆其凶甚矣象又言其不能有所成立故曰大無功也艮下乾上遁序卦恆者久也物不可以久居其所故受之以遁遁者退也夫久則有去相須之理也遁所以繼恆也遁退也避也去之之謂也為卦天下有山天在上之物陽性上進山髙起之物形雖髙起體乃止物有上陵之象而止不進天乃上進而去之下陵而上去是相違遁故為遁去之義二隂生於下隂長將盛陽消而退小人漸盛君子退而避之故為遁也遁亨小利貞遁者隂長陽消君子遁藏之時也君子退藏以伸其道道不屈則為亨故遁所以有亨也在事亦有由遁避而亨者雖小人道長之時君子知幾退避固善也然事有不齊與時消息無必同也隂柔方長而未至於甚盛君子尚有遲遲致力之道不可大貞而尚利小貞也彖曰遁亨遁而亨也小人道長之時君子遁退乃其道之亨也君子遁藏所以伸道也此言處遁之道自剛當位而應以下則論時與卦才尚有可為之理也剛當位而應與時行也雖遁之時君子處之未有必遁之義五以剛陽之德處中正之位又下與六二以中正相應雖隂長之時如卦之才尚當隨時消息苟可以致其力無不至誠自盡以扶持其道未必於遁藏而不為故曰與時行也小利貞浸而長也遁之時義大矣哉當隂長之時不可大貞而尚小利貞者蓋隂長必以浸漸未能遽盛君子尚可小貞其道所謂小利貞扶持使未遂亡也遁者隂之始長君子知微故當深戒而聖人之意未便遽已也故有與時行小利貞之教聖賢之於天下雖知道之將廢豈肯坐視其亂而不救必區區致力於未極之間強此之衰艱彼之進圖其暫安苟得為之孔孟之所屑為也王允謝安之於漢晉是也若有可變之道可亨之理更不假言也此處遁時之道也故聖人贊其時義大矣哉或久或速其義皆大也象曰天下有山遁君子以逺小人不惡而嚴天下有山山下起而乃止天上進而相違是遁避之象也君子觀其象以避逺乎小人逺小人之道若以惡聲厲色適足以致其怨忿唯在乎矜莊威嚴使知敬畏則自然逺矣初六遁尾厲勿用有攸往他卦以下為初遁者往遁也在前者先進故初乃為尾尾在後之物也遁而在後不及者也是以危也初以柔處微既已後矣不可往也往則危矣微者易於晦藏往既有危不若不往之無災也象曰遁尾之厲不往何災也見幾先遁固為善也遁而為尾危之道也往既有危不若不往而晦藏可免於災處微故也古人處微下隱亂世而不去者多矣六二執之黃牛之革莫之勝說二與五為正應雖在相違遁之時二以中正順應於五五以中正親合於二其交自固黃中色牛順物革堅固之物二五以中正順道相與其固如執係之以牛革也莫之勝說謂其交之固不可勝言也在遁之時故極言之象曰執用黃牛固志也上下以中順之道相固結其心志甚堅如執之以牛革也九三係遁有疾厲畜臣妾吉陽志說隂三與二切比係乎二者也遁貴速而逺有所係纍則安能速且逺也害於遁矣故為有疾也遁而不速是以危也臣妾小人女子懷恩而不知義親愛之則忠其上係戀之私恩懷小人女子之道也故以畜養臣妾則得其心為吉也然君子之待小人亦不如是也三與二非正應以昵比相親非待君子之道若以正則雖係不得為有疾蜀先主之不忍棄士民是也雖危為無咎矣象曰係遁之厲有疾憊也畜臣妾吉不可大事也遁而有係纍必以困憊致危其有疾乃憊也蓋力亦不足矣以此昵愛之心畜養臣妾則吉豈可以當大事乎九四好遁君子吉小人否四與初為正應是所好愛者也君子雖有所好愛義苟當遁則去而不疑所謂克己復禮以道制欲是以吉也小人則不能以義處昵於所好牽於所私至於陷辱其身而不能已故在小人則否也否不善也四乾體能剛斷者聖人以其處隂而有係故設小人之戒恐其失於正也象曰君子好遁小人否也君子雖有好而能遁不失於義小人則不能勝其私意而至於不善也九五嘉遁貞吉九五中正遁之嘉美者也處得中正之道時止時行乃所謂嘉美也故為貞正而吉九五非無係應然與二皆以中正自處是其心志及乎動止莫非中正而無私係之失所以為嘉也在彖則槩言遁時故云與時行小利貞尚有濟遁之意於爻至五遁將極矣故唯以中正處遁言之遁非人君之事故不主君位言然人君之所避逺乃遁也亦在中正而已象曰嘉遁貞吉以正志也志正則動必由正所以為遁之嘉也居中得正而應中正是其志正也所以為吉人之遁也止也唯在正其志而已矣上九肥遁無不利肥者充大寬裕之意遁者唯飄然逺逝無所係滯之為善上九乾體剛斷在卦之外矣又下無所係是遁之逺而無纍可謂寬綽有餘裕也遁者窮困之時也善處則為肥矣其遁如此何所不利象曰肥遁無不利無所疑也其遁之逺無所疑滯也蓋在外則已逺無應則無纍故為剛决無疑也乾下震上大壯序卦遁者退也物不可以終遁故受之以大壯遁為違去之義壯為進盛之義遁者隂長而陽遁也大壯陽之壯盛也衰則必盛消息相須故既遁則必壯大壯所以次遁也為卦震上乾下乾剛而震動以剛而動大壯之義也剛陽大也陽長已過中矣大者壯盛也又雷之威震而在天上亦大壯之義也大壯利貞大壯之道利於貞正也大壯而不得其正強猛之為耳非君子之道壯盛也彖曰大壯大者壯也剛以動故壯所以名大壯者謂大者壯也隂為小陽為大陽長以盛是大者壯也下剛而上動以乾之至剛而動故為大壯為大者壯與壯之大也大壯利貞大者正也正大而天地之情可見矣大者既壯則利於貞正正而大者道也極正大之理則天地之情可見矣天地之道常久而不已者至大至正也正大之理學者默識心通可也不云大正而云正大恐疑為一事也象曰雷在天上大壯君子以非禮弗履雷震於天上大而壯也君子觀大壯之象以行其壯君子之大壯者莫若克己復禮古人云自勝之謂強中庸於和而不流中立而不倚皆曰強哉矯赴湯火蹈白創武夫之勇可能也至於克己復禮則非君子之大壯不可能也故云君子以非禮弗履初九壯于趾征凶有孚初陽剛乾體而處下壯于進者也在下而用壯壯于趾也趾在下而進動之物九在下用壯而不得其中夫以剛處壯雖居上猶不可行况在下乎故征則其凶有孚孚信也謂以壯往則得凶可必也象曰壯于趾其孚窮也在最下而用壯以行可必信其窮困而凶也九二貞吉二雖以陽剛當大壯之時然居柔而處中是剛柔得中不過於壯得貞正而吉也或曰貞非以九居二為戒乎曰易取所勝為義以陽剛健體當大壯之時處得中道無不正也在四則有不正之戒人能識時義之輕重則可以學易矣象曰九二貞吉以中也所以貞正而吉者以其得中道也中則不失正况陽剛而乾體乎九三小人用壯君子用罔貞厲羝羊觸藩羸其角九三以剛居陽而處壯又當乾體之終壯之極者也極壯如此在小人則為用壯在君子則為用罔小人尚力故用其壯勇君子志剛故用罔罔無也猶云蔑也以其至剛蔑視於事而無所忌憚也君子小人以地言如君子有勇而無義為亂剛柔得中則不折不屈施於天下而無不宜苟剛之大過則無和順之德多傷莫與貞固守此則危道也凡物莫不用其壯齒者齧角者觸蹄者踶羊壯於首羝為喜觸故取為象羊喜觸藩籬以藩籬當其前也蓋所當必觸喜用壯如此必羸困其角矣猶人尚剛壯所當必用必至摧困也三壯甚如此而不至凶何也曰如三之為其往足以致凶而方言其危故未及於凶也凡可以致凶而未至者則曰厲也象曰小人用壯君子罔也在小人則為用其強壯之力在君子則為用罔志氣剛強蔑視於事靡所顧憚也九四貞吉悔亡藩決不羸壯于大輿之輹四陽剛長盛壯已過中壯之甚也然居四為不正方君子道長之時豈可有不正也故戒以貞則吉而悔亡蓋方道長之時小失則害亨進之勢是有悔也若在他卦重剛而居柔未必不為善也大過是也藩所以限隔也藩籬决開不復羸困其壯也髙大之車輪輹強壯其行之利可知故云壯于大輿之輹輹輪之要處也車之敗當在折輹輹壯則車強矣云壯于輹謂壯于進也輹與輻同象曰藩决不羸尚往也剛陽之長必至於極四雖已盛然其往未止也以至盛之陽用壯而進故莫有當之藩决開而不羸困其力也尚往其進不已也六五喪羊于易無悔羊羣行而喜觸以象諸陽並進四陽方長而並進五以柔居上若以力制則難勝而有悔唯和易以待之則羣陽無所用其剛是喪其壯于和易也如此則可以無悔五以位言則正以德言則中故能用和易之道使羣陽雖壯無所用也象曰喪羊于易位不當也所以必用柔和者以隂柔居尊位故也若以陽剛中正得尊位則下無壯矣以六五位不當也故設喪羊于易之義然大率治壯不可用剛夫君臣上下之勢不相侔也苟君之權足以制乎下則雖有強壯跋扈之人不足謂之壯也必人君之勢有所不足然後謂之治壯故治壯之道不可以剛也上六羝羊觸籓不能退不能遂無攸利艱則吉羝羊但取其用壯故隂爻亦稱之六以隂處震終而當壯極其過可知如羝羊之觸藩籬進則礙身退則妨角進退皆不可也才本隂柔故不能勝己以就義是不能退也隂柔之人雖極用壯之心然必不能終其壯有摧必縮是不能遂也其所為如此無所往而利也隂柔處壯不能固其守若遇艱困必失其壯失其壯則反得柔弱之分矣是艱則得吉也用壯則不利知艱而處柔則吉也居壯之終有變之義也象曰不能退不能遂不詳也艱則吉咎不長也非其處而處故進退不能是其自處之不詳慎也艱則吉柔遇艱難又居壯終自當變矣變則得其分過咎不長乃吉也坤下離上晉序卦物不可以終壯故受之以晉晉者進也物無壯而終止之理既盛壯則必進晉所以繼大壯也為卦離在坤上明出地上也日出於地升而益明故為晉晉進而光明盛大之意也凡物漸盛為進故彖云晉進也卦有有德者有無德者隨其宜也乾坤之外云元亨者固有也云利貞者所不足而可以有功也有不同者革漸是也隨卦可見晉之盛而無德者無用有也晉之明盛故更不言亨順乎大明無用戒正也晉康侯用錫馬蕃庶晝日三接晉為進盛之時大明在上而下體順附諸侯承王之象也故為康侯康侯者治安之侯也上之大明而能同德以順附治安之侯也故受其寵數錫之馬衆多也車馬重賜也蕃庶衆多也不唯錫與之厚又見親禮晝日之中至於三接言寵遇之至也晉進盛之時上明下順君臣相得在上而言則進於明盛在臣而言則進升髙顯受其光寵也彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也晉進也明進而盛也明出於地益進而盛故為晉所以不謂之進者進為前進不能包明盛之義明出地上離在坤上也坤麗於離以順麗於大明順德之臣上附於大明之君也柔進而上行凡卦離在上者柔居君位多云柔進而上行噬嗑暌鼎是也六五以柔居君位明而順麗為能待下寵遇親密之義是以為康侯用錫馬蕃庶晝日三接也大明之君安天下者也諸侯能順附天子之明德是康民安國之侯也故謂之康侯是以享寵錫而見親禮晝日之間三接見於天子也不曰公卿而曰侯天子治於上者也諸侯治於下者也在下而順附於大明之君諸侯之象也象曰明出地上晉君子以自昭明德昭明之也傳曰昭德塞違昭其度也君子觀明出地上而益明盛之象而以自昭其明德去蔽致知昭明德於己也明明德於天下昭明德於外也明明德在已故云自昭初六晉如摧如貞吉罔孚裕無咎初居晉之下進之始也晉如升進也摧如抑退也於始進而言遂其進不遂其進唯得正則吉也罔孚者在下而始進豈遽能深見信於上苟上未見信則當安中自守雍容寬裕無急於求上之信也苟欲信之心切非汲汲以失其守則悻悻以傷於義矣皆有咎也故裕則無咎君子處進退之道也象曰晉如摧如獨行正也裕無咎未受命也無進無抑唯獨行正道也寬裕則無咎者始欲進而未當位故也君子之於進退或遲或速唯義所當未嘗不裕也聖人恐後之人不達寬裕之義居位者廢職失守以為裕故特云初六裕則無咎者始進未受命當職任故也若有官守不信於上而失其職一日不可居也然事非一槩久速唯時亦容有為之兆者六二晉如愁如貞吉受兹介福于其王母六二在下上無應援以中正柔和之德非強於進者也故於進為可憂愁謂其進之難也然守其貞正則當得吉故云晉如愁如貞吉王母祖母也謂隂之至尊者指六五也二以中正之道自守雖上無應援不能自進然其中正之德久而必彰上之人自當求之蓋六五大明之君與之同德必當求之加之寵祿受介福於王母也介大也象曰受茲介福以中正也受兹介福以中正之道也人能守中正之道久而必亨况大明在上而同德必受大福也六三衆允悔亡以六居三不得中正宜有悔咎而三在順體之上順之極者也三隂皆順上者也是三之順上與衆同志衆所允從其悔所以亡也有順上向明之志而衆允從之何所不利或曰不由中正而與衆同得為善乎曰衆所允者必至當也况順上之大明豈有不善也是以悔亡蓋亡其不中正之失矣古人曰謀從衆則合天心象曰衆允之志上行也上行上順麗於大明也上從大明之君衆志之所同也九四晉如鼫鼠貞厲以九居四非其位也非其位而居之貪據其位者也貪處髙位既非所安而又與上同德順麗於上三隂皆在己下勢必上進故其心畏忌之貪而畏人者鼫鼠也故云晉如鼫鼠貪於非據而存畏忌之心貞固守此其危可知言貞厲者開有改之道也象曰鼫鼠貞厲位不當也賢者以正德宜在髙位不正而處髙位則為非據貪而懼失則畏人固處其地危可知也六五悔亡失得勿恤往吉無不利六以柔居尊位本當有悔以大明而下皆順附故其悔得亡也下既同德順附當推誠委任盡衆人之才通天下之志勿復自任其明恤其失得如此而往則吉而無不利也六五大明之主不患其不能明照患其用明之過至於察察失委任之道故戒以失得勿恤也夫私意偏任不察則有蔽盡天下之公豈當復用私察也象曰失得勿恤往有慶也以大明之德得下之附推誠委任則可以成天下之大功是往而有福慶也上九晉其角維用伐邑厲吉無咎貞吝角剛而居上之物上九以剛居卦之極故取角為象以陽居上剛之極也在晉之上進之極也剛極則有強猛之過進極則有躁急之失以剛而極於進失中之甚也無所用而可維獨用於伐邑則雖厲而吉且無咎也伐四方者治外也伐其居邑者治內也言伐邑謂內自治也人之自治剛極則守道愈固進極則遷善愈速如上九者以之自治則雖傷於厲而吉且無咎也嚴厲非安和之道而於自治則有功也復云貞吝以盡其義極於剛進雖自治有功然非中和之德故於貞正之道為可吝也不失中正為貞象曰維用伐邑道未光也維用伐邑既得吉而無咎復云貞吝者貞道未光大也以正理言之猶可吝也夫道既光大則無不中正安有過也今以過剛自治雖有功矣然其道未光大故亦可吝聖人言盡善之道離下坤上明夷序卦晉者進也進必有所傷故受之以明夷夷者傷也夫進之不已必有所傷理自然也明夷所以次晉也為卦坤上離下明入地中也反晉成明夷故義與晉正相反晉者明盛之卦明君在上羣賢並進之時也明夷昏暗之卦暗君在上明者見傷之時也日入於地中明傷而昏暗也故為明夷明夷利艱貞君子當明夷之時利在知艱難而不失其貞正也在昏暗艱難之時而能不失其正所以為明君子也彖曰明入地中明夷內文明而外柔順以蒙大難文王以之明入於地其明滅也故為明夷內卦離離者文明之象外卦坤坤者柔順之象為人內有文明之德而外能柔順也昔者文王如是故曰文王以之當紂之昏暗乃明夷之時而文王內有文明之德外柔順以事紂蒙犯大難而內不失其明聖而外足以逺禍患此文王所用之道也故曰文王以之利艱貞晦其明也內難而能正其志箕子以之明夷之時利於處艱厄而不失其貞正謂能晦藏其明也不晦其明則被禍患不守其正則非賢明箕子當紂之時身處其國內切近其難故云內難然箕子能藏晦其明而自守其正志箕子所用之道也故曰箕子以之象曰明入地中明夷君子以蒞衆用晦而明明所以照君子無所不照然用明之過則傷於察太察則盡事而無含𢎞之度故君子觀明入地中之象於蒞衆也不極其明察而用晦然後能容物和衆衆親而安是用晦乃所以為明也若自任其明無所不察則已不勝其忿疾而無寬厚含容之德人情暌疑而不安失蒞衆之道適所以為不明也古之聖人設前旒屏樹者不欲明之盡乎隱也初九明夷于飛垂其翼君子于行三日不食有攸往主人有言初九明體而居明夷之初見傷之始也九陽明上升者也故取飛象昏暗在上傷陽之明使不得上進是于飛而傷其翼也翼見傷故垂大凡小人之害君子害其所以行者君子于行三日不食君子明照見事之微雖始有見傷之端未顯也君子則能見之矣故行去避之君子于行謂去其祿位而退藏也三日不食言困窮之極也事未顯而處甚艱非見幾之明不能也夫知幾者君子之獨見非衆人所能識也故明夷之始其見傷未顯而去之則世俗孰不疑怪故有所往適則主人有言也然君子不以世俗之見怪而遲疑其行也若俟衆人盡識則傷已及而不能去矣此薛方所以為明而揚雄所以不獲其去也或曰傷至於垂翼傷已明矣何得衆人猶未識也曰初傷之始也云垂其翼謂傷其所以飛爾其事則未顯也君子見幾故亟去之世俗之人未能見故異而非之如穆生之去楚申公白公且非之况世俗之人乎但譏其責小禮而不知穆生之去避胥靡之禍也當其言曰不去楚人將鉗我於市雖二儒者亦以為過甚之言也又如袁閎於黨事未起之前名德之士方鋒起而獨潛身土室故人以為狂生卒免黨錮之禍所往而人有言胡足怪也象曰君子于行義不食也君子遁藏而困窮義當然也唯義之當然故安處而無悶雖不食可也六二明夷夷于左股用拯馬壯吉六二以至明之才得中正而體順順時自處處之至善也雖君子自處之善然當隂暗小人傷明之時亦不免為其所傷但君子自處有道故不能深相傷害終能違避之爾足者所以行也股在脛足之上於行之用為不甚切左又非便用者手足之用以右為便唯蹶張用左蓋右立為本也夷于左股謂傷害其行而不甚切也雖然亦必自免有道拯用壯健之馬則獲免之速而吉也君子為隂暗所傷其自處有道故其傷不甚自拯有道故獲免之疾用拯之道不壯則被傷深矣故云馬壯則吉也二以明居隂暗之下所謂吉者得免傷害而已非謂可以有為於斯時也象曰六二之吉順以則也六二之得吉者以其順處而有法則也則謂中正之道能順而得中正所以處明傷之時而能保其吉也九三明夷于南狩得其大首不可疾貞九三離之上明之極也又處剛而進上六坤之上暗之極也至明居下而為下之上至暗在上而處窮極之地正相敵應將以明去暗者也斯義也其湯武之事乎南在前而明方也狩畋而去害之事也南狩謂前進而除害也當克獲其大首大首謂暗之魁首上六也三與上正相應為至明克至暗之象不可疾貞謂誅其元惡舊染汚俗未能遽革必有其漸革之遽則駭懼而不安故酒誥云惟殷之迪諸臣惟工乃湎于酒勿庸殺之姑惟教之至於既久尚曰餘風未殄是漸潰之俗不可以遽革也故曰不可疾貞正之不可急也上六雖非君位以其居上而暗之極故為暗之主謂之大首象曰南狩之志乃大得也夫以下之明除上之暗其志在去害而已如商周之湯武豈有意於利天下乎得其大首是能去害而大得其志矣志苟不然乃悖亂之事也六四入于左腹獲明夷之心于出門庭六四以隂居隂而在隂柔之體處近君之位是隂邪小人居髙位以柔邪順於君者也六五明夷之君位傷明之主也四以柔邪順從之以固其交夫小人之事君未有由顯明以道合者也必以隱僻之道自結於上右當用故為明顯之所左不當用故為隱僻之所人之手足皆以右為用世謂僻所為僻左是左者隱僻之所也四由隱僻之道深入其君故云入于左腹入腹謂其交深也其交之深故得其心凡姦邪之見信於其君皆由奪其心也不奪其心能無悟乎于出門庭既信之心而後行之於外也邪臣之事暗君必先蠱其心而後能行於外象曰入子左腹獲心意也入于左腹謂以邪僻之道入于君而得具心意也得其心所以終不悟也六五箕子之明夷利貞五為君位乃常也然易之取義變動隨時上六處坤之上而明夷之極隂暗傷明之極者也五切近之聖人因以五為切近至暗之人以見處之之義故不專以君位言上六隂暗傷明之極故以為明夷之主五切近傷明之主若顯其明則見傷害必矣故當如箕子之自晦藏則可以免於難箕子商之舊臣而同姓之親可謂切近於紂矣若不自晦其明被禍可必也故佯狂為奴以免於害雖晦藏其明而內守其正所謂內難而能正其志所以謂之仁與明也若箕子可謂貞矣以五隂柔故為之戒云利貞謂宜如箕子之貞固也若以君道言義亦如是人君有當含晦之時亦外晦其明而內正其志也象曰箕子之貞明不可息也箕子晦藏不失其貞固雖遭患難其明自存不可滅息也若逼禍患遂失其所守則是亡其明乃滅息也古之人如揚雄者是也上六不明晦初登于天後入于地上居卦之終為明夷之主又為明夷之極上至髙之地明在至髙本當逺照明既夷傷故不明而反昏晦也本居于髙明當及逺初登于天也乃夷傷其明而昏暗後入于地也上明夷之終又坤隂之終明傷之極者也象曰初登于天照四國也後入于地失則也初登于天居髙而明則當照及四方也乃被傷而昏暗是後入于地失明之道也失則失其道也離下㢲上家人序卦夷者傷也傷於外者必反於家故受之以家人夫傷困于外則必反於內家人所以次明夷也家人者家內之道父子之親夫婦之義尊卑長幼之序正倫理篤恩義家人之道也卦外㢲內離為風自火出火熾則風生風生自火自內而出也自內而出由家而及於外之象二與五正男女之位於內外為家人之道眀於內而㢲於外處家之道也夫人有諸身者則能施於家行於家者則能施於國至於天下治治天下之道蓋治家之道也推而行之於外耳故取自內而出之象為家人之義也文中子書以眀內齊外為義古今善之非取象之意也所謂齊乎㢲言萬物潔齊於㢲方非㢲有齊義也如戰乎乾乾非有戰義也家人利女貞家人之道利在女正女正則家道正矣夫夫婦婦而家道正獨云利女貞者夫正者身正也女正者家正也女正則男正可知矣彖曰家人女正位乎內男正位乎外男女正天地之大義也彖以卦才而言陽居五在外也隂居二處內也男女各得其正位也尊卑內外之道正合天地隂陽之大義也家人有嚴君焉父母之謂也家人之道必有所尊嚴而君長者謂父母也雖一家之小無尊嚴則孝敬衰無君長則法度廢有嚴君而後家道正家者國之則也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣父子兄弟夫婦各得其道則家道正矣推一家之道可以及天下故家正則天下定矣象曰風自火出家人君子以言有物而行有恆正家之本在正其身正身之道一言一動不可易也君子觀風自火出之象知事之由內而出故所言必有物所行必有恆也物謂事實恆謂常度法則德業之著於外由言行之謹於內也言慎行修則身正而家治矣初九間有家悔亡初家道之始也間謂防間法度也治其有家之始能以法度為之防間則不至於悔矣治家者治乎衆人也苟不間之以法度則人情流放必至於有悔失長幼之序亂男女之别傷恩義害倫理無所不至能以法度間之於始則無是矣故悔亡也九剛眀之才能間其家者也不云無悔者羣居必有悔以能間故亡耳象曰間有家志未變也間之於始家人志意未變動之前也正志未流散變動而間之則不傷恩不失義處家之善也是以悔亡志變而後治則所傷多矣乃有悔也六二無攸遂在中饋貞吉人之處家在骨肉父子之間大率以情勝理以恩奪義惟剛立之人則能不以私愛失其正理故家人卦大要以剛為善初三上是也六二以隂柔之才而居柔不能治於家者也故無攸遂無所為而可也夫以英雄之才尚有溺情愛而不能自守者况柔弱之人其能勝妻子之情乎如二之才若為婦人之道則其正也以柔順處中正婦人之道也故在中饋則得其正而吉也婦人居中而主饋者也故云中饋象曰六二之吉順以巽也二以隂柔居中正能順從而卑巽者也故為婦人之貞吉也九三家人嗃嗃悔厲吉婦子嘻嘻終吝嗃嗃未詳字義然以文義及音意觀之與嗷嗷相類又若急束之意九三在內卦之上主治乎內者也以陽居剛而不中雖得正而過乎剛者也治內過剛則傷於嚴急故家人嗃嗃然治家過嚴不能無傷故必悔於嚴厲骨肉恩勝嚴過故悔也雖悔於嚴厲未得寬猛之中然而家道齊肅人心祗畏猶為家之吉也若婦子嘻嘻則終至羞吝矣在卦非有嘻嘻之象蓋對嗃嗃而言謂與其失於放肆寧過於嚴也嘻嘻笑樂無節也自恣無節則終致敗家可羞吝也蓋嚴謹之過雖於人情不能無傷然苟法度立倫理正乃恩義之所存也若嘻嘻無度乃法度之所由廢倫理之所由亂安能保其家乎嘻嘻之甚則致敗家之凶但云吝者可吝之甚則至於凶故未遽言凶也象曰家人嗃嗃未失也婦子嘻嘻失家節也雖嗃嗃於治家之道未為甚失若婦子嘻嘻是無禮法失家之節家必亂矣六四富貴大吉六以㢲順之體而居四得其正位居得其正為安處之義㢲順於事而由正道能保有其富者也居家之道能保有其富則為大吉也四髙位而獨云富者於家而言髙位家之尊也能有其富是能保其家也吉孰大焉象曰富家大吉順在位也以㢲順而居正位正而㢲順能保有其富者也富家之大吉也九五王假有家勿恤吉九五男而在外剛而處陽居尊而中正又其應順正於內治家之至正至善者也王假有家五君位故以王言假至也極乎有家之道也夫王者之道修身以齊家家正則天下治矣自古聖王未有不以恭己正家為本故有家之道既至則不憂勞而天下治矣勿恤而吉也五恭己於外二正家於內內外同德可謂至矣象曰王假有家交相愛也王假有家之道者非止能使之順從而已必致其心化誠合夫愛其內助婦愛其刑家交相愛也能如是者文王之妃乎若身修法立而家未化未得為假有家之道也上九有孚威如終吉上卦之終家道之成也故極言治家之本治家之道非至誠不能也故必中有孚信則能常久而衆人自化為善不由至誠已且不能常守也况欲使人乎故治家以有孚為本治家者在妻孥情愛之間慈過則無嚴恩勝則掩義故家之患常在禮法不足而瀆漫生也長失尊嚴少忘恭順而家不亂者未之有也故必有威嚴則能終吉保家之終在有孚威如二者而已故於卦終言之象曰威如之吉反身之謂也治家之道以正身為本故云反身之謂爻辭謂治家當有威嚴而夫子又復戒云當先嚴其身也威嚴不先行於已則人怨而不服故云威如而吉者能自反於身也孟子所謂身不行道不行於妻子也兊下離上暌序卦家道窮必乖故受之以暌暌者乖也家道窮則暌乖離散理必然也故家人之後受之以暌也為卦上離下兊離火炎上兊澤潤下二體相違暌之義也又中少二女雖同居而所歸各異是其志不同行也亦為暌義暌小事吉暌者暌乖離散之時非吉道也以卦才之善雖處暌時而小事吉也彖曰暌火動而上澤動而下二女同居其志不同行彖先釋暌義次言卦才終言合暌之道而贊其時用之大火之性動而上澤之性動而下二物之性違異故為暌義中少二女雖同居其志不同行亦為暌義女之少也同處長則各適其歸其志異也言暌者本同也本不同則非暌也說而麗乎明柔進而上行得中而應乎剛是以小事吉卦才如此所以小事吉也兊說也離麗也又為明故為說順而附麗於明凡離在上而彖欲見柔居尊者則曰柔進而上行晉鼎是也方暌乖之時六五以柔居尊位有說順麗明之善又得中道而應剛雖不能合天下之暌成天下之大事亦可以小濟是於小事吉也五以明而應剛不能致大吉何也曰五隂柔雖應二而暌之時相與之道未能深固故二必遇主于巷五噬膚則無咎也天下暌散之時必君臣剛陽中正至誠協力而後能合也天地暌而其事同也男女暌而其志通也萬物暌而其事類也暌之時用大矣哉推物理之同以明暌之時用乃聖人合暌之道也見同之為同者世俗之知也聖人則明物理之本同所以能同天下而和合萬類也以天地男女萬物明之天髙地下其體暌也然陽降隂升相合而成化育之事則同也男女異質暌也而相求之志則通也生物萬殊暌也然而得天地之和禀隂陽之氣則相類也物雖異而理本同故天下之大羣生之衆暌散萬殊而聖人為能同之處暌之時合暌之用其事至大故云大矣哉象曰上火下澤暌君子以同而異上火下澤二物之性違異所以為暌離之象君子觀暌異之象於大同之中而知所當異也夫聖賢之處世在人理之常莫不大同於世俗所同者則有時而獨異蓋於秉彛則同矣於世俗之失則異也不能天同者亂常咈理之人也不能獨異者隨俗習非之人也要在同而能異耳中庸曰和而不流是也初九悔亡喪馬勿逐自復見惡人無咎九居卦初暌之始也在暌乖之時以剛動於下有悔可知所以得亡者九四在上亦以剛陽暌離無與自然同類相合同是陽爻同居下又當相應之位二陽本非相應者以在暌故合也上下相與故能亡其悔也在暌諸爻皆有應夫合則有暌本異則何暌唯初與四雖非應而同德相與故相遇馬者所以行也陽上行者也暌獨無與則不能行是喪其馬也四既與之合則能行矣是勿逐而馬復得也惡人與已乖異者也見者與相通也當暌之時雖同德者相與然小人乖異者至衆若棄絶之不幾盡天下以仇君子乎如此則失合𢎞之義致凶咎之道也又安能化不善而使之合乎故必見惡人則無咎也古之聖王所以能化姦凶為善良革仇敵為臣民者由弗絶也象曰見惡人以辟咎也暌離之時人情乖違求和合之且病其不能得也若以惡人而拒絶之則將衆仇於君子而禍咎至矣故必見之所以免避怨咎也無怨咎則有可合之道九二遇主于巷無咎二與五正應為相與者也然在暌乖之時隂陽相應之道衰而剛柔相戾之意勝學易者識此則知變通矣故二五雖正應當委曲以相求也二以剛中之德居下上應六五之君道合則志行成濟暌之功矣而居暌離之時其交非固二當委曲求於相遇覬其得合也故曰遇主于巷必能合而後無咎君臣暌離其咎大矣巷者委曲之途也遇者㑹逢之謂也當委曲相求期於㑹遇與之合也所謂委曲者以善道宛轉將就使合而已非枉已屈道也象曰遇主於巷未失道也當暌之時君心未合賢臣在下竭力盡誠期使之信合而已至誠以感動之盡力以扶持之明義理以致其知杜蔽惑以誠其意如是宛轉以求其合也遇非枉道迎逢也巷非邪僻曲徑也故夫子特云遇主于巷未失道也未非必也非必謂失道也六三見輿曵其牛掣其人天且劓無初有終隂柔於平時且不足以自立况當暌離之際乎三居二剛之間處不得其所安其見侵陵可知矣三以正應在上欲進與上合志而四阻於前二牽於後車牛所以行之具也輿曵牽於後也牛掣阻於前也在後者牽曵之而已當前者進者之所力犯也故重傷於上為四所傷也其人天且劓天髠首也劓截鼻也三從正應而四隔止之三雖隂柔處剛而志行故力進以犯之是以傷也天而又劓言重傷也三不合於二與四暌之時自無合義適合居剛守正之道也其於正應則暌極有終合之理始為二陽所厄是無初也後必得合是有終也掣從制從手執止之義也象曰見輿曵位不當也無初有終遇剛也以六居三非正也非正則不安又在二陽之間所以有如是艱厄由位不當也無初有終者終必與上九相遇而合乃遇剛也不正而合未有久而不離者也合以正道自無終暌之理故賢者順理而安行智者知幾而固守九四暌孤遇元夫交孚厲無咎九四當暌時居非所安無應而在二隂之間是暌離孤處者也以剛陽之德當暌離之時孤立無與必以氣類相求而合是以遇元夫也夫陽稱元善也初九當暌之初遂能與同德而亡暌之悔處暌之至善者也故目之為元夫猶云善士也四則過中為暌已甚不若初之善也四與初皆以陽處一卦之下居相應之位當暌乖之時各無應援自然同德相親故㑹遇也同德相遇必須至誠相與交孚各有孚誠也上下二陽以至誠相合則何時之不能行何危之不能濟故雖處危厲而無咎也當暌離之時孤居二隂之間處不當位危且有咎也以遇元夫而交孚故得無咎也象曰交孚無咎志行也初四皆陽剛君子當暌乖之時上下以至誠相交協志同力則其志可以行不止無咎而已卦辭但言無咎夫子又從而明之云可以行其志救時之暌也蓋以君子陽剛之才而至誠相輔何所不能濟也唯有君子則能行其志矣六五悔亡厥宗噬膚往何咎六以隂柔當暌離之時而居尊位有悔可知然而下有九二剛陽之賢與之為應以輔翼之故得悔亡厥宗其黨也謂九二正應也噬膚噬齧其肌膚而深入之也當暌之時非入之者深豈能合也五雖隂柔之才二輔以陽剛之道而深入之則可往而有慶復何過咎之有以周成之幼稚而興盛王之治以劉禪之昏弱而有中興之勢蓋由任賢聖之輔而姬公孔明所以入之者深也象曰厥宗噬膚往有慶也爻辭但言厥宗噬膚則可以往而無咎象復推明其義言人君雖已才不足若能信任賢輔使以其道深入於己則可以有為是往而有福慶也上九暌孤見豕負塗載鬼一車先張之弧後說之弧匪冦婚媾往遇雨則吉上居卦之終暌之極也陽剛居上剛之極也在離之上用明之極也暌極則咈戾而難合剛極則躁暴而不詳明極則過察而多疑上九有六三之正應實不孤而其才性如此自暌孤也如人雖有親黨而多自疑猜妄生乖離雖處骨肉親黨之間而常孤獨也上之與三雖為正應然居暌極無所不疑其見三如豕之汚穢而又背負泥塗見其可惡之甚也既惡之甚則猜成其罪惡如見載鬼滿一車也鬼本無形而見載之一車言其以無為有妄之極也物理極而必反以近明之如人適東東極矣動則西也如升高高極矣動則下也既極則動而必反也上之暌乖既極三之所處者正理大凡失道既極則必反正理故上於三始疑而終必合也先張之弧始疑惡而欲射之也疑之者妄也妄安能常故終必復於正三實無惡故後說弧而弗射暌極而反故與三非復為冦讐乃婚媾也此匪冦婚媾之語與他卦同而義則殊也隂陽交而和暢則為雨上於三始疑而暌暌極則不疑而合隂陽合而益和則為雨故云往遇雨則吉往者自此以往也謂既合而益和則吉也象曰遇雨之吉羣疑亡也雨者隂陽和也始暌而能終和故吉也所以能和者以羣疑盡亡也其始暌也無所不疑故云羣疑暌極而合則皆亡矣艮下坎上蹇序卦暌者乖也乖必有難故受之以蹇蹇者難也暌乖之時必有蹇難蹇所以次暌也蹇險阻之義故為蹇難為卦坎上艮下坎險也艮止也險在前而止不能進也前有險陷後有峻阻故為蹇也蹇利西南不利東北利見大人貞吉西南坤方坤地也體順而易東北艮方艮山也體止而險在蹇難之時利於順處平易之地不利止於危險也處順易則難可紓止於險則難益甚矣蹇難之時必有聖賢之人則能濟天下之難故利見大人也濟難者必以大正之道而堅固其守故貞則吉也凡處難者必在乎守貞正設使難不解不失正德是以吉也若遇難而不能固其守入於邪濫雖使苟免亦惡德也知義命者不為也彖曰蹇難也險在前也蹇難也蹇之為難如乾之為健若易之為難則義有未足蹇有險阻之義屯亦難也困亦難也同為難而義則異屯者始難而未得通困者力之窮蹇乃險阻艱難之義各不同也險在前也坎險在前下止而不得進故為蹇見險而能止知矣哉以卦才言處蹇之道也上險而下止見險而能止也犯險而進則有悔咎故美其能止為知也方蹇難之時唯能止為善故諸爻除五與二外皆以往為失來為得也蹇利西南往得中也不利東北其道窮也蹇之時利於處平易西南坤方為順易東北艮方為險阻九上居五而得中正之位是往而得平易之地故為利也五居坎險之中而謂之平易者蓋卦本坤由五往而成坎故但取往而得中不取成坎之義也方蹇而又止危險之地則蹇益甚矣故不利東北其道窮也謂蹇之極也利見大人往有功也當位貞吉以正邦也蹇難之時非聖賢不能濟天下之蹇故利於見大人也大人當位則成濟蹇之功矣往而有功也能濟天下之蹇者唯大正之道夫子又取卦才而言蹇之諸爻除初外餘皆當正位故為貞正而吉也初六雖以隂居陽而處下亦隂之正也以如此正道正其邦可以濟於蹇矣蹇之時用大矣哉處蹇之時濟蹇之道其用至大故云大矣哉天下之難豈易平也非聖賢不能其用可謂大矣順時而處量險而行從平易之道由至正之理乃蹇之時用也象曰山上有水蹇君子以反身修德山之峻阻上復有水坎水為險陷之象上下險阻故為蹇也君子觀蹇難之象而以反身修德君子之遇艱阻必反求諸己而益自修孟子曰行有不得者皆反求諸己故遇艱蹇必自省於身有失而致之乎是反身也有所未善則改之無歉於心則加勉乃自修其德也君子修德以俟時而已初六往蹇來譽六居蹇之初往進則益入於蹇往蹇也當蹇之時以隂柔無援而進其蹇可知來者對往之辭上進則為往不進則為來止而不進是有見幾知時之美來則有譽也象曰往蹇來譽宜待也方蹇之初進則益蹇時之未可進也故宜見幾而止以待時可行而後行也諸爻皆蹇往而善來然則無出蹇之義乎曰在蹇而往則蹇也蹇終則變矣故上已有碩義六二王臣蹇蹇匪躬之故二以中正之德居艮體止於中正者也與五相應是中正之人為中正之君所信任故謂之王臣雖上下同德而五方在大蹇之中致力於蹇難之時其艱蹇至甚故為蹇於蹇也二雖中正以隂柔之才豈易勝其任所以蹇於蹇也志在濟君於蹇難之中其蹇蹇者非為身之故也雖使不勝志義可嘉故稱其忠藎不為已也然其才不足以濟蹇也小可濟則聖人當盛稱以為勸矣象曰王臣蹇蹇終無尤也雖艱厄於蹇時然其志在濟君難雖未成功然終無過尤也聖人取其志義而謂其無尤所以勸忠藎也九三往蹇來反九三以剛居正處下體之上當蹇之時在下者皆柔必依於三是為下所附者也三與上為正應上隂柔而無位不足以為援故上往則蹇也來下來也反還歸也三為下二隂所喜故來為反其所也稍安之地也象曰往蹇來反內喜之也內在下之隂也方蹇之時隂柔不能自立故皆附於九三之陽而喜愛之九之處三在蹇為得其所也處蹇而得下之心可以求安故以來為反猶春秋之言歸也六四往蹇來連往則益入於坎險之深往蹇也居蹇難之時同處艱兄者其志不謀而同也又四居上位而與在下者同有得位之正又與三相比相親者也二與初同類相與者也是與下同志衆所從附也故曰來連來則與在下之衆相連合也能與衆合得處蹇之道也象曰往蹇來連當位實也四當蹇之時居上位不往而來與下同志固足以得衆矣又以隂居隂為得其實以誠實與下故能連合而下之二三亦各得其實初以隂居下亦其實也當同患之時相交以實其合可知故來而連者當位以實也處蹇難非誠實何以濟當位不曰正而曰實上下之交主於誠實用各有其所也九五大蹇朋來五居君位而在蹇難之中是天下之大蹇也當蹇而又在險中亦為大蹇大蹇之時而二在下以中正相應是其朋助之來也方天下之蹇而得中正之臣相輔其助豈小也得朋來而無吉何也曰未足以濟蹇也以剛陽中正之君而方在大蹇之中非得剛陽中正之臣相輔之不能濟天下之蹇也二之中正固有助矣欲以隂柔之助濟天下之難非所能也自古聖王濟天下之蹇未有不由賢聖之臣為之助者湯武得伊吕是也中常之君得剛明之臣而能濟大難者則有矣劉禪之孔明唐肅宗之郭子儀德宗之李晟是也雖賢明之君苟無其臣則不能濟於難也故凡六居五九居二者則多由助而有功蒙泰之類是也九居五六居二則功多不足屯否之類是也蓋臣賢於君則輔君以君所不能臣不及君則贊助之而已故不能成大功也象曰大蹇朋來以中節也朋者其朋類也五有中正之德而二亦中正雖大蹇之時不失其守蹇於蹇以相應助是以其中正之節也上下中正而弗濟者臣之才不足也自古守節秉義而才不足以濟者豈少乎漢李固王允晉周顗王導之徒是也上六往蹇來碩吉利見大人六以隂柔居蹇之極冒極險而往所以蹇也不往而來從五求三得剛陽之助是以碩也蹇之道厄塞窮蹙碩大也寬裕之稱來則寬大其蹇紓矣蹇之極有出蹇之道上六以隂柔故不得出得剛陽之助可以紓蹇而已在蹇極之時得紓則為吉矣非剛陽中正豈能出乎蹇也利見大人蹇極之時見大德之人則能有濟於蹇也大人謂五以相比發此義五剛陽中正而居君位大人也在五不言其濟蹇之功而上六利見之何也曰在五不言以其居坎險之中無剛陽之助故無能濟蹇之義在上六蹇極而見大德之人則能濟於蹇故為利也各爻取義不同如屯初九之志正而於六二則目之為冦也諸爻皆不言吉上獨言吉者諸爻皆得正各有所善然皆未能出於蹇故未足為吉唯上處蹇極而得寬裕乃為吉也象曰往蹇來碩志在內也利見大人以從貴也上六應三而從五志在內也蹇既極而有助是以碩而吉也六以隂柔當蹇之極密近剛陽中正之君自然其志從附以求自濟故利見大人謂從九五之貴也所以云從貴恐人不知大人為指五也坎下震上解序卦蹇者難也物不可以終難故受之以解物無終難之理難極則必散解者散也所以次蹇也為卦震上坎下震動也坎險也動於險外出乎險也故為患難解散之象又震為雷坎為雨雷雨之作蓋隂陽交感和暢而緩散故為解解者天下患難解散之時也解利西南無所往其來復吉有攸往夙吉西南坤方坤之體廣大平易當天下之難方解人始離艱苦不可復以煩苛嚴急治之當濟以寬大簡易乃其宜也如是則人心懷而安之故利於西南也湯除桀之虐而以寬治武王誅紂之暴而反商政皆從寬易也無所往其來復吉有攸往夙吉無所往謂天下之難已解散無所為也有攸往謂尚有所當解之事也夫天下國家必紀綱法度廢亂而後禍患生聖人既解其難而安平無事矣是無所往也則當修復治道正紀綱明法度進復先代明王之治是來復也謂反正理也天下之吉也其發語辭自古聖王救難定亂其始未暇遽為也既安定則為可久可繼之治自漢以下亂既除則不復有為姑隨時維持而已故不能成善治蓋不知來復之義也有攸往夙吉謂尚有當解之事則早為之乃吉也當解而未盡者不早去則將復盛事之復生者不早為則將漸大故夙則吉也彖曰解險以動動而免乎險解坎險震動險以動也不險則非難不動則不能出難動而出於險外是免乎險難也故為解解利西南往得衆也解難之道利在廣大平易以寬易而往濟解則得衆心之歸也其來復吉乃得中也不云無所往省文爾救亂除難一時之事未能成治道也必待解難無所往然後來復先王之治乃得中道謂合宜也有攸往夙吉往有功也有所為則夙吉也早則往而有功緩則惡滋而害深矣天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉既明處解之道復言天地之解以見解時之大天地之氣開散交感而和暢則成雷雨雷雨作而萬物皆生發甲拆天地之功由解而成故贊解之時大矣哉王者法天道行寬宥施恩惠養育兆民至於昆蠱草木乃順解之時與天地合德也象曰雷雨作解君子以赦過宥罪天地解散而成雷雨故雷雨作而為解也與明兩而作離語不同赦釋之宥寬之過失則赦之可也罪惡而赦之則非義也故寬之而已君子觀雷雨作解之象體其發育則施恩仁體其解散則行寬釋也初九無咎六居解初患難既解之時以柔居剛以隂應陽柔而能剛之義既無患難而自處得剛柔之宜患難既解安寧無事唯自處得宜則為無咎矣方解之初宜安靜以休息之爻之辭寡所以示意象曰剛柔之際義無咎也初四相應是剛柔相際接也剛柔相際為得其宜難既解而處之剛柔得宜其義無咎也九二田獲三狐得黃矢貞吉九二以陽剛得中之才上應六五之君用於時者也天下小人常衆剛明之君在上則明足以照之威足以懼之剛足以斷之故小人不敢用其情然尤常存警戒慮其有間而害正也六五以隂柔居尊位其明易蔽其威易犯其斷不果而易惑小人一近之則移其心矣况難方解而治之初其變尚易二既當用必須能去小人則可以正君心而行其剛中之道田者去害之事狐者邪媚之獸三狐指卦之三隂時之小人也獲謂能變化除去之如田之獲狐也獲之則得中直之道乃貞正而吉也黃中色矢直物黃矢謂中直也羣邪不去君心一入則中直之道無由行矣桓敬之不去武三思是也象曰九二貞吉得中道也所謂貞吉者得其中道也除去邪惡使其中直之道得行乃正而吉也六三負且乘致冦至貞吝六三隂柔居下之上處非其位猶小人宜在下以負荷而且乘車非其據也必致冦奪之至雖使所為得正亦可鄙吝也小人而竊盛位雖勉為正事而氣質卑下本非在上之物終可吝也若能正大則如何曰大正非隂柔所能也若能之則是化為君子矣三隂柔小人宜在下而反處下之上猶小人宜負而反乘當致冦奪也難解之時而小人竊位復致冦矣象曰負且乘亦可醜也自我致戎又誰咎也負荷之人而且乘載為可醜惡也處非其據德不稱其器則寇戎之致乃已招取將誰咎乎聖人又於繫辭明其致寇之道謂作易者其知盜乎盜者乘釁而至苟無釁隙則盜安能犯負者小人之事乘者君子之器以小人而乘君子之器非其所能安也故盜乘釁而奪之小人而居君子之位非其所能堪也故滿假而陵慢其上侵暴其下盜則乘其過惡而伐之矣伐者聲其罪也盜橫暴而至者也貨財而輕慢其藏是教誨乎盜使取之也女子而夭冶其容是教誨淫者使暴之也小人而乘君子之器是招盜使奪之也皆自取之之謂也九四解而拇朋至斯孚九四以陽剛之才居上位承六五之君大臣也而下與初六之隂為應拇在下而微者謂初也居上位而親小人則賢人正士逺退矣斥去小人則君子之黨進而誠相得也四能解去初六之隂柔則陽剛君子之朋來至而誠合矣不解去小人則已之誠未至安能得人之孚也初六其應故謂逺之為解象曰解而拇未當位也四雖陽剛然居隂於正疑不足若復親比小人則其失正必矣故戒必解其拇然後能來君子以其處未當位也解者本合而離之也必解拇而後朋孚蓋君子之交而小人容於其間是與君子之誠未至也六五君子維有解吉有孚于小人六五居尊位為解之主人君之解也以君子通言之君子所親比者必君子也所解去者必小人也故君子維有解則吉也小人去則君子進矣吉孰大焉有孚者世云見驗也可驗之於小人小人之黨去則是君子能有解也小人去則君子自進正道自行天下不足治也象曰君子有解小人退也君子之所解者謂退去小人也小人去則君子之道行是以吉也上六公用射隼于髙墉之上獲之無不利上六尊髙之地而非君位故曰公但據解終而言也隼鷙害之物象為害之小人墉墻內外之限也害若在內則是未解之時也若出墉外則是無害矣復何所解故在墉上離乎內而未去也云髙見防限之嚴而未去者上解之極也解極之時而獨有未解者乃害之堅强者也上居解極解道已至器已成也故能射而獲之既獲之則天下之患解已盡矣何所不利夫子於繫辭復伸其義曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也鷙害之物在墉上苟無其器與不待時而發則安能獲之所以解之之道器也事之當解與已解之之道至者時也如是而動故無括結發而無不利矣括結謂阻礙聖人於此發明藏器待時之義夫行一身至於天下之事苟無其器與不以時而動小則括塞大則喪敗自古喜有為而無成功或顛覆者皆由是也象曰公用射隼以解悖也至解終而未解者悖亂之大者也射之所以解之也解則天下平矣兑下艮上損序卦解者緩也緩必有所失故受之以損縱緩則必有所失失則損也損所以繼解也為卦艮上兑下山體髙澤體深下深則上益髙為損下益上之義又澤在山下其氣上通潤及草木百物是損下而益上也又下為兑說三爻皆上應是說以奉上亦損下益上之義又下兑之成兑由六三之變也上艮之成艮自上九之變也三本剛而成柔上本柔而成剛亦損下益上之義損上而益於下則為益取下而益於上則為損在人上者施其澤以及下則益也取其下以自厚則損也譬諸壘土損於上以培厚其基本則上下安固矣豈非益乎取於下以增上之髙則危墜至矣豈非損乎故損者損下益上之義益則反是損有孚元吉無咎可貞利有攸往損减損也凡損抑其過以就義理皆損之道也損之道必有孚誠謂至誠順於理也損而順理則大善而吉所損無過差可貞固常行而利有所往也人之所損或過或不及或不常皆不合正理非有孚也非有孚則無吉而有咎非可貞之道不可行也曷之用二簋可用享損者損過而就中損浮末而就本實也聖人以寧儉為禮之本故為損發明其義以享祀言之享祀之禮其文最繁然以誠敬為本多儀備物所以將飾其誠敬之心飾過其誠則為僞矣損飾所以存誠也故云曷之用二簋可用享二簋之約可用享祭言在乎誠而已誠為本也天下之害無不由末之勝也峻宇雕墻本於宫室酒池肉林本於飲食淫酷殘忍本於刑罰窮兵黷武本於征討凡人欲之過者皆本於奉養其流之遠則為害矣先王制其本者天理也後人流於末者人欲也損之義損人欲以復天理而已彖曰損損下益上其道上行損之所以為損者以損於下而益於上也取下以益上故云其道上行夫損上而益下則為益損下而益上則為損損基本以為髙者豈可謂之益乎損而有孚元吉無咎可貞利有攸往謂損而以至誠則有此元吉以下四者損道之盡善也曷之用二簋可用享二簋應有時損剛益柔有時夫子特釋曷之用二簋可用享卦辭簡直謂當損去浮飾曰何所用哉二簋可以享也厚本損末之謂也夫子恐後人不達遂以為文飾當盡去故詳言之有本必有末有實必有文天下萬事無不然者無本不立無文不行父子主恩必有嚴順之體君臣主敬必有承接之儀禮讓存乎內待威儀而後行尊卑有其序非物采則無别文之與實相須而不可缺也及夫文之勝末之流逺本喪實乃當損之時也故云曷所用哉二簋足以薦其誠矣謂當務實而損飾也夫子恐人之泥言也故復明之曰二簋之質用之當有時非其所用而用之不可也謂文飾未過而損之與損之至於過甚則非也損剛益柔有時剛為過柔為不足損益皆損剛益柔也必順時而行不當時而損益之則非也損益盈虛與時偕行或損或益或盈或虛唯隨時而已過者損之不足者益之虧者盈之實者虛之與時偕行也象曰山下有澤損君子以懲忿窒欲山下有澤氣通上潤與深下以增髙皆損下之象君子觀損之象以損於己在修已之道所當損者唯忿與欲故以懲戒其忿怒窒塞其意欲也初九已事遄往無咎酌損之損之義損剛益柔損下益上也初以陽剛應於四四以隂柔居上位賴初之益者也下之益上當損己而不自以為功所益於上者事既已則速去之不居其功乃無咎也若享其成功之美非損己益上也於為下之道為有咎矣四之隂柔賴初者也故聽於初初當酌度其宜而損己以益之過與不及皆不可也象曰已事遄往尚合志也尚上也時之所崇用為尚初之所尚者與上合志也四賴於初初益於四與上合志也九二利貞征凶弗損益之二以剛中當損剛之時居柔而說體上應六五隂柔之君以柔說應上則失其剛中之德故戒所利在貞正也征行也離乎中則失其貞正而凶矣守其中乃貞也弗損益之不自損其剛貞則能益其上乃益之也若失其剛貞而用柔說適足以損之而已非損己而益上也世之愚者有雖無邪心而唯知竭力順上為忠者蓋不知弗損益之之義也象曰九二利貞中以為志也九居二非正也處說非剛也而得中為善若守其中德何有不善豈有中而不正者豈有中而有過者二所謂利貞謂以中為志也志存乎中則自正矣大率中重於正中則正矣正不必中也能守中則有益於上矣六三三人行則損一人一人行則得其友損者損有餘也益者益不足也三人謂下三陽上三隂三陽同行則損九三以益上三隂同行則損上六以為三三人行則損一人也上以柔易剛而謂之損但言其减一耳上與三雖本相應由二爻升降而一卦皆成兩相與也初二二陽四五二隂同德相比三與上應皆兩相與則其志専皆為得其友也三雖與四相比然異體而應上非同行者也三人則損一人一人則得其友蓋天下無不二者一與二相對待生生之本也三則餘而當損矣此損益之大義也夫子又於繫辭盡其義曰天地絪緼萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也絪緼交密之狀天地之氣相交而密則生萬物之化醇醇謂醲厚醲厚猶精一也男女精氣交構則化生萬物唯精醇專一所以能生也一隂一陽豈可二也故三則當損言專致乎一也天地之間當損益之明且大者莫過此也象曰一人行三則疑也一人行而得一人乃得友也若三人行則疑所與矣理當損去其一人損其餘也六四損其疾使遄有喜無咎四以隂柔居上與初之剛陽相應在損時而應剛能自損以從剛陽也損不善以從善也初之益四損其柔而益之以剛損其不善也故曰損其疾疾謂疾病不善也損於不善唯使之遄速則有喜而無咎人之損過唯患不速速則不至於深過為可喜也象曰損其疾亦可喜也損其所疾固可喜也云亦發語辭六五或益之十朋之龜弗克違元吉六五於損時以中順居尊位虛其中以應乎二之剛陽是人君能虛中自損以順從在下之賢也能如是天下孰不損己自盡以益之故或有益之之事則十朋助之矣十衆辭龜者决是非吉凶之物衆人之公論必合正理雖龜䇲不能違也如此可謂大善之吉矣古人曰謀從衆則合天心象曰六五元吉自上祐也所以得元吉者以其能盡衆人之見合天地之理故自上天降之福祐也上九弗損益之無咎貞吉利有攸往得臣無家凡損之義有三損己從人也自損以益於人也行損道以損於人也損己從人徙於義也自損益人及於物也行損道以損於人行其義也各因其時取大者言之四五二爻取損己從人下體三爻取自損以益人損時之用行損道以損天下之當損者也上九則取不行其損為義九居損之終損極而當變者也以剛陽居上若用剛以損削於下非為上之道其咎大矣若不行其損變而以剛陽之道益於下則無咎而得其正且吉也如是則宜有所往往則有益矣在上能不損其下而益之天下孰不服從服從之衆無有內外也故曰得臣無家得臣謂得人心歸服無家謂無有遠近內外之限也象曰弗損益之大得志也居上不損下而反益之是君子大得行其志也君子之志唯在益於人而已震下㢲上益序卦損而不已必益故受之以益盛衰損益如循環損極必益理之自然益所以繼損也為卦㢲上震下雷風二物相益者也風烈則雷迅雷激則風怒兩相助益所以為益此以象言也㢲震二卦皆由下變而成陽變而為隂者損也隂變而為陽者益也上卦損而下卦益損上益下所以為益此以義言也下厚則上安故益下為益益利有攸往利涉大川益者益於天下之道也故利有攸往益之道可以濟險難利涉大川也彖曰益損上益下民說無疆自上下下其道大光以卦義與卦才言也卦之為益以其損上益下也損於上而益下則民說之無疆謂無窮極也自上而降已以下下其道之大光顯也陽下居初隂上居四為自上下下之義利有攸往中正有慶五以剛陽中正居尊位二復以中正應之是以中正之道益天下天下受其福慶也利涉大川木道乃行益之為道於平常無事之際其益猶小當艱危險難則所益至大故利涉大川也於濟艱險乃益道大行之時也益誤作木或以為上㢲下震故云木道非也益動而㢲日進無疆又以二體言卦才下動而上㢲動而㢲也為益之道其動㢲順於理則其益日進廣大無有疆限也動而不順於理豈能成大益也天施地生其益無方以天地之功言益道之大聖人體之以益天下也天道資始地道生物天施地生化育萬物各正性命其益可謂無方矣方所也有方所則有限量無方謂廣大無窮極也天地之益萬物豈有窮際乎凡益之道與時偕行天地之益無窮者理而已矣聖人利益天下之道應時順理與天地合與時偕行也象曰風雷益君子以見善則遷有過則改風烈則雷迅雷激則風怒二物相益者也君子觀風雷相益之象而求益於己為益之道無若見善則遷有過則改也見善能遷則可以盡天下之善有過能改則無過矣益於人者無大於是初九利用為大作元吉無咎初九震動之主剛陽之盛也居益之時其才足以益物雖居至下而上有六四之太臣應於己四㢲順之主上能㢲於君下能順於賢才也在下者不能有為也得在上者應從之則宜以其道輔於上作大益天下之事利用為大作也居下而得上之用以行其志必須所為大善而吉則無過咎不能元吉則不唯在已有咎乃纍乎上為上之咎也在至下而當大任小善不足以稱也故必元吉然後得無咎象曰元吉無咎下不厚事也在下者本不當處厚事厚事重大之事也以為在上所任所以當大事必能濟大事而致元吉乃為無咎能致元吉則在上者任之為知人已當之為勝任不然則上下皆有咎也六二或益之十朋之龜弗克違永貞吉王用享于帝吉六二處中正而體柔順有虛中之象人處中正之道虛其中以求益而能順從天下孰不願告而益之孟子曰夫苟好善則四海之內皆將輕千里而來告之以善夫滿則不受虛則來物理自然也故或有可益之事則衆朋助而益之十者衆辭衆人所是理之至當也龜者占吉凶辨是非之物言其至是龜不能違也永貞吉就六二之才而言二中正虛中能得衆人之益者也然而質本隂柔故戒在常永貞固則吉也求益之道非永貞則安能守也損之六五十朋之則元吉者蓋居尊自損應下之剛以柔而居剛柔為虛受剛為固守求益之至善故元吉也六二虛中求益亦有剛陽之應而以柔居柔疑益之未固也故戒能常永貞固則吉也王用享于帝吉如二之虛中而能永貞用以享上帝猶當獲吉况與人接物其意有不通乎求益於人有不應乎祭天天子之事故云王用也象曰或益之自外來也既中正虛中能受天下之善而固守則有有益之事衆人自外來益之矣或曰自外來豈非謂五乎曰如二之中正虛中天下孰不願益之五為正應固在其中矣六三益之用凶事無咎有孚中行告公用圭三居下體之上在民上者也乃守令也居陽應剛處動之極居民上而剛决果於為益者也果於為益用之凶事則無咎凶事謂患難非常之事三居下之上在下當承禀於上安得自任擅為益乎唯於患難非常之事則可量宜應卒奮不顧身力庇其民故無咎也下專自任上必忌疾雖當凶難以義在可為然必有其孚誠而所為合於中道則誠意通於上而上信與之矣專為而無為上愛民之至誠固不可也雖有誠意而所為不合中行亦不可也圭者通信之物禮云大夫執圭而使所以申信也凡祭祀朝聘用圭玉所以通達誠信也有誠孚而得中道則能使上信之是猶告公上用圭玉也其孚能通達於上矣在下而有為之道固當有孚中行又三隂爻而不中故發此義或曰三乃隂柔何得反以剛果任事為義曰三質雖本隂然其居陽乃自處以剛也應剛乃志在乎剛也居動之極剛果於行也以此行益非剛果而何易以所勝為義故不論其本質也象曰益用凶事固有之也六三益之獨可用於凶事者以其固有之也謂專固自任其事也居下當禀承於上乃專任其事唯救民之凶災拯時之艱急則可也乃處急難變故之權宜故得無咎若平時則不可也六四中行告公從利用為依遷國四當益時處近君之位居得其正以柔㢲輔上而下順應於初之剛陽如是可以益於上也唯處不得其中而所應又不中是不足於中也故云若行得中道則可以益於君上告於上而獲信從矣以柔㢲之體非有剛特之操故利用為依遷國為依依附於上也遷國順下而動也上依剛中之君而致其益下順剛陽之才以行其事利用如是也自古國邑民不安其居則遷遷國者順下而動也象曰告公從以益志也爻辭但云得中行則告公而獲從象復明之曰告公而獲從者告之以益天下之志也志苟在於益天下上必信而從之事君者不患上之不從患其志之不誠也九五有孚惠心勿問元吉有孚惠我德五剛陽中正居尊位又得六二之中正相應以行其益何所不利以陽實在中有孚之象也以九五之德之才之位而中心至誠在惠益於物其至善大吉不問可知故云勿問元吉人君居得致之位操可致之權苟至誠益於天下天下受其大福其元吉不假言也有孚惠我德人君至誠益於天下天下之人無不至誠愛戴以君之德澤為恩惠也象曰有孚惠心勿問之矣惠我德大得志也人君有至誠惠益天下之心其元吉不假言也故云勿問之矣天下至誠懷吾德以為惠是其道大行人君之志得矣上九莫益之或擊之立心勿恆凶上居無位之地非行益於人者也以剛處益之極求益之甚者也所應者隂非取善自益者也利者衆人所同欲也專欲益己其害大矣欲之甚則昏蔽而忘義理求之極則侵奪而致仇怨故夫子曰放於利而行多怨孟子謂先利則不奪不饜聖賢之深戒也九以剛而求益之極衆人所共惡故無益之者而或攻擊之矣立心勿恆凶聖人戒人存心不可専利云勿恆如是凶之道也所當速改也象曰莫益之偏辭也或擊之自外來也理者天下之至公利者衆人所同欲苟公其心不失其正理則與衆同利無侵於人人亦欲與之若切於好利蔽於自私求自益以損於人則人亦與之力爭故莫肯益之而有擊奪之者矣云莫益之者非其偏己之辭也苟不偏己合於公道則人亦益之何為擊之乎既求益於人至於甚極則人皆惡而欲攻之故擊之者自外來也人為善則千里之外應之六二中正虛己益之者自外而至是也苟為不善則千里之外違之上九求益之極擊之者自外而至是也繫辭曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶君子言動與求皆以其道乃完善也不然則取傷而凶矣乾下兌上夬序卦益而不已必决故受之以夬夬者决也益之極必决而後止理無常益益而不已已乃决也夬所以次益也為卦兑上乾下以二體言之澤水之聚也乃上於至髙之處有潰决之象以爻言之五陽在下長而將極一隂在上消而將盡衆陽上進决去一隂所以為夬也夬者剛决之義衆陽進而决去一隂君子道長小人消衰將盡之之時也夬揚于王庭孚號有厲小人方盛之時君子之道未勝安能顯然以正道决去之故含晦俟時漸圖消之之道今既小人衰微君子道盛當顯行之於公朝使人明知善惡故云掦于王庭孚信之在中誠意也號者命衆之辭君子之道雖長盛而不敢忘戒備故至誠以命衆使知尚有危道雖以此之甚盛决彼之甚衰若易而無備則有不虞之悔是尚有危理必有戒懼之心則無患也聖人設戒之意深矣告自邑不利即戎利有攸往君子之治小人以其不善也必以己之善道勝革之故聖人誅亂必先修己舜之敷文德是也邑私邑告自邑先自治也以衆陽之盛决於一隂力固有餘然不可極其剛至於太過太過乃如蒙上九之為寇也戎兵者強武之事不利即戎謂不宜尚壯武也即從也從戎尚武也利有攸往陽雖盛未極乎上隂雖微猶有未去是小人尚有存者君子之道有未至也故宜進而往也不尚剛武而其道益進乃夬之善也彖曰夬决也剛决柔也健而說决而和夬為决義五陽决上之一隂也健而說决而和以二體言卦才也下健而上說是健而能說决而能和决之至善也兌說為和揚于王庭柔乘五剛也柔雖消矣然居五剛之上猶為乘陵之象隂而乘陽非理之甚君子勢既足以去之當顯揚其罪於王朝大庭使衆知善惡也孚號有厲其危乃光也盡誠信以命其衆而知有危懼則君子之道乃無虞而光大也告自邑不利即戎所尚乃窮也當先自治不宜專尚剛武即戎則所尚乃至窮極矣夬之時所尚謂剛武也利有攸往剛長乃終也陽剛雖盛長猶未終尚有一隂更當决去則君子之道純一而無害之者矣乃剛長之終也象曰澤上于天夬君子以施祿及下居德則忌澤水之聚也而上于天至髙之處故為夬象君子觀澤决於上而注溉於下之象則以施祿及下謂施其祿澤以及於下也觀其决潰之象則以居德則忌居德謂安處其德則約也忌防也謂約立防禁有防禁則無潰散也王弼作明忌亦通不云澤在天上而云澤上于天上于天則意不安而有決潰之勢云在天上乃安辭也初九壯于前趾往不勝為咎九陽爻而乾體剛健在上之物乃在下而居决時壯于前進者也前趾謂進行人之决於行也行而宜則其决為是往而不宜則决之過也故往而不勝則為咎也夬之時而往往决也故以勝負言九居初而壯於進躁於動者也故有不勝之戒隂雖將盡而已之躁動自宜有不勝之咎不計彼也象曰不勝而往咎也人之行必度其事可為然後决之則無過矣理不能勝而且往其咎可知凡行而有咎者皆决之過也九二惕號莫夜有戎勿恤夬者陽决隂君子决小人之時不可忘戒備也陽長將極之時而二處中居柔不為過剛能知戒備處夬之至善也內懷兢惕而外嚴誡號雖莫夜有兵亦可勿恤矣象曰有戎勿恤得中道也莫夜有兵戎可懼之甚也然可勿恤者以自處之善也既得中道又知惕懼且有戒備何事之足恤也九居二雖得中然非正其為至善何也曰陽决隂君子决小人而得中豈有不正也知時識勢學易之大方也九三壯于頄有凶君子夬夬獨行遇雨若濡有愠無咎爻辭差錯定安胡公移其文曰壯于頄有凶獨行遇雨若濡有愠君子夬夬無咎亦未安也當云壯于頄有凶獨行遇雨君子夬夬若濡有愠無咎夬决尚剛健之時三居下體之上又處健體之極剛果於决者也頄顴骨也在上而未極於上者也三居下體之上雖在上而未為最上上有君而自任其剛决壯于頄者也有凶之道也獨行遇雨三與上六為正應方羣陽共决一隂之時已若以私應之故不與衆同而獨行則與上六隂陽和合故云遇雨易中言雨者皆謂隂陽和也君子道長决去小人之時而已獨與之和其非可知唯君子處斯時則能夬夬謂夬其夬果决其斷也雖其私與當遠絶之若見濡汚有愠惡之色如此則無過咎也三健體而處正非必有是失也因此義以為教耳爻文所以交錯者由有遇雨字又有濡字故誤以為連也象曰君子夬夬終無咎也牽梏於私好由無决也君子義之與比决於當决故終不至於有咎也九四臀無膚其行次且牽羊悔亡聞言不信臀無膚居不安也行次且進不前也次且進難之狀九四以陽居隂剛决不足欲止則衆陽並進於下勢不得安猶臀傷而居不能安也欲行則居柔失其剛壯不能強進故其行次且也牽羊悔亡羊者羣行之物牽者挽拽之義言若能自强而牽挽以從羣行則可以亡其悔然既處柔必不能也雖使聞是言亦必不能信用也夫過而能改聞善而能用克已以從義唯剛明者能之在它卦九居四其失未至如此之甚在夬而居柔其害大矣象曰其行次且位不當也聞言不信聰不明也九處隂位不當也以陽居柔失其剛决故不能強進其行次且剛然後能明處柔則遷失其正性豈復有明也故聞言而不能信者蓋其聰聽之不明也九五莧陸夬夬中行無咎五雖剛陽中正居尊位然切近於上六上六說體而卦獨一隂陽之所比也五為决隂之主而反比之其咎大矣故必决其决如莧陸然則於其中行之德為無咎也中行中道也莧陸今所謂馬齒莧是也曝之難乾感隂氣之多者也而脆易折五若如莧陸雖感於隂而决斷之易則於中行無過咎矣不然則失其中正也感隂多之物莧陸為易斷故取為象象曰中行無咎中未光也卦辭言夬夬則於中行為無咎矣象復盡其義云中未光也夫人心正意誠乃能極中正之道而充實光輝五心有所比以義之不可而决之雖行於外不失中正之義可以無咎然於中道未得為光大也蓋人心一有所欲則離道矣夫子於此示人之意深矣上六無號終有凶陽長將極隂消將盡獨一隂處窮極之地是衆君子得時决去危極之小人也其勢必須消盡故云無用號咷畏懼終必有凶也象曰無號之凶終不可長也陽剛君子之道進而益盛小人之道既已窮極自然消亡豈復能長久乎雖號咷無以為也故云終不可長也先儒以卦中有孚號惕號欲以無號為無號作去聲謂無用更加號令非也一卦中適有兩去聲字一平聲字何害而讀易者率皆疑之或曰聖人之於天下雖大惡未嘗必絶之也今直使之無號謂必有凶可乎曰夬者小人之道消亡之時也决去小人之道豈必盡誅之乎使之變革乃小人之道亡也道亡乃其凶也㢲下乾上姤序卦夬决也决必有遇故受之以姤姤遇也决判也物之决判則有遇合本合則何遇姤所以次夬也為卦乾上㢲下以二體言之風行天下天之下者萬物也風之行無不經觸乃遇之象又一隂始生於下隂與陽遇也故為姤姤女壯勿用取女一隂始生自是而長漸以盛大是女之將長壯也隂長則陽消女壯則男弱故戒勿用取如是之女取女者欲其柔和順從以成家道姤乃方進之隂漸壯而敵陽者是以不可取也女漸壯則失男女之正家道敗矣姤雖一隂甚微然有漸壯之道所以戒也彖曰姤遇也柔遇剛也姤之義遇也卦之為姤以柔遇剛也一隂方生始與陽相遇也勿用取女不可與長也一隂既生漸長而盛隂盛則陽衰矣取女者欲長久而成家也此漸盛之隂將消勝於陽不可與之長久也凡女子小人夷狄勢苟漸盛何可與久也故戒勿用取如是之女天地相遇品物咸章也隂始生於下與陽相遇天地相遇也隂陽不相交遇則萬物不生天地相遇則化育庶類品物咸章萬物章明也剛遇中正天下大行也以卦才言也五與二皆以陽剛居中與正以中正相遇也君得剛中之臣臣遇中正之君君臣以剛陽遇中正其道可以大行於天下矣姤之時義大矣哉贊姤之時與姤之義至大也天地不相遇則萬物不生君臣不相遇則政治不興聖賢不相遇則道德不亨事物不相遇則功用不成姤之時與義皆甚大也象曰天下有風姤后以施命誥四方風行天下無所不周為君后者觀其周遍之象以施其命令周誥四方也風行地上與天下有風皆為周遍庶物之象而行於地上遍觸萬物則為觀經歷觀省之象也行於天下周遍四方則為姤施發命令之象也諸象或稱先王或稱后或稱君子大人稱先王者先王所以立法制建國作樂省方敇法閉關育物享帝皆是也稱后者后王之所為也財成天地之道施命誥四方是也君子則上下之通稱大人者王公之通稱初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅姤隂始生而將長之卦一隂生則長而漸盛隂長則陽消小人道長也制之當於其微而未盛之時柅止車之物金為之堅強之至也止之以金柅而又繫之止之固也固止使不得進則陽剛貞正之道吉也使之進往則漸盛而害於陽是見凶也羸豕孚蹢躅聖人重為之戒言隂雖甚微不可忽也豕隂躁之物故以為况羸弱之豕雖未能强猛然其中心在乎蹢躅蹢躅跳躑也隂微而在下可謂羸矣然其中心常在乎消陽也君子小人異道小人雖微弱之時未嘗無害君子之心防於微則無能為矣象曰繫于金柅柔道牽也牽者引而進也隂始生而漸進柔道方牽也繫之于金柅所以止其進也不使進則不能消正道乃貞吉也九二包有魚無咎不利賓姤遇也二與初密比相遇者也在他卦則初正應於四在垢則以遇為重相遇之道主於專一二之剛中遇固以誠然初之隂柔羣陽在上而又有所應者其志所求也隂柔之質鮮克貞固二之於初難得其誠心矣所遇不得其誠心遇道之乖也包者苴裹也魚隂物之美者陽之於隂其所悅美故取魚象二於初若能固畜之如包苴之有魚則於遇為無咎矣賓外來者也不利賓包苴之魚豈能及賓謂不可更及外人也遇道當專一二則雜矣象曰包有魚義不及賓也二之遇初不可使有二於外當如包苴之有魚包苴之魚義不及於賓客也九三臀無膚其行次且厲無大咎二與初既相遇三說初而密比於二非所安也又為二所忌惡其居不安若臀之無膚也處既不安則當去之而居姤之時志求乎遇一隂在下是所欲也故處雖不安而其行則又次且也次且進難之狀謂不能遽舍也然三剛正而處㢲有不終迷之義若知其不正而懷危懼不敢妄動則可以無大咎也非義求遇固已有咎矣知危而止則不至於大也象曰其行次且行未牽也其始志在求遇於初故其行遲遲未牽不促其行也既知危而改之故未至於大咎也九四包無魚起凶包者所裹畜也魚所美也四與初為正應當相遇者也而初已遇於二矣失其所遇猶包之無魚亡其所有也四當姤遇之時居上位而失其下下之離由已之失德也四之失者不中正也以不中正而失其民所以凶也曰初之從二以比近也豈四之罪乎曰在四而言義當有咎不能保其下由失道也豈有上不失道而下離者乎遇之道君臣民主夫婦朋友皆在焉四以下暌故主民而言為上而下離必有凶變起者將生之謂民心既離難將作矣象曰無魚之凶遠民也下之離由已致之遠民者已遠之也為上者有以使之離也九五以杞包瓜含章有隕自天九五下亦無應非有遇也然得遇之道故終必有遇夫上下之遇由相求也杞髙木而葉大處髙體大而可以包物者祀也美實之在下者瓜也美而居下者側微之賢之象也九五尊居君位而下求賢才以至髙而求至下猶以杞葉而包瓜能自降屈如此又其內藴中正之德充實章美人君如是則無有不遇所求者也雖屈己求賢若其德不正賢者不屑也故必含蓄章美內積至誠則有隕自天矣猶云自天而降言必得之也自古人君至誠降屈以中正之道求天下之賢未有不遇者也髙宗感於夢寐文王遇於漁釣皆由是道也象曰九五含章中正也所謂含章謂其含藴中正之德也德充實則成章而有輝光有隕自天志不舍命也命天理也舍違也至誠中正屈己求賢存志合於天理所以有隕自天必得之矣上九姤其角吝無咎至剛而在最上者角也九以剛居上故以角為象人之相遇由降屈以相從和順以相接故能合也上九髙亢而剛極人誰與之以此求遇固可吝也己則如是人之遠之非他人之罪也由已致之故無所歸咎象曰姤其角上窮吝也既處窮上剛亦極矣是上窮而致吝也以剛極居髙而求遇不亦難乎坤下兌上萃序卦姤者遇也物相遇而后聚故受之以萃萃者聚也物相㑹遇則成羣萃所以次姤也為卦兌上坤下澤上於地水之聚也故為萃不言澤在地上而云澤上于地言上于地則為方聚之義也萃亨王假有廟王者萃聚天下之道至於有廟極也羣生至衆也而可一其歸仰人心莫知其鄉也而能致其誠敬鬼神之不可度也而能致其來格天下萃合人心總攝衆志之道非一其至大莫過於宗廟故王者萃天下之道至於有廟則萃道之至也祭祀之報本於人心聖人制禮以成其德耳故豺獺能祭其性然也萃下有亨字羡文也亨字自在下與渙不同渙則先言卦才萃乃先言卦義彖辭甚明利見大人亨利貞天下之聚必得大人以治之人聚則亂物聚則爭事聚則紊非大人治之則萃所以致爭亂也萃以不正則人聚為苟合財聚為悖入安得亨乎故利貞用大牲吉利有攸往萃者豐亨之時也其用宜稱故用大牲吉事莫重於祭故以祭享而言上交鬼神下接民物百用莫不皆然當萃之時而交物以厚則是享豐富之吉也天下莫不同其富樂矣若時之厚而交物以薄乃不享其豐美天下莫之與而悔吝生矣蓋隨時之宜順理而行故彖云順天命也夫不能有為者力之不足也當萃之時故利有攸往大凡興工立事貴得可為之時萃而後用是以動而有裕天理然也彖曰萃聚也順以說剛中而應故聚也萃之義聚也順以說以卦才言也上說而下順為上以說道使民而順於人心下說上之政令而順從於上既上下順說又陽剛處中正之位而下有應助如此故能聚也欲天下之萃才非如是不能也王假有廟致孝享也王者萃人心之道至於建立宗廟所以致其孝享之誠也祭祀人心之所自盡也故萃天下之心者無如孝享王者萃天下之道至於有廟則其極也利見大人亨聚以正也萃之時見大人則能亨蓋聚以正道也見大人則其聚以正道得其正則亨矣萃不以正其能亨乎用大牲吉利有攸往順天命也用大牲承上有廟之文以享祀而言凡事莫不如是豐聚之時交於物者當厚稱其宜也物聚而力贍乃可以有為故利有攸往皆天理然也故云順天命也觀其所聚而天地萬物之情可見矣觀萃之理可以見天地萬物之情也天地之化育萬物之生成凡有者皆聚也有無動靜終始之理聚散而已故觀其所以聚則天地萬物之情可見矣象曰澤上于地萃君子以除戎器戒不虞澤上于地為萃聚之象君子觀萃象以除治戎器用戒備於不虞凡物之萃則有不虞度之事故衆聚則有爭物聚則有奪大率既衆則多故矣故觀萃象而戒也除謂簡治也去弊惡也除而聚之所以戒不虞也初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎初與四為正應本有孚以相從者也然當萃時三隂聚處柔無守正之節若捨正應而從其類乃有孚而不終也乃亂惑亂其心也乃萃與其同類聚也初若守正不從號呼以求正應則一握笑之矣一握俗語一團也謂衆以為笑也若能勿恤而往從剛陽之正應則無過咎不然則入小人之羣矣象曰乃亂乃萃其志亂也其心志為同類所惑亂故乃萃於羣隂也不能固其守則為小人所惑亂而失其正矣六二引吉無咎孚乃利用禴初隂柔又非中正恐不能終其孚故因其才而為之戒二雖隂柔而得中正故雖戒而微辭凡爻之辭關得失二端者為法為戒亦各隨其才而設也引吉無咎引者相牽也人之交相求則合相待則離二與五為正應當萃者也而相遠又在羣隂之間必相牽引則得其萃矣五居尊位有中正之德二亦以中正之道往與之萃乃君臣和合也其所共致豈可量也是以吉而無咎也無咎者善補過也二與五不相引則過矣孚乃利用禴孚信之在中誠之謂也禴祭之簡薄者也菲薄而祭不尚備物直以誠意交於神明也孚乃者謂有其孚則可不用文飾專以至誠交於上也以禴言者謂薦其誠而已上下相聚而尚飾焉是未誠也蓋其中實者不假飾於外用禴之義也孚信者萃之本也不獨君臣之聚凡天下之聚在誠而已象曰引吉無咎中未變也萃之時以得聚為吉故九四為得上下之萃二與五雖正應然異處有間乃當萃而未合者也故能相引而萃則吉而無咎以其有中正之德未遽至改變也變則不相引矣或曰二既有中正之德而象云未變辭若不足何也曰羣隂比處乃其類聚方萃之時居其間能自守不變遠須正應剛立者能之二隂柔之才以其有中正之德可覬其未至於變耳故象含其意以存戒也六三萃如嗟如無攸利往無咎小吝三隂柔不中正之人也求萃於人而人莫與求四則非其正應又非其類是以不正為四所棄也與二則二自以中正應五是以不正為二所不與也故欲萃如則為人棄絶而嗟如不獲萃而嗟恨也上下皆不與無所利也惟往而從上六則得其萃為無咎也三與上雖非隂陽正應然萃之時以類相從皆以柔居一體之上又皆無與居相應之地上復處說順之極故得其萃而無咎也易道變動無常在人識之然而小吝何也三始求萃於四與二不獲而後往從上六人之動為如此雖得所求亦可小羞吝也象曰往無咎上㢲也上居柔說之極三往而無咎者上六㢲順而受之也九四大吉無咎四當萃之時上比九五之君得君臣之聚也下比下體羣隂得下民之聚也得上下之聚可謂善矣然四以陽居隂非正也雖得上下之聚必得大吉然後為無咎也大為周遍之義無所不周然後為大無所不正則為大吉大吉則無咎也夫上下之聚固有不由正道而得者非理枉道而得君者自古多矣非理枉道而得民者蓋亦有焉如齊之陳恆魯之季氏是也然得為大吉乎得為無咎乎故九四必能大吉然後為無咎也象曰大吉無咎位不當也以其位之不當疑其所為未能盡善故云必得大吉然後為無咎也非盡善安得為大吉乎九五萃有位無咎匪孚元永貞悔亡九五居天下之尊萃天下之衆而君臨之當正其位修其德以陽剛居尊位稱其位矣為有其位矣得中正之道無過咎也如是而有不信而未歸者則當自反以修其元永貞之德則無思不服而悔亡矣元永貞者君之德民所歸也故比天下之道與萃天下之道皆在此三者王者既有其位又有其德中正無過咎而天下尚有未信服歸附者蓋其道未光大也元永貞之道未至也在修德以來之如苗民逆命帝乃誕敷文德舜德非不至也蓋有遠近昏明之異故其歸有先後既有未歸則當修德也所謂德元永貞之道也元首也長也為君德首出庶物君長羣生有尊大之義焉有主統之義焉而又恆永貞固則通於神明光於四海無思不服矣乃無匪孚而其悔亡也所謂悔志之未光心之未慊也象曰萃有位志未光也象舉爻上句王者之志必欲誠信著於天下有感必通含生之類莫不懷歸若尚有匪孚是其志之未光大也上六齎咨涕洟無咎六說之主隂柔小入說髙位而處之天下孰肯與也求萃而人莫之與其窮至於齎咨而涕洟也齎咨咨嗟也人之絶之由己自取又將誰咎為人惡絶不知所為則隕獲而至嗟涕真小人之情狀也象曰齎咨涕洟未安上也小人所處常失其宜既貪而從欲不能自擇安地至於困窮則顛沛不知所為六之涕洟蓋不安於處上也君子慎其所處非義不居不幸而有危困則泰然自安不以纍其心小人居不擇安常履非據及其窮迫則隕穫躁撓甚至涕洟為可羞也未者非遽之辭猶俗云未便也未便能安於上也隂而居上孤處無與既非其據豈能安乎巽下坤上升序卦萃者聚也聚而上者謂之升故受之以升物之積聚而益髙大聚而上也故為升所以次於萃也為卦坤上㢲下本在地下為地中生木木生地中長而益髙為升之象也升元亨用見大人勿恤南征吉升者進而上也升進則有亨義而以卦才之善故元亨也用此道以見大人不假憂恤前進則吉也南征前進也彖曰柔以時升㢲而順剛中而應是以大亨以二體言柔升謂坤上行也㢲既體卑而就下坤乃順時而上升以時也謂時當升也柔既上而成升則下㢲而上順以㢲順之道升可謂時矣二以剛中之道應於五五以中順之德應於二能㢲而順其升以時是以元亨也彖文誤作大亨解在大有卦用見大人勿恤有慶也凡升之道必由大人升於位則由王公升於道則由聖賢用㢲順剛中之道以見大人必遂其升勿恤不憂其不遂也遂其升則已之福慶而福慶及物也南征吉志行也南人之所向南征謂前進也前進則遂其升而得行其志是以吉也象曰地中生木升君子以順德積小以髙大木生地中長而上升為升之象君子觀升之象以順修其德積纍微小以至髙大也順則可進逆乃退也萬物之進皆以順道也善不積不足以成名學業之充實道德之崇髙皆由積纍而至積小所以成髙大升之義也初六允升大吉初以柔居㢲體之下又㢲之主上承於九二之剛㢲之至者也二以剛中之德上應於君當升之任者也允者信從也初之柔㢲唯信從於二信二而從之同升乃大吉也二以德言則剛中以力言則當任初之隂柔又無應援不能自升從於剛中之賢以進是由剛中之道也吉孰大焉象曰允升大吉上合志也與在上者合志同升也上謂九二從二而升乃與二同志也能信從剛中之賢所以大吉九二孚乃利用禴無咎二陽剛而在下五隂柔而居上夫以剛而事柔以陽而從隂雖有時而然非順道也以暗而臨明以剛而事弱若黽勉於事勢非誠服也上下之交不以誠其可以久乎其可以有為乎五雖隂柔然居尊位二雖剛陽事上者也當內存至誠不假文飾於外誠積於中則自不事外飾故曰利用禴謂尚誠敬也自古剛強之臣事柔弱之君未有不為矯飾者也禴祭之簡質者也云孚乃謂既孚乃宜不用文飾專以其誠感通於上也如是則得無咎以剛強之臣而事柔弱之君又當升之時非誠意相交其能免於咎乎象曰九二之孚有喜也二能以孚誠事上則不唯為臣之道無咎而已可以行剛中之道澤及天下是有喜也凡象言有慶者如是則有福慶及於物也言有喜者事既善而又有可喜也如大畜童牛之牿元吉象云有喜蓋牿於童則易又免强制之難是有可喜也九三升虛邑三以陽剛之才正而且㢲上皆順之復有援應以是而升如入無人之邑孰禦哉象曰升虛邑無所疑也入無人之邑其進無疑阻也六四王用亨于岐山吉無咎四柔順之才上順君之升下順下之進已則止其所焉以隂居柔隂而在下止其所也昔者文王之居岐山之下上順天子而欲致之有道下順天下之賢而使之升進已則柔順謙恭不出其位至德如此周之王業用是而亨也四能如是則亨而吉且無咎矣四之才固自善矣復有無咎之辭何也曰四之才雖善而其位當戒也居近君之位在升之時不可復升升則凶咎可知故云如文王則吉而無咎也然處大臣之位不得無事於升當上升其君之道下升天下之賢已則止其分焉分雖當止而德則當升也道則當亨也盡斯道者其唯文王乎象曰王用亨子岐山順事也四居近君之位而當升時得吉而無咎者以其有順德也以柔居坤順之至也文王之亨于岐山亦以順時而已上順於上下順乎下已順處其義故云順事也六五貞吉升階五以下有剛中之應故能居尊位而吉然質本隂柔必守貞固乃得其吉也若不能貞固則信賢不篤任賢不終安能吉也階所由而升也任剛中之賢輔之而升猶登進自階言有由而易也指言九二正應然在下之賢皆用升之階也能用賢則彚升矣象曰貞吉升階大得志也倚任賢才而能貞固如是而升可以致天下之大治其志可大得也君道之升患無賢才之助爾有助則猶自階而升也上六冥升利于不息之貞六以隂居升之極昏冥於升知進而不知止者也其為不明甚矣然求升不已之心有時而用於貞正而當不息之事則為宜矣君子於貞正之德終日乾乾自强不息如上六不已之心用之於此則利也以小人貪求無已之心移於進德則何善如之象曰冥升在上消不富也昏冥於升極上而不知已唯有消亡豈復有加益也不富無復增益也升既極則有退而無進也伊川易傳卷三
