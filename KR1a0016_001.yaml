body:
  text: 伊川易傳卷一宋程子撰周易上經乾下乾上乾元亨利貞上古聖人始畫八卦三才之道備矣因而重之以盡天下之變故六畫而成卦重乾為乾乾天也天者天之形體乾者天之性情乾健也健而無息之謂乾夫天專言之則道也天且弗違是也分而言之則以形體謂之天以主宰謂之帝以功用謂之鬼神以妙用謂之神以性情謂之乾乾者萬物之始故為天為陽為父為君元亨利貞謂之四德元者萬物之始亨者萬物之長利者萬物之遂貞者萬物之成惟乾坤有此四德在他卦則隨事而變焉故元專為善大利主於正固亨貞之體各稱其事四德之義廣矣大矣初九潛龍勿用下爻為初九陽數之盛故以名陽爻理無形也故假象以顯義乾以龍為象龍之為物靈變不測故以象乾道變化陽氣消息聖人進退初九在一卦之下為始物之端陽氣方萌聖人側微若龍之潛隱未可自用當晦飬以俟時九二見龍在田利見大人田地上也出見於地上其德已著以聖人言之舜之田漁時也利見大德之君以行其道君亦利見大德之臣以共成其功天下利見大德之人以被其澤大德之君九五也乾坤純體不分剛柔而以同德相應九三君子終日乾乾夕惕若厲無咎三雖臣位已在下體之上未離於下而尊顯者也舜之𤣥德升聞時也日夕不懈而兢惕則雖處危地而無咎在下之人而君德已著天下將歸之其危懼可知雖言聖人事苟不設戒則何以為教作易之義也九四或躍在淵無咎淵龍之所安也或疑辭謂非必也躍不躍惟及時以就安耳聖人之動無不時也舜之歷試時也九五飛龍在天利見大人進位乎天位也聖人既得天位則利見在下大德之人與共成天下之事天下固利見夫大德之君也上九亢龍有悔九五者位之極中正者得時之極過此則亢矣上九至於亢極故有悔也有過則有悔唯聖人知進退存亡而無過則不至於悔也用九見羣龍無首吉用九者處乾剛之道以陽居乾體純乎剛者也剛柔相濟為中而乃以純剛是過乎剛也見羣龍謂觀諸陽之義無為首則吉也以剛為天下先凶之道也彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧卦下之辭為彖夫子從而釋之通謂之彖彖者言一卦之義故知者觀其彖辭則思過半矣大哉乾無贊乾元始萬物之道大也四德之元猶五常之仁偏言則一事專言則包四者萬物資始乃統天言元也乾元統言天之道也天道始萬物物資始於天也雲行雨施品物流形言亨也天道運行生育萬物也大明天道之終始則見卦之六位各以時成卦之初終乃天道終始乘此六爻之時乃天運也以御天謂以當天運乾道變化生育萬物洪纎髙下各以其類各正性命也天所賦為命物所受為性保合太和乃利貞保謂常存合謂常和保合太和是以利且貞也天地之道常久而不已者保合太和也天為萬物之祖王為萬邦之宗乾道首出庶物而萬彚亨君道尊臨天位而四海從王者體天之道則萬國咸寧也象曰天行健君子以自彊不息卦下象解一卦之象爻下象解一爻之象諸卦皆取象以為法乾道覆育之象至大非聖人莫能體欲人皆可取法也故取其行健而已至健固足以見天道也君子以自彊不息法天行之健也潛龍勿用陽在下也陽氣在下君子處微未可用也見龍在田德施普也見於地上德化及物其施已普也終日乾乾反復道也進退動息必以道也或躍在淵進無咎也量可而進適其時則無咎也飛龍在天大人造也大人之為聖人之事也亢龍有悔盈不可久也盈則變有悔也用九天德不可為首也用九天德也天德陽剛復用剛而好先則過矣文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也他卦彖象而已獨乾坤更設文言以發明其義推乾之道施於人事元亨利貞乾之四德在人則元者衆善之首也亨者嘉美之會也利者和合於義也貞者幹事之用也君子體仁足以長人體法於乾之仁乃為君長之道足以長人也體仁體元也比而效之謂之體嘉會足以合禮得會通之嘉乃合於禮也不合禮則非理豈得為嘉非理安有亨乎利物足以和義和於義乃能利物豈有不得其宜而能利物者乎貞固足以幹事貞固所以能幹事也君子行此四德者故曰乾元亨利貞行此四德乃合於乾也初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也自此以下言乾之用用九之道也初九陽之微龍德之潛隱乃聖賢之在側陋也守其道不隨世而變晦其行不求知於時自信自樂見可而動知難而避其守堅不可奪潛龍之德也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也以龍德而處正中者也在卦之正中為得正中之義庸信庸謹造次必於是也既處無過之地則唯在間邪邪既間則誠存矣善世而不伐不有其善也德博而化正己而物正也皆大人之事雖非君位君之德也九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣三居下之上而君德已著將何為哉唯進德修業而已內積忠信所以進德也擇言篤志所以居業也知至至之致知也求知所至而後至之知之在先故可與幾所謂始條理者知之事也知終終之力行也既知所終則力進而終之守之在後故可與存義所謂終條理者聖之事也此學之始終也君子之學如是故知處上下之道而無驕憂不懈而知懼雖在危地而無咎也九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎或躍或處上下無常或進或退去就從宜非為邪枉非離羣類進德修業欲及時耳時行時止不可恆也故云或深淵者龍之所安也在淵謂躍就所安淵在深而言躍但取進就所安之義或疑辭隨時而未可必也君子之順時猶影之隨形可離非道也九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也人之與聖人類也五以龍德升尊位人之類莫不歸仰况同德乎上應於下下從於上同聲相應同氣相求也流濕就燥從龍從虎皆以氣類故聖人作而萬物皆覩上既見下下亦見上物人也古語云人物物論謂人也易中利見大人其言則同義則有異如訟之利見大人謂宜見大德中正之人則其辨明言在見前乾之二五則聖人既出上下相見其成其事所利者見大人也言在見後本乎天者如日月星辰本乎地者如蟲獸草木陰陽各從其類人物莫不然也上九曰亢龍有悔何謂也子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也九居上而不當尊位是以無民無輔動則有悔也潛龍勿用下也此以下言乾之時勿用以在下未可用也見龍在田時舍也隨時而止也終日乾乾行事也進德修業也或躍在淵自試也隨時自用也飛龍在天上治也得位而行上之治也亢龍有悔窮之災也窮極而災至也乾元用九天下治也用九之道天與聖人同得其用則天下治也潛龍勿用陽氣潛藏此以下言乾之義方陽微潛藏之時君子亦當晦隱未可用也見龍在田天下文明龍德見於地上則天下見其文明之化也終日乾乾與時偕行隨時而進也或躍在淵乾道乃革離下位而升上位上下革矣飛龍在天乃位乎天德正位乎上位當天德亢龍有悔與時偕極時既極則處時者亦極矣乾元用九乃見天則用九之道天之則也天之法則謂天道也或問乾之六爻皆聖人之事乎曰盡其道者聖人也得失則吉凶存焉豈特乾哉諸卦皆然也乾元者始而亨者也又反覆詳說以盡其義既始則必亨不亨則息矣利貞者性情也乾之性情也既始而亨非利貞其能不息乎乾始能以美利利天下不言所利大矣哉乾始之道能使庶類生成天下蒙其美利而不言所利者蓋無所不利非可指名也故贊其利之大曰大矣哉大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也大哉贊乾道之大也以剛健中正純粹六者形容乾道精謂六者之精極以六爻發揮旁通盡其情義乘六爻之時以當天運則天之功用著矣故見雲行雨施陰陽溥暢天下和平之道也君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也德之成其事可見者行也德成而後可施於用初方潛隱未見其行未成未成未著也是以君子弗用也君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也聖人在下雖已顯而未得位則進德修業而已學聚問辨進德也寬居仁行修業也君德已著利見大人而進以行之耳進居其位者舜禹也進行其道者伊傅也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣三重剛剛之盛也過中而居下之上上未至於天而下已離於田危懼之地也因時順處乾乾兢惕以防危故雖危而不至於咎君子順時兢惕所以能泰也九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎四不在天不在田而出人之上矣危地也疑者未決之辭處非可必也或進或退唯所安耳所以無咎也夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎大人與天地日月四時鬼神合者合乎道也天地者道也鬼神者造化之迹也聖人先於天而天同之後於天而能順天者合於道而已合於道則人與鬼神豈能違也亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎極之甚為亢至於亢者不知進退存亡得喪之理也聖人則知而處之皆不失其正故不至於亢也坤下坤上坤元亨利牝馬之貞坤乾之對也四德同而貞體則異乾以剛固為貞坤則柔順而貞牝馬柔順而健行故取其象曰牝馬之貞君子有攸往君子所行柔順而利且貞合坤德也先迷後得主利陰從陽者也待唱而和陰而先陽則為迷錯居後乃得其常也主利利萬物則主於坤生成皆地之功也臣道亦然君令臣行勞於事者臣之職也西南得朋東北喪朋安貞吉西南陰方東北陽方陰必從陽離喪其朋類乃能成化育之功而有安貞之吉得其常則安安於常則貞是以吉也彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆資生之道可謂大矣乾既稱大故坤稱至至義差緩不若大之盛也聖人於尊卑之辨謹嚴如此萬物資乾以始資坤以生父母之道也順承天施以成其功坤之厚德持載萬物合於乾之無疆也含𢎞光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行以含𢎞光大四者形容坤道猶乾之剛健中正純粹也含包容也𢎞寬裕也光昭明也大博厚也有此四者故能成承天之功品物咸得亨遂取牝馬為象者以其柔順而健行地之類也行地無疆謂健也乾健坤順坤亦健乎曰非健何以配乾未有乾行而坤止也其動也剛不害其為柔也柔順而利貞乃坤德也君子之所行也君子之道合坤德也先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆乾之用陽之為也坤之用陰之為也形而上曰天地之道形而下曰陰陽之功先迷後得以下言陰道也先唱則迷失陰道後和則順而得其常理西南陰方從其類得朋也東北陽方離其類喪朋也離其類而從陽則能成生物之功終有吉慶也與類行者本也從於陽者用也陰體柔躁故從於陽則能安貞而吉應地道之無疆也陰而不安貞豈能應地之道彖有三無疆蓋不同也德合無疆天之不已也應地無疆地之無窮也行地無疆馬之健行也象曰地勢坤君子以厚德載物坤道之大猶乾也非聖人孰能體之地厚而其勢順傾故取其順厚之象而云地勢坤也君子觀坤厚之象以深厚之德容載庶物初六履霜堅氷至陰爻稱六陰之盛也八則陽生矣非純盛也陰始生於下至微也聖人於陰之始生以其將長則為之戒陰之始凝而為霜履霜則當知陰漸盛而至堅氷矣猶小人始雖甚微不可使長長則至於盛也象曰履霜堅氷陰始凝也馴致其道至堅氷也陰始凝而為霜漸盛則至於堅永小人雖微長則漸至於盛故戒於初馴謂習習而至於盛習因循也六二直方大不習無不利二陰位在下故為坤之主統言坤道中正在下地之道也以直方大三者形容其德用盡地之道矣由直方大故不習而無所不利不習謂其自然在坤道則莫之為而為也在聖人則從容中道也直方大孟子所謂至大至剛以直也在坤體故以方易剛猶貞加牝馬也言氣則先大大氣之體也於坤則先直方由直方而大也直方大足以盡地道在人識之耳乾坤純體以位相應二坤之主故不取五應不以君道處五也乾則二五相應象曰六二之動直以方也不習無不利地道光也承天而動直以方耳直方則大矣直方之義其大無窮地道光顯其功順成豈習而後利哉六三含章可貞或從王事無成有終三居下之上得位者也為臣之道當含晦其章美有善則歸之於君乃可常而得正上無忌惡之心下得柔順之道也可貞謂可貞固守之又可以常久而無悔咎也或從上之事不敢當其成功惟奉事以守其終耳守職以終其事臣之道也象曰含章可貞以時發也夫子懼人之守文而不達義也又從而明之言為臣處下之道不當有其功善必含晦其美乃正而可常然義所當為者則以時而發不有其功耳不失其宜乃以時也非含藏終不為也含而不為不盡忠者也或從王事知光大也象只舉上句解義則并及下文他卦皆然或從王事而能無成有終者是其知之光大也唯其知之光大故能含晦淺暗之人有善唯恐人之不知豈能含章也六四括囊無咎無譽四居近五之位而無相得之義乃上下閉隔之時其自處以正危疑之地也若晦藏其知如括結囊口而不露則可得無咎不然則有害也既晦藏則無譽矣象曰括囊無咎慎不害也能慎如此則無害也六五黃裳元吉坤雖臣道五實君位故為之戒云黃裳元吉黃中色裳下服守中而居下則元吉謂守其分也元大而善也爻象唯言守中居下則元吉不盡發其義也黃裳既元吉則居尊為天下大凶可知後之人未達則此義晦矣不得不辨也五尊位也在他卦六居五或為柔順或為文明或為暗弱在坤則為居尊位陰者臣道也婦道也臣居尊位羿莽是也猶可言也婦居尊位女媧氏武氏是也非常之變不可言也故有黃裳之戒而不盡言也或疑在革湯武之事猶盡言之獨於此不言何也曰廢興理之常也以陰居尊位非常之變也象曰黃裳元吉文在中也黃中之文在中不過也內積至美而居下故為元吉上六龍戰于野其血𤣥黃陰從陽者也然盛極則抗而爭六既極矣復進不已則必戰故云戰于野野謂進至於外也既敵矣必皆傷故其血𤣥黃象曰龍戰于野其道窮也陰盛至於窮極則必爭而傷也用六利永貞坤之用六猶乾之用九用陰之道也陰道柔而難常故用六之道利在常永貞固象曰用六永貞以大終也陰既貞固不足則不能永終故用六之道利在盛大於終能大於終乃永貞也文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行坤道至柔而其動則剛坤體至靜而其德則方動剛故應乾不違德方故生物有常陰之道不唱而和故居後為得而主利成萬物坤之常也含容萬類其功化光大也主字下脫利字坤道其順乎承天而時行承天之施行不違時贊坤道之順也積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅氷至蓋言順也天下之事未有不由積而成家之所積者善則福慶及於子孫所積不善則災殃流於後世其大至於弒逆之禍皆因積纍而至非朝夕所能成也明者則知漸不可長小積成大辨之於早不使順長故天下之惡無由而成乃知霜氷之戒也霜而至於氷小惡而至於大皆事勢之順長也直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也直言其正也方言其義也君子主敬以直其內守義以方其外敬立而內直義形而外方義形於外非在外也敬義既立其德盛矣不期大而大矣德不孤也無所用而不周無所施而不利就為疑乎陰雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也為下之道不居其功含晦其章美以從王事代上以終其事而不敢有其成功也猶地道代天終物而成功則主於天也妻道亦然天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也四居上近君而無相得之義故為隔絶之象天地交感則變化萬物草木蕃盛君臣相際而道亨天地閉隔則萬物不遂君臣道絶賢者隱遁四於閉隔之時括囊晦藏則雖無令譽可得無咎言當謹自守也君子黃中通理正位居體美在其中而暢於四支發於事業美之至也黃中文居中也君子文中而達於理居正位而不失為下之體五尊位在坤則惟取中正之義美積於中而通暢於四體發見於事業德美之至盛也陰疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黃者天地之雜也天𤣥而地黃陽大陰小陰必從陽陰既盛極與陽偕矣是疑於陽也不相從則必戰卦雖純陰恐疑無陽故稱龍見其與陽戰也于野進不已而至於外也盛極而進不已則戰矣雖盛極不離陰類也而與陽爭其傷可知故稱血陰既盛極至與陽爭雖陽不能無傷故其血𤣥黃𤣥黃天地之色謂皆傷也震下坎上屯序卦曰有天地然後萬物生焉盈天地之間者惟萬物故受之以屯屯者盈也屯者物之始生也萬物始生鬱結未通故為盈塞於天地之間至通暢茂盛則塞意亡矣天地生萬物屯物之始生故繼乾坤之後以二象言之雲雷之興陰陽始交也以二體言之震始交於下坎始交於中陰陽相交乃成雲雷陰陽始交雲雷相應而未成澤故為屯若已成澤則為解也又動於險中亦屯之義陰陽不交則為否始交而未暢則為屯在時則天下屯難未亨泰之時也屯元亨利貞勿用有攸往利建侯屯有大亨之道而處之利在貞固非貞固何以濟屯方屯之時未可有所往也天下之屯豈獨力所能濟必廣資輔助故利建侯也彖曰屯剛柔始交而難生動乎險中以雲雷二象言之則剛柔始交也以坎震二體言之動乎險中也剛柔始交未能通暢則艱屯故云難生又動於險中為艱屯之義大亨貞雷雨之動滿盈所謂大亨而貞者雷雨之動滿盈也陰陽始交則艱屯未能通暢及其和洽則成雷雨滿盈於天地之間生物乃遂屯有大亨之道也所以能大亨由夫貞也非貞固安能出屯人之處屯有致大亨之道亦在夫貞固也天造草昧宜建侯而不寧上文言天地生物之義此言時事天造謂時運也草草亂無倫序昧冥昧不明當此時運所宜建立輔助則可以濟屯雖建侯自輔又當憂勤兢畏不遑寧處聖人之深戒也象曰雲雷屯君子以經綸坎不云雨而云雲者雲為雨而未成者也未能成雨所以為屯君子觀屯之象經綸天下之事以濟於屯難經緯綸緝謂營為也初九磐桓利居貞利建侯初以陽爻在下乃剛明之才當屯難之世居下位者也未能便往濟屯故磐桓也方屯之初不磐桓而遽進則犯難矣故宜居正而固其志凡人處屯難則鮮能守正苟無貞固之守則將失義安能濟時之屯乎居屯之世方屯於下所宜有助乃居屯濟屯之道也故取建侯之義謂求輔助也象曰雖盤桓志行正也賢人在下時苟未利雖盤桓未能遂往濟時之屯然有濟屯之志與濟屯之用志在行其正也以貴下賤大得民也九當屯難之時以陽而來居陰下為以貴下賤之象方屯之時陰柔不能自存有一剛陽之才衆所歸從也更能自處卑下所以大得民也或疑方屯於下何有貴乎夫以剛明之才而下於陰柔以能濟屯之才而下於不能乃以貴下賤也况陽之於陰自為貴乎六二屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字二以陰柔居屯之世雖正應在上而逼於初剛故屯難邅回如辭也乘馬欲行也欲從正應而復班如不能進也班分布之義下馬為班與馬異處也二當屯世雖不能自濟而居中得正有應在上不失義者也然逼近於初陰乃陽所求柔者剛所陵柔當屯時固難自濟又為剛陽所逼故為難也設匪逼於冦難則往求於婚媾矣婚媾正應也冦非理而至者二守中正不苟合於初所以不字苟貞固不易至於十年屯極必通乃獲正應而字育矣以女子陰柔苟能守其志節久必獲通况君子守道不回乎初為賢明剛正之人而為冦以侵逼於人何也曰此自據二以柔近剛而為義更不計初之德如何也易之取義如此象曰六二之難乘剛也十年乃字反常也六二居屯之時而又乘剛為剛陽所逼是其患難也至於十年則難久必通矣乃得反其常與正應合也十數之終也六三即鹿無虞惟入于林中君子幾不如舍往吝六三以陰柔居剛柔既不能安屯居剛而不中正則妄動雖貪於所求既不足以自濟又無應援將安之乎如即鹿而無虞人也入山林者必有虞人以導之者則惟陷入于林莽中君子見事之幾微不若舍而勿逐往則徒取窮吝而已象曰即鹿無虞以從禽也君子舍之往吝窮也事不可而妄動以從欲也無虞而即鹿以貪禽也當屯之時不可動而動猶無虞而即鹿以有從禽之心也君子則見幾而舍之不從若往則可吝而困窮也六四乘馬班如求婚媾往吉無不利六四以柔順居近君之位得於上者也而其才不足以濟屯故欲進而復止乘馬班如也已既不足以濟時之屯若能求賢以自輔則可濟矣初陽剛之賢乃是正應已之婚媾也若求此陽剛之婚媾往與共輔陽剛中正之君濟時之屯則吉而無所不利也居公卿之位己之才雖不足以濟時之屯若能求在下之賢親而用之何所不濟哉象曰求而往明也知己不足求賢自輔而後往可謂明矣居得致之地已不能而遂至暗者也九五屯其膏小貞吉大貞凶五居尊得正而當屯時若有剛明之賢為之輔則能濟屯矣以其無臣也故屯其膏人君之尊雖屯難之世於其名位非有損也唯其施為有所不行德澤有所不下是屯其膏人君之屯也既膏澤有所不下是威權不在已也威權去已而欲驟正之求凶之道魯昭公高貴鄉公之事是也故小貞則吉也小貞則漸正之也若盤庚周宣修德用賢復先王之政諸侯復朝謂以道馴致為之不暴也又非恬然不為若唐之僖昭也不為則常屯以至於亡矣象曰屯其膏施未光也膏澤不下及是以德施未能光大也人君之屯也上六乘馬班如泣血漣如六以陰柔居屯之終在險之極而無應援居則不安動無所之乘馬欲往復班如不進窮厄之甚至於泣血漣如屯之極也若陽剛而有助則屯既極可濟矣象曰泣血漣如何可長也屯難窮極莫知所為故至泣血顛沛如此其能長久乎夫卦者事也爻者事之時也分三而又兩之足以包括衆理引而伸之觸類而長之天下之能事畢矣坎下艮上蒙序卦屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之稚也屯者物之始生物始生稚小蒙昧未發蒙所以次屯也為卦艮上坎下艮為山為止坎為水為險山下有險遇險而止莫知所之蒙之象也水必行之物始出未有所之故為蒙及其進則為亨義蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞蒙有開發之理亨之義也卦才時中乃致亨之道六五為蒙之主而九二發蒙者也我謂二也二非蒙主五既順巽於二二乃發蒙者也故主二而言匪我求童蒙童蒙求我五居尊位有柔順之德而方在童蒙與二為正應而中德又同能用二之道以發其蒙也二以剛中之德在下為君所信嚮當以道自守待君至誠求已而後應之則能用其道匪我求於童蒙乃童蒙來求於我也筮占決也初筮告謂至誠一意以求已則告之再三則瀆慢矣故不告也發蒙之道利以貞正又二雖剛中然居陰故宜有戒彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也山下有險內險不可處外止莫能進未知所為故為昏蒙之義蒙亨以亨行時中也蒙之能亨以亨道行也所謂亨道時中也時謂得君之應中謂處得其中得中則時也匪我求童蒙童蒙求我志應也二以剛明之賢處於下五以童蒙居上非是二求於五蓋五之志應於二也賢者在下豈可自進以求於君苟自求之必無能信用之理古之人所以必待人君致敬盡禮而後往者非欲自為尊大蓋其尊德樂道不如是不足與有為也初筮告以剛中也再三瀆瀆則不告瀆蒙也初筮謂誠一而來求決其蒙則當以剛中之道告而開發之再三煩數也來筮之意煩數不能誠一則瀆慢矣不當告也告之必不能信受徒為煩瀆故曰瀆蒙也求者告者皆煩瀆矣蒙以養正聖功也卦辭曰利貞彖復伸其義以明不止為戒於二實養蒙之道也未發之謂蒙以純一未發之蒙而養其正乃作聖之功也發而後禁則扞格而難勝養正於蒙學之至善也蒙之六爻二陽為治蒙者四陰皆處蒙者也象曰山下出泉蒙君子以果行育德山下出泉出而遇險未有所之蒙之象也若人蒙稚未知所適也君子觀蒙之象以果行育德觀其出而未能通行則以果決其所行觀其始出而未有所向則以養育其明德也初六發蒙利用刑人用說桎梏以往吝初以陰暗居下下民之蒙也爻言發之之道發下民之蒙當明刑禁以示之使之知畏然後從而教導之自古聖王為治設刑罰以齊其衆明教化以善其俗刑罰立而後教化行雖聖人尚德而不尚刑未嘗偏廢也故為政之始立法居先治蒙之初威之以刑者所以說去其昏蒙之桎牿桎梏謂拘束也不去其昏蒙之桎牿則善教無由而入既以刑禁率之雖使心未能喻亦當畏威以從不敢肆其昏蒙之欲然後漸能知善道而革其非心則可以移風易俗矣苟專用刑以為治則蒙雖畏而終不能發苟免而無耻治化不可得而成矣故以往則可吝象曰利用刑人以正法也治蒙之始立其防限明其罪罰正其法也使之由之漸至於化也或疑發蒙之初遽用刑人無乃不教而誅乎不知立法制刑乃所以教也蓋後之論刑者不復知教化在其中矣九二包蒙吉納婦吉子克家包舍容也二居蒙之世有剛明之才而與六五之君相應中德又同當時之任者也必廣其含容哀矜昏愚則能發天下之蒙成治蒙之功其道廣其施博如是則吉也卦唯二陽爻上九剛而過唯九二有剛中之德而應於五用於時而獨明者也苟恃其明專於自任則其德不𢎞故雖婦人之柔暗尚當納其所善則其明廣矣又以諸爻皆陰故云婦堯舜之聖天下所莫及也尚曰清問下民取人為善也二能包納則克濟其君之事猶子能治其家也五既陰柔故發蒙之功皆在於二以家言之五父也二子也二能主蒙之功乃人子克治其家也象曰子克家剛柔接也子而克治其家者父之信任専也二能主蒙之功者五之信任専也二與五剛柔之情相接故得行其剛中之道成發蒙之功苟非上下之情相接則二雖剛中安能尸其事乎六三勿用取女見金夫不有躬無攸利三以陰柔處蒙暗不中不正女之妄動者也正應在上不能逺從近見九二為羣蒙所歸得時之盛故捨其正應而從之是女之見金夫也女之從人當由正禮乃見人之多金說而從之不能保有其身者也無所往而利矣象曰勿用取女行不順也女之如此其行邪僻不順不可取也六四困蒙吝四以陰柔而蒙暗無則明之親援無由自發其蒙困於昏蒙者也其可吝甚矣吝不足也謂可少也象曰困蒙之吝獨逺實也蒙之時陽剛為發蒙者四陰柔而最逺於剛乃愚蒙之人而不比近賢者無由得明矣故困於蒙可羞吝者以其獨逺於賢明之人也不能親賢以致困可吝之甚也實謂陽剛也六五童蒙吉五以柔順居君位下應於二以柔中之德任剛明之才足以治天下之蒙故吉也童取未發而資於人也為人君者苟能至誠任賢以成其功何異乎出於己也象曰童蒙之吉順以㢲也舍己從人順從也降志下求卑㢲也能如是優於天下矣上九擊蒙不利為冦利禦冦九居蒙之終是當蒙極之時人之愚蒙既極如苗民之不率為冦為亂者當擊伐之然九居上剛極而不中故戒不利為冦治人之蒙乃禦冦也肆為剛暴乃為冦也若舜之征有苗周公之誅三監禦冦也秦皇漢武窮兵誅伐為冦也象曰利用禦冦上下順也利用禦冦上下皆得其順也上不為過暴下得擊去其蒙禦冦之義也乾下坎上需序卦蒙者蒙也物之稚也物稚不可不養也故受之以需需者飲食之道也夫物之幼稚必待養而成養物之所需者飲食也故曰需者飲食之道也雲上於天有蒸潤之象飲食所以潤益於物故需為飲食之道所以次蒙也卦之大意須待之義序卦取所須之大者耳乾健之性必進者也乃處坎險之下險為之阻故須待而後進也需有孚光亨貞吉利涉大川需者須待也以二體言之乾之剛健上進而遇險未能進也故為需待之義以卦才言之五居君位為需之主有剛健中正之德而誠信充實於中中實有孚也有孚則光明而能亨通得貞正而吉也以此而需何所不濟雖險無難矣故利涉大川也凡貞吉有既正且吉者有得正則吉者當辨也彖曰需須也險在前也剛健而不陷其義不困窮矣需之義須也以險在於前未可遽進故需待而行也以乾之剛健而能需待不輕動故不陷於險其義不至於困窮也剛健之人其動必躁乃能需待而動處之至善者也故夫子贊之云其義不困窮矣需有孚光亨貞吉位乎天位以正中也五以剛實居中為孚之象而得其所需亦為有孚之義以乾剛而至誠故其德光明而能亨通得貞正而吉也所以能然者以居天位而得正中也居天位指五以正中兼二言故云正中利涉大川往有功也既有孚而貞正雖涉險阻往則有功也需道之至善也以乾剛而能需何所不利象曰雲上於天需君子以飲食宴樂雲氣蒸而上升於天必待陰陽和洽然後成雨雲上上於天未成雨也故為須待之義陰陽之氣交感而未成雨澤猶若子畜其才德而未施於用也君子雲上於天需而為雨之象懷其道德安以待時飲食以養其氣體宴樂以和其心志所謂居易以俟命也初九需于郊利用恆無咎需者以遇險故需而後進初最逺於險故為需于郊郊曠逺之地也處於曠逺利在安守其常則無咎也不能安常則躁動犯難豈能需於逺而無過也象曰需于郊不犯難行也利用恆無咎未失常也處曠逺者不犯冒險難而行也陽之為物剛健上進者也初能需待於曠逺之地不犯險難而進復宜安處不失其常則可以無咎矣雖不進而志動者不能安其常也君子之需時也安靜自守志雖有須而恬然若將終身焉乃能用常也九二需于沙小有言終吉坎為水水近則有沙二去險漸近故為需于沙漸近於險難雖未至於患害己小有言矣凡患難之辭大小有殊小者至於有言言語之傷至小者也二以剛陽之才而居柔守中寬裕自處需之善也雖去險漸近而未至於險故小有言語之傷而無大害終得其吉也象曰需于沙衍在中也雖小有言以吉終也衍寬綽也二雖近險而以寬裕居中故雖小有言語及之終得其吉善處者也九三需于泥致冦至泥逼於水也既進逼於險當致冦難之至也三剛而不中又居健體之上有進動之象故致冦也苟非敬慎則致喪敗矣象曰需于泥災在外也自我致冦敬慎不敗也三切逼上體之險難故云災在外也災患難之通稱對眚而言則分也三之致冦由己進而迫之故云自我冦自己致若能敬愼量宜而進則無喪敗也需之時須而後進也其義在相時而動非戒其不得進也直使敬慎毋失其宜耳六四需于血出自穴四以陰柔之質處於險而下當三陽之進傷於險難者也故云需于血既傷于險難則不能安處必失其居故云出自穴穴物之所安也順以從時不競於險難所以不至於凶也以柔居陰非能競者也若陽居之則必凶矣蓋無中正之德徒以剛競於險適足以致凶耳象曰需于血順以聽也四以陰柔居于險難之中不能固處故退出自穴蓋陰柔不能與時競不能處則退是順從以聽於時所以不至於凶也九五需于酒食貞吉五以陽剛居中得正位乎天位克盡其道矣以此而需何需不獲故宴安酒食以俟之所須必得也既得貞正而所需必遂可謂吉矣象曰酒食貞吉以中正也需于酒食而貞且吉者以五得中正而盡其道也上六入于穴有不速之客三人來敬之終吉需以險在前需時而後進上六居險之終終則變矣在需之極久而得矣陰止於六乃安其處故為入于穴穴所安也安而既止後者必至不速之客三人謂下之三陽乾之三陽非在下之物需時而進者也需既極矣故皆上進不速不促之而自來也上六既需得其安處羣剛之來苟不起忌疾忿競之心至誠盡敬以待之雖甚剛暴豈有侵陵之理故終吉也或疑以陰居三陽之上得為安乎曰三陽乾體志在上進六陰位非所止之正故無爭奪之意敬之則吉也象曰不速之客來敬之終吉雖不當位未大失也不當位謂以陰而在上也爻以六居陰為所安象復盡其義明陰宜在下而居上為不當位也然能敬慎以自處則陽不能陵終得其吉雖不當位而未至於大失也坎下乾上訟序卦飲食必有訟故受之以訟人之所需者飲食既有所須爭訟所由起也訟所以次需也為卦乾上坎下以二象言之天陽上行水性就下其行相違所以成訟也以二體言之上剛下險剛險相接能無訟乎又人內險阻而外剛强所以訟也訟有孚窒惕中吉終凶訟之道必有其孚實中無其實乃是誣妄凶之道也卦之中實為有孚之象訟者與人爭辨而待決於人雖有孚亦須窒塞未通不窒則已明無訟矣事既未辨吉凶未可必也故有畏惕中吉得中則吉也終凶終極其事則凶也利見大人不利涉大川訟者求辨其曲直也故利見於大人大人則能以其剛明中正決所訟也訟非和平之事當擇安地而處不可陷於危險故不利涉大川也彖曰訟上剛下險險而健訟訟之為卦上剛下險險而又健也又為險健相接內險外健皆所以為訟也若健而不險不生訟也險而不健不能訟也險而又健是以訟也訟有孚窒惕中吉剛來而得中也訟之道固如是又據卦才而言九二以剛自外來而成訟則二乃訟之主也以剛處中中實之象故為有孚處訟之時雖有孚信亦必艱阻窒塞而有惕懼不窒則不成訟矣又居險陷之中亦為窒塞惕懼之義二以陽剛自外來而得中為以剛來訟而不過之義是以吉也卦有更取成卦之由為義者此是也卦義不取成卦之由則更不言所變之爻也據卦辭二乃善也而爻中不見其善蓋卦辭取其有孚得中而言乃善也爻則以自下訟上為義所取不同也終凶訟不可成也訟非善事不得已也安可終極其事極意於其事則凶矣故曰不可成也成謂窮盡其事也利見大人尚中正也訟者求辨其是非也辨之當乃中正也故利見大人以所尚者中正也聽者非其人則或不得其中正也中正大人九五是也不利涉大川入于淵也與人訟者必處其身於安平之地若蹈危險則陷其身矣乃入于深淵也卦中有中正險陷之象象曰天與水違行訟君子以作事謀始天上水下相違而行二體違戾訟之由也若上下相順訟何由興君子觀象知人情有爭訟之道故凡所作事必謀其始絶訟端於事之始則訟無由生矣謀始之義廣矣若慎交結明契劵之類是也初六不永所事小有言終吉六以柔弱居下不能終極其訟者也故於訟之初因六之才為之戒曰若不長永其事則雖小有言終得吉也蓋訟非可長之事以陰柔之才而訟於下難以吉矣以上有應援而能不永其事故雖小有言終得吉也有言災之小者也不永其事而不至於凶乃訟之吉也象曰不永所事訟不可長也六以柔弱而訟於下其義固不可長永也永其訟則不勝而禍難及矣又於訟之初即戒訟非可長之事也雖小有言其辨明也柔弱居下才不能訟雖不永所事既訟矣必有小災故小有言也既不永其事又上有剛陽之正應辨理之明故終得其吉也不然其能免乎在訟之義同位而相應相與者也故初於四為獲其辨明同位而不相得相訟者也故二與五為對敵也九二不克訟歸而逋其邑人三百户無眚二五相應之地而兩剛不相與相訟者也九二自外來以剛處險為訟之主乃與五為敵五以中正處君位其可敵乎是為訟而義不克也若能知其義之不可退歸而逋避以寡約自處則得無過眚也必逋者避為敵之地也三百戶邑之至小者若處强大是猶競也能無眚乎眚過也處不當也與知惡而為有分也象曰不克訟歸逋竄也義既不敵故不能訟而逋竄避去其所也自下訟上患至掇也自下而訟其上義乖勢屈禍患之至猶拾掇而取之言易得也六三食舊德貞厲終吉三雖居剛而應上然質本陰柔處險而介二剛之間危懼非為訟者也祿者稱德而受食舊德謂處其素分貞謂堅固自守厲終吉謂雖處危地能知危懼則終必獲吉也守素分而無求則不訟矣處危謂在險而成乘皆剛與居訟之時也或從王事無成柔從剛者也下從上者也三不為訟而從上九所為故曰或從王事無成謂從上而成不在己也訟者剛健之事故初則不永三則從上皆非能訟者也二爻皆以陰柔不終而得吉四亦以不克而渝得吉訟以能止為善也象曰食舊德從上吉也守其素分雖從上之所為非由己也故無成而終得其吉也九四不克訟復即命渝安貞吉四以陽剛而居健體不得中正本為訟者也承五履三而應初五君也義不克訟三居下而柔不與之訟初正應而順從非與訟者也四雖剛健欲訟無與對敵其訟無由而興故不克訟也又居柔以應柔亦為能止之義既義不克訟若能克其剛忿欲訟之心復即就於命革其心平其氣變而為安貞則吉矣命謂正理失正理為方命故以即命為復也方不順也書云方命圮族孟子云方命虐民夫剛健而不中正則躁動故不安處非中正故不貞不安貞所以好訟也若義不克訟而不訟反就正理變其不安貞為安貞則吉矣象曰復即命渝安貞不失也能如是則為無失矣所以吉也九五訟元吉以中正居尊位治訟者也治訟得其中正所以元吉也元吉大吉而盡善也吉大而不盡善者有矣象曰訟元吉以中正也中正之道何施而不元吉上九或錫之鞶帶終朝三褫之九以陽居上剛健之極又處訟之終極其訟者也人之肆其剛强窮極於訟取禍喪身固其理也設或使之善訟能勝窮極不已至於受服命之賞是亦與人仇爭所獲其能安保之乎故終一朝而三見褫奪也象曰以訟受服亦不足敬也窮極訟事設使受服命之寵亦且不足敬而可賤惡况又禍患隨至乎坎下坤上師序卦訟必有衆起故受之以師師之興由有爭也所以次訟也為卦坤上坎下以二體言之地中有水為衆聚之象以二卦之義言之內險外順險道而以順行師之義也以爻言之一陽而為衆陰之主統衆之象也比以一陽為衆陰之主而在上君之象也師以一陽為衆陰之主而在下將帥之象也師貞丈人吉無咎師之道以正為本興師動衆以毒天下而不以正民弗從也强驅之耳故師以貞為主其動雖正也帥之者必丈人則吉而無咎也蓋有吉而有咎者有無咎而不吉者吉且無咎乃盡善也丈人者尊嚴之稱帥師總衆非衆所尊信畏服則安能得人心之從故司馬穰苴擢自微賤授之以衆乃以衆心未服請莊賈為將也所謂丈人不必素居崇貴但其才謀德業衆所畏服則是也如穰苴既誅莊賈則衆心畏服乃丈人矣又如淮隂侯起於微賤遂為大將蓋其謀為有以使人尊畏也彖曰師衆也貞正也能以衆正可以王矣能使衆人皆正可以王天下矣得衆心服從而歸正王道止於是也剛中而應行險而順言二也以剛處中剛而得中道也六五之君為正應信任之専也雖行險道而以順動所謂義兵王者之師也上順下險行險而順也以此毒天下而民從之吉又何咎矣師旅之興不無傷財害人毒害天下然而民心從之者以其義動也古者東征西怨民心從也如是故吉而無咎吉謂必克無咎謂合義又何咎矣其義故無咎也象曰地中有水師君子以容民畜衆地中有水水聚於地中為衆聚之象故為師也君子觀地中有水之象以容保其民畜聚其衆也初六師出以律否臧凶初師之始也故言出師之義及行師之道在邦國興師而言合義理則是以律法也謂以禁亂誅暴而動苟動不以義則雖善亦凶道也善謂克勝凶謂殃民害義也在行師而言律謂號令節制行師之道以號令節制為本所以統制於衆不以律則雖善亦凶雖使勝捷猶凶道也制師無法幸而不敗且勝者時有之矣聖人之所戒也象曰師出以律失律凶也師出當以律失律則凶矣雖幸而勝亦凶道也九二在師中吉無咎王三錫命師卦惟九二一陽為衆陰所歸五居君位是其正應二乃師之主專制其事者也居下而專制其事唯在師則可自古命將閫外之事得專制之在師專制而得中道故吉而無咎蓋恃專則失為下之道不專則無成功之理故得中為吉凡師之道威和並至則吉也既處之盡其善則能成功而安天下故王錫寵命至于三也凡事至于三者極也六五在上既專意任復厚其寵數蓋禮不稱則威不重而下不信也他卦九二為六五所任者有矣唯師專主其事而為衆陰所歸故其義最大人臣之道於事無所敢專唯閫外之事則專制之雖制之在已然因師之力而能致者皆君所與而職當為也世儒有論魯祀周公以夫子禮樂以為周公能為人臣不能為之功則可用人臣不得用之禮樂是不知人臣之道也夫居周公之位則為周公之事由其位而能為者皆所當為也周公乃盡其職耳子道亦然唯孟子為知此義故曰事親若曽子者可也未嘗以曽子之孝為有餘也蓋子之身所能為者皆所當為也象曰在師中吉承天寵也王三錫命懷萬邦也在師中吉者以其承天之寵任也天謂王也人臣非君寵任之則安得專征之權而有成功之吉象以二專主其事故發此義與前所云世儒之見異矣王三錫以恩命褒其成功所以懷萬邦也六三師或輿尸凶三居下卦之上居位當任者也不唯其才陰柔不中正師旅之事任當專一二既以剛中之才為上信倚必專其事乃有成功若或更使衆人主之凶之道也輿尸衆主也蓋指三也以三居下之上故發此義軍旅之事任不專一覆敗必矣象曰師或輿尸大無功也倚付二三安能成功豈唯無功必以致凶也六四師左次無咎師之進以强勇也四以柔居陰非能進而克捷者也知不能進而退故左次左次退舍也量宜進退乃所當也故無咎見可而進知難而退師之常也唯取其退之得宜不論其才之能否也度不能進而完師以退愈於覆敗逺矣可進而退乃為咎也易之發此義以示後世其仁深矣象曰左次無咎未失常也行師之道因時施宜乃其常也故左次未必為失也如四退次乃得其宜是以無咎六五田有禽利執言無咎長子帥師弟子輿尸貞凶五君位興師之主也故言興師任將之道師之興必以蠻夷猾夏冦賊姦宄為生民之害不可懷來然後奉辭以誅之若禽獸入于田中侵害稼穡於義宜獵取則獵取之如此而動乃得無咎若輕動以毒天下其咎大矣執言奉辭也明其罪而討之也若秦皇漢武皆窮山林以索禽獸者也非田有禽也任將授師之道當以長子帥師二在下而為師之主長子也若以弟子衆主之則所為雖正亦凶也弟子凡非長者也自古任將不專而致覆敗者如晉荀林父邲之戰唐郭子儀相州之敗是也象曰長子帥師以中行也弟子輿尸使不當也長子謂二以中正之德合於上而受任以行若復使其餘者衆尸其事是任使之不當也其凶宜矣上六大君有命開國承家小人勿用上師之終也功之成也大君以爵命賞有功也開國封之為諸侯也承家以為卿大夫也承受也小人者雖有功不可用也故戒使勿用師旅之興成功非一道不必皆君子也故戒以小人有功不可用也賞之以金帛祿位可也不可使有國家而為政也小人平時易致驕盈况挾其功乎漢之英彭所以亡也聖人之深慮逺戒也此專言師終之義不取爻義蓋以其大者若以爻言則六以柔居順之極師既終而在無位之地善處而無咎者也象曰大君有命以正功也小人勿用必亂邦也大君持恩賞之柄以正軍旅之功師之終也雖賞其功小人則不可以有功而任用之用之必亂邦小人恃功而亂邦者古有之矣坤下坎上比序卦衆必有所比故受之以比比親輔也人之類必相親輔然後能安故既有衆則必有所比比所以次師也為卦上坎下坤以二體言之水在地上物之相切比無間莫如水之在地上故為比也又衆爻皆陰獨五以陽剛居君位衆所親附而上亦親下故為比也比吉原筮元永貞無咎比吉道也人相親比自為吉道故雜卦云比樂師憂人相親比必有其道苟非其道則有悔咎故必推原占決其可比者而比之筮謂占決卜度非謂以蓍龜也所比得元永貞則無咎元謂有君長之道永謂可以常久貞謂得正道上之比下必有此三者下之從上必求此三者則無咎也不寧方來後夫凶人之不能自保其安寧方且來求親比得所比則能保其安當其不寧之時固宜汲汲以求比若獨立自恃求比之志不速而後則雖夫亦凶矣夫猶凶况柔弱者乎夫剛立之稱傳曰子南夫也又曰是謂我非夫凡生天地之間者未有不相親比而能自存者也雖剛柔之至未有能獨立者也比之道由兩志相求兩志不相求則暌矣君懷撫其下下親輔於上親戚朋友鄉黨皆然故當上下合志以相從苟無相求之意則離而凶矣大抵人情相求則合相持則暌相持相待莫先也人之相親固有道然而欲比之志不可緩也彖曰比吉也比輔也下順從也比吉也比者吉之道也物相親比乃吉道也比輔也釋比之義比者相親輔也下順從也解卦所以為比也五以陽居尊位羣下順從以親輔之所以為比也原筮元永貞無咎以剛中也推原筮決相比之道得元永貞而後可以無咎所謂元永貞如五是也以陽剛居中正盡比道之善者也以陽剛當尊位為君德元也居中得正能永而貞也卦辭本泛言比道彖言元永貞者九五以剛處中正是也不寧方來上下應也人之生不能保其安寧方且來求附比民不能自保故戴君以求寧君不能獨立故保民以為安不寧而來比者上下相應也以聖人之公言之固至誠求天下之比以安民也以後王之私言之不求下民之附則危亡至矣故上下之志必相應也在卦言之上下羣陰比於五五比其衆乃上下應也後夫凶其道窮也衆必相比而後能遂其生天地之間未有不相親比而能遂者也若相從之志不疾而後則不能成比雖夫亦凶矣無所親比困屈以致凶窮之道也象曰地上有水比先王以建萬國親諸侯夫物相親比而無間者莫如水在地上所以為比也先王觀比之象以建萬國親諸侯建立萬國所以比民也親撫諸侯所以比天下也初六有孚比之無咎初六比之始也相比之道以誠信為本中心不信而親人人誰與之故比之始必有孚誠乃無咎也孚信之在中也有孚盈缶終來有他吉誠信充實於內若物之盈滿於缶中也缶質素之器言若缶之盈實其中外不加文飾則終能來有他吉也他非此也外也若誠實充於內物無不信豈用飾外以求比乎誠信中實雖他外皆當感而來從孚信比之本也象曰比之初六有他吉也言比之初六者比之道在乎始也始能有孚則終致有他之吉其始不誠終焉得吉上六之凶由無首也六二比之自內貞吉二與五為正應皆得中正以中正之道相比者也二處於內自內謂由己也擇才而用雖在乎上而以身許國必由於己已以得君道合而進乃得正而吉也以中正之道應上之求乃自內也不自失也汲汲以求比者非君子自重之道乃自失也象曰比之自內不自失也守己中正之道以待上之求乃不自失也易之為戒嚴密二雖中正質柔體順故有貞吉自失之戒戒之自守以待上之求無乃涉後凶乎曰士之修己乃求上之道降志辱身非自重之道也故伊尹武侯救天下之心非不切必待禮至然後出也六三比之匪人三不中正而所比皆不中正四陰柔而不中二存應而比初皆不中正匪人也比於匪人其失可知悔吝不假言也故可傷二之中正而謂之匪人隨時取義各不同也象曰比之匪人不亦傷乎人之相比求安吉也乃比於匪人必將反得悔吝其亦可傷矣深戒失所比也六四外比之貞吉四與初不相應而五比之外比於五乃得貞正而吉也君臣相比正也相比相與宜也五剛陽中正賢也居尊位在上也親賢從上比之正也故為貞吉以六居四亦為得正之義又陰柔不中之人能比於剛明中正之賢乃得正而吉也又比賢從上必以正道則吉也數說相須其義始備象曰外比於賢以從上也外比謂從五也五剛明中正之賢又居君位四比之是比賢且從上所以吉也九五顯比王用三驅失前禽邑人不誡吉五居君位處中得正盡比道之善者也人君比天下之道當顯明其比道而已如誠意以待物恕己以及人發政施仁使天下蒙其惠澤是人君親比天下之道也如是天下孰不親比於上若乃暴其小仁違道干譽欲以求下之比其道亦狹矣其能得天下之比乎故聖人以九五盡比道之正取三驅為喻曰王用三驅失前禽邑人不誡吉先王以四時之畋不可廢也故推其仁心為三驅之禮乃禮所謂天子不合圍也成湯祝網是其義也天子之畋圍合其三面前開一路使之可去不忍盡物好生之仁也只取其不用命者不出而反入者也禽獸前去者皆免矣故曰失前禽也王者顯明其比道天下自然來比來者撫之固不煦煦然求比於物若田之三驅禽之去者從而不追來者則取之也此王道之大所以其民皥皥而莫知為之者也邑人不誡吉言其至公不私無逺邇親疏之别也邑者居邑易中所言邑皆同王者所都諸侯國中也誡期約也待物之一不期誡於居邑如是則吉也聖人以大公無私治天下於顯比見之矣非惟人君比天下之道如此大率人之相比莫不然以臣於君言之竭其忠誠致其才力乃顯其比君之道也用之與否在君而已不可阿諛逢迎求其比己也在朋友亦然修身誠意以待之親己與否在人而已不可巧言令色曲從苟合以求人之比己也於鄉黨親戚於衆人莫不皆然三驅失前禽之義也象曰顯比之吉位正中也顯比所以吉者以其所居之位得正中也處正中之地乃由正中之道也比以不偏為善故云正中凡言正中者其處正得中也比與隨是也言中正者得中與正也訟與需是也舍逆取順失前禽也禮取不用命者乃是順取逆也順命而去者皆免矣矣比以向背而言謂去者為逆來者為順也故所失者前去之禽也言來者撫之去者不追也邑人不誡上使中也不期誡於親近上之使下中平不偏逺近如一也上六比之無首凶六居上比之終也首謂始也凡比之道其始善則其終善矣有其始而無其終者或有矣未有無其始而有終者也故比之無首至終則凶也此據比終而言然上六隂柔不中處險之極固非克終者也始比不以道隙於終者天下多矣象曰比之無首無所終也比既無首何所終乎相比有首猶或終違始不以道終復何保故曰無所終也乾下㢲上小畜序卦比必有所畜故受之以小畜物相比附則為聚聚畜也又相親比則志相畜小畜所以次比也畜止也止則聚矣為卦㢲上乾下乾在上之物乃居巽下夫畜止剛健莫如巽順為巽所畜故為畜也然㢲陰也其體柔順唯能以㢲順柔其剛健非能力止之也畜道之小者也又四以一陰得位為五陽所說得位得柔㢲之道也能畜羣陽之志是以為畜也小畜謂以小畜大所畜聚者小所畜之事小以陰故也彖專以六四畜諸陽為成卦之義不言二體蓋舉其重者小畜亨密雲不雨自我西郊雲陰陽之氣二氣交而和則相畜固而成雨陽倡而陰和順也故和若隂先陽倡不順也故不和不和則不能成雨雲之畜聚雖密而不成雨者自西郊故也東北陽方西南陰方自陰倡故不和而不能成雨以人觀之雲氣之興皆自四逺故云郊據四而言故云自我畜陽者四畜之主也彖曰小畜柔得位而上下應之曰小畜言成卦之義也以陰居四又處上位柔得位也上下五陽皆應之為所畜也以一陰而畜五陽能係而不能固是以為小畜也彖解成卦之義而加曰字者皆重卦名文勢當然單名卦惟革有曰字亦文勢然也健而㢲剛中而志行乃亨以卦才言也內健而外㢲健而能㢲也二五居中剛中也陽性上進下復乾體志在於行也剛居中為剛而得中又為中剛言畜陽則以柔㢲言能亨則由剛中以成卦之義言則為陰畜陽以卦才言則陽為剛中才如是故畜雖小而能亨也密雲不雨尚往也自我西郊施未行也畜道不能成大如密雲而不成雨陰陽交而和則相固而成雨二氣不和陽尚往而上故不成雨蓋自我陰方之氣先倡故不和而不能成雨其功施未行也小畜之不能成大猶西郊之雲不能成雨也象曰風行天上小畜君子以懿文德乾之剛健而為㢲所畜夫剛健之性惟柔順為能畜止之雖可以畜止之然非能固制其剛健也但柔順以擾係之耳故為小畜也君子觀小畜之義以懿美其文德畜聚為藴畜之義君子所藴畜者大則道德經綸之業小則文章才藝君子觀小畜之象以懿美其文德文德方之道義為小也初九復自道何其咎吉初九陽爻而乾體陽在上之物又剛健之才足以上進而復與在上同志其進復於上乃其道也故云復自道復既自道何過咎之有無咎而又有吉也諸爻言無咎者如是則無咎矣故云無咎者善補過也雖使爻義本善亦不害於不如是則有咎之義初九乃由其道而行無有過咎故云何其咎無咎之甚明也象曰復自道其義吉也陽剛之才由其道而復其義吉也初與四為正應在畜時乃相畜者也九二牽復吉二以陽居下體之中五以陽居上體之中皆以陽剛居中為陰所畜俱欲上復五雖在四上而為其所畜則同是同志者也夫同患相憂二五同志故相牽連而復二陽並進則隂不能勝得遂其復矣故吉也曰遂其復則離畜矣乎曰凡爻之辭皆謂如是則可以如是若已然則時已變矣尚何教誡乎五為㢲體㢲畜於乾而反與二相牽何也曰舉二體而言則㢲畜乎乾全卦而言則一陰畜五陽也在易隨時取義皆如此也象曰牽復在中亦不自失也二居中得正者也剛柔進退不失乎中道也陽之復其勢必强二以處中故雖强於進亦不至於過剛過剛乃自失也爻止言牽復而吉之義象復發明其在中之美九三輿說輻夫妻反目三以陽爻居不得中而密比於四隂陽之情相求也又昵比而不中為陰畜制者也故不能前進猶車輿說去輪輻言不能行也夫妻反目陰制於陽者也今反制陽如夫妻之反目也反目謂怒目相視不順其夫而反制之也婦人為夫寵惑既而遂反制其夫未有夫不失道而妻能制之者也故說輻反目三自為也象曰夫妻反目不能正室也夫妻反目蓋由不能正其室家也三自處不以道故四得制之不使進猶夫不能正其室家故致反目也六四有孚血去惕出無咎四於畜時處近君之位畜君者也若內有孚誠則五志信之從其畜也卦獨一陰畜衆陽者也諸陽之志係乎四四苟欲以力畜之則一柔敵衆剛必見傷害唯盡其孚誠以應之則可以感之矣故其傷害逺其危懼免也如此則可以無咎不然則不免乎害矣此以柔畜剛之道也以人君之威嚴而微細之臣有能畜止其欲者蓋有孚信以感之也象曰有孚惕出上合志也四既有孚則五信任之與之合志所以得惕出而無咎也惕出則血去可知舉其輕者也五既合志衆陽皆從之矣九五有孚攣如富以其鄰小畜衆陽為陰所畜之時也五以中正居尊位而有孚信則其類皆應之矣故曰攣如謂牽連相從也五必援挽與之相濟是富以其鄰也五以居尊位之勢如富者推其財力與鄰比共之也君子為小人所困正人為羣邪所厄則在下者必攀挽於上期於同進在上者必援引於下與之戮力非獨推己力以及人也固資在下之助以成其力耳象曰有孚攣如不獨富也有孚攣如蓋其鄰類皆牽攣而從之與衆同欲不獨有其富也君子之處難厄唯其至誠故得衆力之助而能濟其衆也上九既雨既處尚德載婦貞厲九以㢲順之極居卦之上處畜之終從畜而止者也為四所止也既雨和也既處止也陰之畜陽不和則不能止既和而止畜之道成矣大畜畜之大故極而散小畜畜之小故極而成尚德載四用柔㢲之德積滿而至於成也陰柔之畜剛非一朝一夕能成由積纍而至可不戒乎載積滿也詩云厥聲載路婦貞厲婦謂隂以陰而畜陽以柔而制剛婦若貞固守此危厲之道也安有婦制其夫臣制其君而能安者乎月幾望君子征凶月望則與日敵矣幾望言其盛將敵也陰已能畜陽而云幾望何也此以柔㢲畜其志也非力能制也然不已則將盛於陽而凶矣於幾望而為之戒曰婦將敵矣君子動則凶也君子謂陽征動也幾望將盈之時若已望則陽已消矣尚何戒乎象曰既雨既處德積載也君子征凶有所疑也既雨既處言畜道積滿而成也陰將盛極君子動則有凶也隂敵陽則必消陽小人抗君子則必害君子安得不疑慮乎若前知疑慮而警懼求所以制之則不至於凶矣兌下乾上履序卦物畜然後有禮故受之以履夫物之聚則有大小之别髙下之等美惡之分是物畜然後有禮履所以繼畜也履禮也禮人之所履也為卦天上澤下天而在上澤而處下上下之分尊卑之義理之當也禮之本也常履之道也故為履履踐也藉也履物為踐履於物為藉以柔藉剛故為履也不曰剛履柔而曰柔履剛者剛乘柔常理不足道故易中唯言柔乘剛不言剛乘柔也言履藉於剛乃見卑順說應之義履虎尾不嘻人亨履人所履之道也天在上而澤處下以柔履藉於剛上下各得其義事之至順理之至當也人之履行如此雖履至危之地亦無所害故履虎尾而不見嘻嚙所以能亨也彖曰履柔履剛也說而應乎乾是以履虎尾不嘻人亨兌以陰柔履藉乾之陽剛柔履剛也兌以說順應乎乾剛而履藉之下順乎上陰承乎陽天下之至理也所履如此至順至當雖履虎尾亦不見傷害以此履行其亨可知剛中正履帝位而不疚光明也九五以陽光中正尊履帝位苟無疚病得履道之至善光明者也疚謂疵病夬履是也光明德盛而輝光也象曰上天下澤履君子以辨上下定民志天在上澤居下上下之正理也人之所履當如是故取其象而為履君子觀履之象以辨别上下之分以定其民志夫上下之分明然後民志有定民志定然後可以言治民志不定天下不可得而治也古之時公卿大夫而下位各稱其德終身居之得其分也位未稱德則君舉而進之士修其學學至而君求之皆非有預於己也農工商賈勤其事而所亨有限故皆有定志而天下之心可一後世自庶士至于公卿日志于尊榮農工商賈日志于富侈億兆之心交騖於利天下紛然如之何其可一也欲其不亂難矣此由上下無定志也君子觀履之象而分辨上下使各當其分以定民之心志也初九素履往無咎履不處者行之義初處至下素在下者也而陽剛之才可以上進若安其卑下之素而往則無咎矣夫人不能自安於貧賤之素則其進也乃貪躁而動求去乎貧賤耳非欲有為也既得其進驕溢必矣故往則有咎賢者則安履其素其處也樂其進也將有為也故得其進則有為而無不善乃守其素履者也象曰素履之往獨行願也安履其素而往者非苟利也獨行其志願耳獨専也若欲貴之心與行道之心交戰于中豈能安履其素也九二履道坦坦幽人貞吉九二居柔寬裕得中其所履坦坦然平易之道也雖所履得坦易之道亦必幽靜安恬之人處之則能貞固而吉也九二陽志上進故有幽人之戒象曰幽人貞吉中不自亂也履道在於安靜其中恬正則所履安裕中若躁動豈能安其所履故必幽人則能堅固而吉蓋其中心安靜不以利欲自亂也六三眇能視跛能履履虎尾嘻人凶武人為于大君三以陰居陽志欲剛而體本陰柔安能堅其所履故如盲眇之視其見不明跛躄之履其行不逺才既不足而又處不得中履非其正以柔而務剛其履如此是履於危地故曰履虎尾以不善履履危地必及禍患故曰嘻人凶武人為于大君如武暴之人而居人上肆其躁率而已非能順履而逺到也不中正而志剛乃為羣陽所與是以剛躁蹈危而得凶也象曰眇能視不足以有明也跛能履不足以與行也陰柔之人其才不足視不能明行不能逺而乃務剛所履如此其能免於害乎嘻人之凶位不當也武人為于大君志剛也以柔居三履非其正所以致禍害被嘻而凶也以武人為喻者以其處陽才弱而志剛也志剛則妄動所履不由其道如武人而為大君也九四履虎尾訴訴終吉九四陽剛而乾體雖居四剛勝者也在近君多懼之地無相得之義五復剛决之過故為履虎尾訴訴長懼之貌若能畏懼則當終吉蓋九雖剛而志柔四雖近而不處故能兢慎畏懼則終免於危而獲吉也象曰訴訴終吉志行也能訴訴畏懼則終得其吉者志在於行而不處也去危則獲吉矣陽剛能行者也居柔以順自處者也九五夬履貞厲夬剛決也五以陽剛乾體居至尊之位任其剛決而行者也如此則雖得正猶危厲也古之聖人居天下之尊明足以照剛足以決勢足以専然而未嘗不盡天下之議雖芻蕘之微必取乃其所以為聖也履帝位而光明者也若自任剛明決行不顧雖使得正亦危道也可固守乎有剛明之才苟專自任猶為危道况剛明不足者乎易中云貞厲義各不同隨卦可見象曰夬履貞厲位正當也戒夬履者以其正當尊位也居至尊之位據能專之勢而自任剛決不復畏懼雖使得正亦危道也上九視履考祥其旋元吉上處履之終於其終視其所履行以考其善惡禍福若其旋則善且吉也旋謂周旋完備無不至也人之所履考視其終若終始周完無疚善之至也是以元吉人之吉凶係其所履善惡之多寡吉凶之小大也象曰元吉在上大有慶也上履之終也人之所履善而吉至其終周旋無虧乃大有福慶之人也人之行貴乎有終乾下坤上泰序卦履而泰然後安故受之以泰履得其所則舒泰泰則安矣泰所以次履也為卦坤陰在上乾陽居下天地隂陽之氣相交而和則萬物生成故為通泰泰小往大來吉亨小謂隂大謂陽往往之於外也來來居於內也陽氣下降隂氣上交也隂陽和暢則萬物生遂天地之泰也以人事言之大則君上小則臣下君推誠以任下臣盡誠以事君上下之志通朝廷之泰也陽為君子陰為小人君子來處於內小人往處於外是君子得位小人在下天下之泰也泰之道吉而且亨也不云元吉元亨者時有汚隆治有小大雖泰豈一槩哉言吉亨則可包矣彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也小往大來陰往而陽來也則是天地陰陽之氣相交而萬物得遂其通泰也在人則上下之情交通而其志意同也內陽而外陰內健而外順內君子而外小人君子道長小人道消也陽來居內陰往居外陽進而陰退也乾健在內坤順在外為內健而外順君子之道也君子在內小人在外是君子道長小人道消所以為泰也既取隂陽交和又取君子道長隂陽交和乃君子之道長也象曰天地交泰后以財成天地之道輔相天地之宜以左右民天地交而隂陽和則萬物茂遂所以泰也人君當體天地通泰之象而以財成天地之道輔相天地之宜以左右生民也財成謂體天地交泰之道而財制成其施為之方也輔相天地之宜天地通泰則萬物茂遂人君體之而為法制使民用天時因地利輔助化育之功成其豐美之利也如春氣發生萬物則為播植之法秋氣成實萬物則為收斂之法乃輔相天地之宜以左右輔助於民也民之生必賴君上為之法制以教率輔翼之乃得遂其生養是左右之也初九拔茅茹以其彚征吉初以陽爻居下是有剛明之才而在下者也時之否則君子退而窮處時既泰則志在上進也君子之進必與其朋類相牽援如茅之根然拔其一則牽連而起矣茹根之相牽連者故以為象彚類也賢者以其類進同志以行其道是以吉也君子之進必以其類不唯志在相先樂於與善實乃相賴以濟故君子小人未有能獨立不賴朋類之助者也自古君子得位則天下之賢萃於朝廷同志協力以成天下之泰小人在位則不肖者並進然後其黨勝而天下否矣蓋各從其類也象曰拔茅征吉志在外也時將泰則羣賢皆欲上進三陽之志欲進同也故取茅茹彚征之象志在外上進也九二包荒用馮河不遐遺朋亡得尚于中行二以陽剛得中上應於五五以柔順得中下應於二君臣同德是以剛中之才為上所專任故二雖居臣位主治泰者也所謂上下交而其志同也故治泰之道主二而言包荒用馮河不遐遺朋亡四者處泰之道也人情安肆則政舒緩而法度廢弛庶事無節治之之道必有包含荒穢之量則其施為寬裕詳密弊革事理而人安之若無含𢎞之度有忿疾之心則無深逺之慮有暴擾之患深弊未去而近患已生矣故在包荒也用馮河泰寧之世人情習於久安安於守常惰於因循憚於更變非有馮河之勇不能有為於斯時也馮河謂其剛果足以濟深越險也自古泰治之世必漸至於衰替蓋由狃習安逸因循而然自非剛斷之君英烈之輔不能挺特奮發以革其弊也故曰用馮河或疑上云包荒則是包含寬容此云用馮河則是奮發改革似相反也不知以含容之量施剛果之用乃聖賢之為也不遐遺泰寧之時人心狃於泰則苟安逸而已惡能復深思逺慮及於遐逺之事哉治夫泰者當周及庶事雖遐逺不可遺若事之微隱賢才之在僻陋皆遐逺者也時泰則固遺之矣朋亡夫時之既泰則人習於安其情肆而失節將約而正之非絶去其朋與之私則不能也故云朋亡自古立法制事牽於人情卒不能行者多矣若夫禁奢侈則害於近戚限田産則妨於貴家如此之類既不能斷以大公而必行則是牽於朋比也治泰不能朋亡則為之難矣治泰之道有此四者則能合於九二之德故曰得尚于中行言能配合中行之義也尚配也象曰包荒得尚于中行以光大也象舉包荒一句而通解四者之義言如此則能配合中行之德而其道光明顯大也九三無平不陂無往不復艱貞無咎勿恤其孚于食有福三居泰之中在諸陽之上泰之盛也物理如循環在下者必升居上者必降泰久而必否故於泰之盛與陽之將進而為之戒曰無常安平而不險陂者謂無常泰也無常往而不返者謂陰當復也平者陂往者復則為否矣當知天理之必然方泰之時不敢安逸常艱危其思慮正固其施為如是則可以無咎處泰之道既能艱貞則可常保其泰不勞憂恤得其所求也不失所期為孚如是則於其祿食有福益也祿食謂福祉善處泰者其福可長也蓋德善日積則福祿日臻德踰於祿則雖盛而非滿自古隆盛未有不失道而喪敗者也象曰無往不復天地際也無往不復言天地之交際也陽降于下必復于上陰升于上必復于下屈伸往來之常理也因天地交際之道明否泰不常之理以為戒也六四翩翩不富以其鄰不戒以孚六四處泰之過中以陰在上志在下復上二陰亦志在趨下翩翩疾飛之貌四翩翩就下與其鄰同也鄰其類也謂五與上夫人富而其類從者為利也不富而從者其志同也三隂皆在下之物居上乃失其實其志皆欲下行故不富而相從不待戒告而誠意相合也夫陰陽之升降乃時運之否泰或交或散理之常也泰既過中則將變矣聖人於三尚云艱貞則有福蓋三為將中知戒則可保四已過中矣理必變也故專言始終反復之道五泰之主則復言處泰之義象曰翩翩不富皆失實也不戒以孚中心願也翩翩下往之疾不待富而鄰從者以三陰在上皆失其實故也陰本在下之物今乃居上是失實也不待告戒而誠意相與者蓋其中心所願故也理當然者天也衆所同者時也六五帝乙歸妹以祉元吉史謂湯為天乙厥後有帝祖乙亦賢王也後又有帝乙多士曰自成湯至于帝乙罔不明德恤祀稱帝乙者未知誰是以爻義觀之帝乙制王姬下嫁之禮法者也自古帝女雖皆下嫁至帝乙然後制為禮法使降其尊貴以順從其夫也六五以陰柔居君位下應於九二剛明之賢五能倚任其賢臣而順從之如帝乙之歸妹然降其尊而順從於陽則以之受祉且元吉也元吉大吉而盡善者也謂成治泰之功也象曰以祉元吉中以行願也所以能獲祉福且元吉者由其以中道合而行其志願也有中德所以能任剛中之賢所聽從者皆其志願也非其所欲能從之乎上六城復于隍勿用師自邑告命貞吝掘隍土積纍以成城如治道積纍以成泰及泰之終將反於否如城土頽圮復反于隍也上泰之終六以小人處之行將否矣勿用師君之所以能用其衆者上下之情通而心從也今泰之將終失泰之道上下之情不通矣民心離散不從其上豈可用也用之則亂衆既不可用方自其親近而告命之雖使所告命者得其正亦可羞吝邑所居謂親近大率告命必自近始凡貞凶貞吝有二義有貞固守此則凶吝者有雖得正亦凶吝者此不云貞凶而云貞吝者將否而方告命為可羞吝否不由於告命也象曰城復于隍其命亂也城復于隍矣雖其命之亂不可止也坤下乾上否序卦泰者通也物不可以終通故受之以否夫物理往來通泰之極則必否否所以次泰也為卦天上地下天地相交陰陽和暢則為泰天處上地處下是天地隔絶不相交通所以為否也否之匪人天地交而萬物生於中然後三才備人為最靈故為萬物之首凡生天地之中者皆人道也天地不交則不生萬物是無人道故曰匪人謂非人道也消長闔闢相因而不息泰極則復否終則傾無常而不變之理人道豈能無也既否則泰矣不利君子貞大往小來夫上下交通剛柔和合君子之道也否則反是故不利君子貞君子正道否塞不行也大往小來陽往而隂來也小人道長君子道消之象故為否也彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內陰而外陽內柔而外剛內小人而外君子小人道長君子道消也夫天地之氣不交則萬物無生成之理上下之義不交則天下無邦國之道建邦國所以為治也上施政以治民民戴君而從命上下相交所以治安也今上下不交是天下無邦國之道也陰柔在內陽剛在外君子往居於外小人來處於內小人道長君子道消之時也象曰天地不交否君子以儉德辟難不可榮以祿天地不相交通故為否否塞之時君子道消當觀否塞之象而以儉損其德避免禍難不可榮居祿位也否者小人得志之時君子居顯榮之地禍患必及其身故宜晦處窮約也初六拔茅茹以其彚貞吉亨泰與否皆取茅為象者以羣陽羣陰同在下有牽連之象也泰之時則以同征為吉否之時則以同貞為亨始以內小人外君子為否之義復以初六否而在下為君子之道易隨時取義變動無常否之時在下者君子也否之三陰上皆有應在否隔之時隔絶不相通故無應義初六能與其類貞固其節則處否之吉而其道之亨也當否而能進者小人也君子則伸道免禍而已君子進退未嘗不與其類同也象曰拔茅貞吉志在君也爻以六自守於下明君子處下之道象復推明以象君子之心君子固守其節以處下者非樂於不進獨善也以其道方否不可進故安之耳心固未嘗不在天下也其志常在得君而進以康濟天下故曰志在君也六二包承小人吉大人否亨六二其質則陰柔其居則中正以陰柔小人而言則方否於下志所包畜者在承順乎上以求濟其否為身之利小人之吉也大人當否則以道自處豈肯枉已屈道承順於上唯自守其否而已身之否乃其道之亨也或曰上下不交何所承乎曰正則否矣小人順上之心未嘗無也象曰大人否亨不亂羣也大人於否之時守其正節不雜亂於小人之羣類身雖否而道之亨也故曰否亨不以道而身亨乃道之否也不云君子而云大人能如是則其道大矣六三包羞三以陰柔不中不正而居否又切近於上非能守道安命窮斯濫矣極小人之情狀者也其所包畜謀慮邪濫無所不至可羞耻也象曰包羞位不當也陰柔居否而不中不正所為可羞者處不當故也處不當位所為不以道也九四有命無咎疇離祉四以陽剛健體居近君之位是以濟否之才而得髙位者也足以輔上濟否然當君道方否之時處逼近之地所惡在居功取忌而已若能使動必出於君命威柄一歸於上則無咎而其志行矣能使事皆出於君命則可以濟時之否其疇類皆附離其福祉離麗也君子道行則與其類同進以濟天下之否疇離祉也小人之進亦以其類同也象曰有命無咎志行也有君命則得無咎乃可以濟否其志得行也九五休否大人吉其亡其亡繫于苞桑五以陽剛中正之德居尊位故能休息天下之否大人之吉也大人當位能以其道休息天下之否以馴致於泰猶未離於否也故有其亡之戒否既休息漸將反泰不可便為安肆當深慮逺戒常虞否之復來曰其亡矣其亡矣其繫于苞桑謂為安固之道如維繫于苞桑也桑之為物其根深固苞謂叢生者其固尤甚聖人之戒深矣漢王允唐李德裕不知此戒所以致禍敗也繫辭曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也象曰大人之吉位正當也有大人之德而得至尊之正位故能休天下之否是以吉也無其位則雖有其道將何為乎故聖人之位謂之大寶上九傾否先否後喜上九否之終也物理極而必反故泰極則否否極則泰上九否既極矣故否道傾覆而變也先極否也後傾喜也否傾則泰矣後喜也象曰否終則傾何可長也否終則必傾豈有長否之理極而必反理之常也然反危為安易亂為治必有剛陽之才而後能也故否之上九則能傾否屯之上六則不能變屯也離下乾上同人序卦物不可以終否故受之以同人夫天地不交則為否上下相同則為同人與否義相反故相次又世之方否必與人同力乃能濟同人所以次否也為卦乾上離下以二象言之天在上者也火之性炎上與天同也故為同人以二體言之五居正位為乾之主二為離之主二爻以中正相應上下相同同人之義也又卦唯一陰衆陽所欲同亦同人之義也他卦固有一陰者在同人之時而二五相應天火相同故其義大同人于野亨利涉大川利君子貞野謂曠野取逺與外之義夫同人者以天下大同之道則聖賢大公之心也常人之同者以其私意所合乃昵比之情耳故必于野謂不以昵近情之所私而于郊野曠逺之地既不繫所私乃至公大同之道無逺不同也其亨可知能與天下大同是天下皆同之也天下皆同何險阻之不可濟何艱危之不可亨故利涉大川利君子貞上言于野止謂不在昵比此復言宜以君子正道君子之貞謂天下至公大同之道故雖居千里之逺生千歲之後若合符節推而行之四海之廣兆民之衆莫不同小人則唯用其私意所比者雖非亦同所惡者雖是亦異故其所同者則為阿黨蓋其心不正也故同人之道利在君子之貞正彖曰同人柔得位得中而應乎乾曰同人言成卦之義柔得位謂二以陰居陰得其正位也五中正而二以中正應之得中而應乎乾也五剛健中正而二以柔順中正應之各得其正其德同也故為同人五乾之主故云應乎乾象取天火之象而彖專以二言同人曰此三字羡文同人于野亨利涉大川乾行也至誠無私可以蹈險難者乾之行也無私天德也文明以健中正而應君子正也又以二體言其義有文明之德而剛健以中正之道相應乃君子之正道也唯君子能能通天下之志天下之志萬殊理則一也君子明理故能通天下之志聖人視億兆之心猶一心者通於理而已文明則能燭理故能明大同之義剛健則能克已故能盡大同之道然後能中正合乎乾行也象曰天與火同人君子以類族辨物不云火在天下天下有火而云天與火者天在上火性炎上火與天同故為同人之義君子觀同人之象而以類族辨物各以其類族辨物之同異也若君子小人之黨善惡是非之理物情之離合事理之異同凡異同者君子能辨明之故處物不失其方也初九同人于門無咎九居同人之初而無繫應是無偏私同人之公者也故為出門同人出門謂在外在外則無私昵之偏其同博而公如此則無過咎也象曰出門同人又誰咎也出門同人于外是其所同者廣無所偏私人之同也有厚薄親疏之異過咎所由生也既無所偏黨誰其咎之六二同人于宗吝二與五為正應故曰同人于宗宗謂宗黨也同於所繫應是有所偏與在同人之道為私狹矣故可吝二若陽爻則為剛中之德乃以中道相同不為私也象曰同人于宗吝道也諸卦以中正相應為善而在同人則為可吝故五不取君義蓋私比非人君之道相同以私為可吝也九三伏戎于莽升其髙陵三歲不興三以陽居剛而不得中是剛暴之人也在同人之時志在於同卦惟一陰諸陽之志皆欲同之三又與之比然二以中正之道與五相應三以剛强居二五之間欲奪而同之然理不直義不勝故不敢顯發伏藏兵戎于林莽之中懷惡而內負不直故又畏懼時升髙陵以顧望如此至於三歲之久終不敢興此爻深見小人之情狀然不曰凶者既不敢發故未至凶也象曰伏戎于莽敵剛也三歲不興安行也所敵者五既剛且正其可奪乎故畏憚伏藏也至于三歲不興矣終安能行乎九四乘其墉弗克攻吉四剛而不中正其志欲同二亦與五為仇者也墉垣所以限隔也四切近于五如隔墉且乘其墉欲攻之之義不直而不克也苟能自知義之不直而不攻則為吉也若肆其邪欲不能反思義理妄行攻奪則其凶大矣三以剛居剛故終其强而不能反四以剛居柔故有困而能反之義能反則吉矣畏義而能改其吉宜矣象曰乘其墉義弗克也其吉則困而反則也所以乘其墉而弗克攻之者以其義之弗克也以邪攻正義不勝也其所以得吉者由其義不勝困窮而反於法則也二者衆陽所同欲也獨三四有爭奪之義者二爻居二五之間也初終逺故取義别九五同人先號咷而後笑大師克相遇九五同于二而為三四二陽所隔五自以義直理勝故不勝憤抑至于號咷然邪不勝正雖為所隔終必得合故後笑也大師克相遇五與二正應而二陽非理隔奪必用大師克勝之乃得相遇也云大師云克者見二陽之强也九五君位而爻不取人君同人之義者蓋五專以私昵應於二而失其中正之德人君當與天下大同而獨私一人非君道也又先隔則號咷後遇則笑是私昵之情非大同之體也二之在下尚以同於宗為吝况人君乎五既於君道無取故更不言君道而明二人同心不可間隔之義繫辭云君子之道或出或處或默或語二人同心其利斷金中誠相同出處語默無不同天下莫能間也同者一也一不可分分乃二也一可以通金石冒水火無所不能入故云其利斷金其理至微故聖人贊之曰同心之言其臭如蘭謂其言意味深長也象曰同人之先以中直也大師相遇言相克也先所以號咷者以中誠理直故不勝其忿切而然也雖其敵剛强至用大師然義直理勝終能克之故言能相克也相克謂能勝見二陽之强也上九同人于郊無悔郊在外而逺之地求同者必相親相與上九居外而無應終無與同者也始有同則至終或有暌悔處逺而無與故雖無同亦無悔雖欲同之志不遂而其終無所悔也象曰同人于郊志未得也居逺莫同故終無所悔然而在同人之道求同之志不得遂雖無悔非善處也乾下離上大有序卦與人同者物必歸焉故受之以大有夫與人同者物之所歸也大有所以次同人也為卦火在天上火之處髙其明及逺萬物之衆無不照見為大有之象又一柔居尊衆陽並應居尊執柔物之所歸也上下應之為大有之義大有盛大豐有也大有元亨卦之才可以元亨也凡卦德有卦名自有其義者如比吉謙亨是也有因其卦義便為訓戒者如師貞丈人吉同人于野亨是也有以其卦才而言者大有元亨是也由剛健文明應天時行故能元亨也彖曰大有柔得尊位大中而上下應之曰大有言卦之所以為大有也五以陰居君位柔得尊位也處中得大中之道也為諸陽所宗上下應之也夫居尊執柔固衆之所歸也而又有虛中文明大中之德故上下同志應之所以為大有也其德剛健而文明應乎天而時行是以元亨卦之德內剛健而外文明六五之君應於乾之九二五之性柔順而明能順應乎二二乾之主也是應乎乾也順應乾行順乎天時也故曰應乎天而時行其德如此是以元亨也王弼云不大通何由得大有乎大有則必元亨矣此不識卦義離乾成大有之義非大有之義便有元亨由其才故得元亨大有而不善者與不能亨者有矣諸卦具元亨利貞則彖皆釋為大亨恐疑與乾坤同也不兼利貞則釋為元亨盡元義也元有大善之義有元亨者四卦大有蠱升鼎也唯升之彖誤隨他卦作大亨曰諸卦之元與乾不同何也曰元之在乾為元始之義為首出庶物之義他卦則不能有此義為善為大而已曰元之為大可矣為善何也曰元者物之先也物之先豈有不善者乎事成而後有敗敗非先成者也興而後有衰衰固後於興也得而後有失非得則何以有失也至於善惡治亂是非天下之事莫不皆然必善為先故文言曰元者善之長也象曰火在天上大有君子以遏惡揚善順天休命火髙在天上照見萬物之衆多故為大有大有繁庶之義君子觀大有之象以遏絶衆惡揚明善類以奉順天休美之命萬物衆多則有善惡之殊君子亨大有之盛當代天工治養庶類治衆之道在遏惡揚善而已惡懲善勸所以順天命而安羣生也初九無交害匪咎艱則無咎九居大有之初未至於盛處卑無應與未有驕盈之失故無交害未涉於害也大凡富有鮮不有害以子貢之賢未能盡免况其下者乎匪咎艱則無咎言富有本匪有咎也人因富有自為咎耳若能享富有而知難處則自無咎也處富有而不能思艱兢畏則驕侈之心生矣所以有咎也象曰大有初九無交害也在大有之初克念艱難則驕溢之心無由生矣所以不交涉於害也九二大車以載有攸往無咎九以陽剛居二為六五之君所倚任剛健則才勝居柔則謙順得中則無過其才如此所以能勝大有之任如大車之材强壯能勝載重物也可以任重行逺故有攸往而無咎也大有豐盛之時有而未極故以二之才可往而無咎至於盛極則不可以往矣象曰大車以載積中不敗也壯大之車重積載於其中而不損敗猶九二材力之强能勝大有之任也九三公用亨于天子小人弗克三居下體之上在下而居人上諸侯人君之象也公侯上承天子天子居天下之尊率土之濱莫非王臣在下者何敢専其有凡土地之富人民之衆皆王者之有也此理之正也故三當大有之時居諸侯之位有其富盛必用享通乎天子謂以其有為天子之有也乃人臣之常義也若小人處之則専其富有以為私不知公以奉上之道故曰小人弗克也象曰公用亨于天子小人害也公當用亨于天子若小人處之則為害也自古諸侯能守臣節忠順奉上者則蕃養其衆以為王之屏翰豐殖其財以待上之徵賦若小人處之則不知為臣奉上之道以其為己之私民衆財豐則反擅其富强益為不順是小人大有則為害又大有為小人之害也九四匪其彭無咎九四居大有之時已過中矣是大有之盛者也過盛則凶咎所由生也故處之之道匪其彭則得無咎謂能謙損不處其太盛則得無咎也四近君之髙位苟處太盛則致凶咎彭盛多之貌詩載驅云汶水湯湯行人彭彭行人盛多之狀雅大明云駟騵彭彭言武王戎馬之盛也象曰匪其彭無咎明辨晳也能不處其盛而得無咎者蓋有明辨之智也晳明智也賢智之人明辨物理當其方盛則知咎之將至故能損抑不敢至於滿極也六五厥孚交如威如吉六五當大有之時居君位虛中為孚信之象人君執柔守中而以孚信接於下則下亦盡其信誠以事於上上下孚信相交也以柔居尊位當大有之時人心安易若専尚柔順則陵慢生矣故必威如則吉威如有威嚴之謂也既以柔和孚信接於下衆志說從又有威嚴使之有畏善處有者也吉可知矣象曰厥孚交如信以發志也威如之吉易而無備也下之志從乎上者也上以孚信接於下則下亦以誠信事其上故厥孚交如由上有孚信以發其下孚信之志下之從上猶響之應聲也威如之所以吉者謂若無威嚴則下易慢而無戒備也謂無恭畏備上之道備謂備上之求責也上九自天祐之吉無不利上九在卦之終居無位之地是大有之極而不居其有者也處離之上明之極也唯至明所以不居其有不至於過極也有極而不處則無盈滿之災能順乎理者也五之孚信而履其上為蹈履誠信之義五有文明之德上能降志以應之為尚賢崇善之義其處如此合道之至也自當享其福慶自天祐之行順乎天而獲天祐故所往皆吉無所不利也象曰大有上吉自天祐也大有之上有極當變由其所為順天合道故天祐助之所以吉也君子滿而不溢乃天祐也繫辭復申之云天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也履信謂履五五虛中信也思順謂謙退不居尚賢謂志從於五大有之世不可以盈豐而復處盈焉非所宜也六爻之中皆樂據權位唯初上不處其位故初九無咎上九無不利上九在上履信思順故在上而得吉蓋自天祐也伊川易傳卷一
