body:
  text: 御製題宋版周易程傳卜筮書違秦火殃大程平正傳言常言易者率入于竒朱子矯之以為特言卜筮故每爻必言占者得之亦未免過正蓋易理無不包實不竒子以程傳為得之周張朱介三賢卓凶悔吝中一吉當開物無為自成務抑隂有道在扶陽幽明通以性命順槩括程傳叙語內聖由來貫外王欽定四庫全書經部一伊川易傳易類提要臣等謹案伊川易傳四卷宋程子撰程子事蹟具宋史道學傳卷首有元符二年自序考程子以紹聖四年編管涪州元符三年遷峽州則當成於編管涪州之後王稱東都事略載是書作六卷宋史藝文志作九卷二程全書通作四卷考楊時跋語稱伊川先生著易傳未及成書將啓手足以其書授門人張繹未幾繹卒故其書散亡學者所傳無善本謝顯道得其書於京師以示余錯亂重復幾不可讀東歸待次毗陵乃始校正去其重復踰年而始完云云則當時本無定本故所傳各異耳其書但解上下經及彖象文言用王弼注本以序卦分置諸卦之首用李鼎祚周易集解例惟繫辭傳說卦傳雜卦傳無注董真卿謂亦從王弼今考程子與金堂謝湜書謂易當先讀王弼胡瑗王安石三家謂程子有取於弼不為無據謂不注繫辭說卦雜卦以擬王弼則似未盡然當以楊時草具未成之說為是也程子不信邵子之數故邵子以數言易而程子此傳則言理一闡天道一切人事蓋古人著書務抒所見不妨各明一義守門户之見者必堅護師說尺寸不容踰越亦異乎先儒之本㫖矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀伊川易傳序易變易也隨時變易以從道也其為書也廣大悉備將以順性命之理通幽明之故盡事物之情而示開物成務之道也聖人之憂患後世可謂至矣去古雖逺遺經尚存然而前儒失意以傳言後學誦言而忘味自秦而下蓋無傳矣豫生千載之後悼斯文之湮晦將俾後人沿流而求源此傳所以作也易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占吉凶消長之理進退存亡之道備於辭推辭考卦可以知變象與占在其中矣君子居則觀其象而玩其辭動則觀其變而玩其占得於辭不達其意者有矣未有不得於辭而能通其意者也至微者理也至著者象也體用一源顯微無間觀會通以行其典禮則辭無所不備故善學者求言必自近易於近者非知言者也豫所傳者辭也由辭以得其意則在乎人焉有宋元符二年己卯正月庚申河南程頤正叔序
