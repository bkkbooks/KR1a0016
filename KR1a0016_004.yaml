body:
  text: 伊川易傳卷四宋程子撰周易下經坎下兌上困序卦升而不已必困故受之以困升者自下而上自下升上以力進也不已必困矣故升之後受之以困也困者憊乏之義為卦兌上而坎下水居澤上則澤中有水也乃在澤下枯涸無水之象為困乏之義又兌以隂在上坎以陽居下與上六在二陽之上而九二陷於二隂之中皆隂柔掩於陽剛所以為困也君子為小人所掩蔽窮困之時也困亨貞大人吉無咎有言不信如卦之才則困而能亨且得貞正乃大人處困之道也故能吉而無咎大人處困不唯其道自吉樂天安命乃不失其吉也况隨時善處復有裕乎有言不信當困而言人誰信之彖曰困剛掩也卦所以為困以剛為柔所掩蔽也陷於下而掩於上所以困也陷亦掩也剛陽君子而為隂柔小人所掩蔽君子之道困窒之時也險以說困而不失其所亨其唯君子乎以卦才言處困之道也下險而上說為處險而能說雖在困窮艱險之中樂天安義自得其說樂也時雖困也處不失義則其道自亨困而不失其所亨也能如是者其唯君子乎若時當困而反亨身雖亨乃其道之困也君子大人道稱貞大人吉以剛中也困而能貞大人所以吉也蓋其以剛中之道也五與二是也非剛中則遇困而失其正矣有言不信尚口乃窮也當困而言人所不信欲以口免困乃所以致窮也以以說處困故有尚口之戒象曰澤無水困君子以致命遂志澤無水困乏之象也君子當困窮之時既盡其防慮之道而不得免則命也當推致其命以遂其志知命之當然也則窮塞禍患不以動其心行吾義而已苟不知命則恐懼於險難隕穫於窮厄所守亡矣安能遂其為善之志乎初六臀困于株木入于幽谷三歲不覿六以隂柔處於至卑又居坎險之下在困不能自濟者也必得在上剛明之人為援助則可以濟其困矣初與四為正應几四以陽而居隂為不正失剛而不中又方困於隂掩是惡能濟人之困猶株木之下不能䕃覆於物株木無枝葉之木也四近君之位在他卦不為無助以居困而不能庇物故為株木臀所以居也臀困于株木謂無所庇而不得安其居居安則非困也入于幽谷隂柔之人非能安其所遇既不能免於困則益迷暗妄動入於深困幽谷深暗之所也方益入於困無自出之勢故至於三歲不覿終困者也不覿不遇其所亨也象曰入于幽谷幽不明也幽不明也謂益入昏暗自陷於深困也明則不至於陷矣九二困于酒食朱紱方來利用亨祀征凶無咎酒食人所欲而所以施惠也二以剛中之才而處困之時君子安其所遇雖窮厄險難無所動其心不恤其為困也所困者唯困於所欲耳君子之所欲者澤天下之民濟天下之困也二未得遂其欲施其惠故為困於酒食也大人君子懷其道而困於下必得有道之君求而用之然後能施其所藴二以剛中之德困於下上有九五剛中之君道同德合必來相求故云朱紱方來方來方且來也朱紱王者之服蔽膝也以行來為義故以蔽膝言之利用亨祀亨祀以至誠通神明也在困之時利用至誠如亨祀然其德既誠自能感通於上自昔賢哲困於幽逺而德卒升聞道卒為用者惟自守至誠而已征凶無咎方困之時若不至誠安處以俟命往而求之則犯難得凶乃自取也將誰咎乎不度時而征乃不安其所為困所動也失剛中之德自取凶悔何所怨咎諸卦二五以隂陽相應而吉惟小畜與困乃厄於隂故同道相求小畜陽為隂所畜困陽為隂所掩也象曰困于酒食中有慶也雖困于所欲未能施惠於人然守其剛中之德必能致亨而有福慶也雖使時未亨通守其中德亦君子之道亨乃有慶也六三困于石據于蒺藜入于其宫不見其妻凶六三以隂柔不中正之質處險極而用剛居陽用剛也不善處困之甚者也石堅重難勝之物蒺藜刺不可據之物三以剛險而上進則二陽在上力不能勝堅不可犯益自困耳困于石也以不善之德居九二剛中之上其不安猶藉刺據于蒺藜也進退既皆益困欲安其所益不能矣宫其居所安也妻所安之主也知進退之不可而欲安其居則失其所安矣進退與處皆不可唯死而已其凶可知繫辭曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見耶二陽不可犯也而犯之以取困是非所困而困也名辱其事惡也三在二上固為據之然苟能謙柔以下之則無害矣乃用剛險以乘之則不安而取困如據蒺藜也如是死其將至所安之主可得而見乎象曰據于蒺藜乘剛也入于其宫不見其妻不祥也據于蒺藜謂乘九二之剛不安猶藉刺也不祥者不善之徵失其所安者不善之效故云不見其妻不祥也九四來徐徐困于金車吝有終唯力不足故困亨困之道必由援助當困之時上下相求理當然也四與初為正應然四以不中正處困其才不足以濟人之困初比二二有剛中之才足以拯困則宜為初所從矣金剛也車載物者也二以剛在下載已故謂之金車四欲從初而阻於二故其來遲疑而徐徐是困于金車也已之所應疑其少已而之他將從之則猶豫不敢遽前豈不可羞吝乎有終者事之所歸者正也初四正應終必相從也寒士之妻弱國之臣各安其正而已苟擇勢而從則惡之大者不容於世矣二與四皆以陽居隂而二以剛中之才所以能濟困也居隂者尚柔也得中者不失剛柔之宜也象曰來徐徐志在下也雖不當位有與也四應於初而隔於二志在下求故徐徐而來雖居不當位為未善然其正應相與故有終也九五劓刖困于赤紱乃徐有說利用祭祀截鼻曰劓傷於上也去足為刖傷於下也上下皆掩於隂為其傷害劓刖之象也五君位也人君之困由上下無與也赤紱臣下之服取行來之義故以紱言人君之困以天下不來也天下皆來則非困也五雖在困而有剛中之德下有九二剛中之賢道同德合徐必相應而來共濟天下之困是始困而徐有喜說也利用祭祀祭祀之事必致其誠敬而後受福人君在困時宜念天下之困求天下之賢若祭祀然致其誠敬則能致天下之賢濟天下之困矣五與二同德而云上下無與何也曰隂陽相應者自然相應也如夫婦骨肉分定也五與二皆陽爻以剛中之德同而相應相求而後合者也如君臣朋友義合也方其始困安有上下之與有與則非困故徐合而後有說也二云享祀五云祭祀大意則宜用至誠乃受福也祭與祀享泛言之則可通分而言之祭天神祀地祇享人鬼五君位言祭二在下言享各以其所當用也象曰劓刖志未得也乃徐有說以中直也利用祭祀受福也始為隂掩無上下之與方困未得志之時也徐而有說以中直之道得在下之賢其濟於困也不曰中正與二合者云直乃宜也直比正意差緩盡其誠意如祭祀然以求天下之賢則能亨天下之困而享受其福慶也上六困于葛藟于臲卼曰動悔有悔征吉物極則反事極則變困既極矣理當變矣葛藟纒束之物臲卼危動之狀六處困之極為困所纒束而居最髙危之地困于葛藟與臲卼也動悔動輒有悔無所不困也有悔咎前之失也曰自謂也若能曰如是動皆得悔當變前之所為有悔也能悔則往而得吉也困極而征則出於困矣故吉三以隂在下卦之上而凶上居一卦之上而無凶何也曰三居剛而處險困而用剛險故凶上以柔居說唯為困極耳困極則有變困之道也困與屯之上皆以無應居卦終屯則泣血漣如困則有悔征吉屯險極而困說體故也以說順進可以離乎困也象曰困于葛藟未當也動悔有悔吉行也為困所纒而不能變未得其道也是處之未當也知動則得悔遂有悔而去之可出於困是其行而吉也巽下坎上井序卦困乎上者必反下故受之以井承上升而不已必困為言謂上升不已而困則必反於下也物之在下者莫如井井所以次困也為卦坎上巽下坎水也巽之象則木也巽之義則入也木器之象木入於水下而上乎水汲井之象也井改邑不改井無喪無得往來井井井之為物常而不可改也邑可改而之他井不可遷也故曰改邑不改井汲之而不竭存之而不盈無喪無得也至者皆得其用往來井井也無喪無得其德也常往來井井其用也周常也周也井之道也汔至亦未繘井羸其瓶凶汔幾也繘綆也井以濟用為功幾至而未及用亦與未下繘於井同也君子之道貴乎有成所以五榖不熟不如荑稗掘井九仞而不及泉猶為棄井有濟物之用而未及物猶無有也羸敗其瓶而失之其用喪矣是以凶也羸毁敗也彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也巽入於水下而上其水者井也井之養於物不有窮已取之而不竭德有常也邑可改井不可遷亦其德之常也二五之爻剛中之德其常乃如是卦之才與義合也汔至亦未繘井未有功也羸其瓶是以凶也雖使幾至既未為用亦與未繘井同井以濟用為功水出乃為用未出則何功也瓶所以上水而致用也羸敗其瓶則不為用矣是以凶也象曰木上有水井君子以勞民勸相木承水而上之乃器汲水而出井之象君子觀井之象法井之德以勞徠其民而勸勉以相助之道也勞徠其民法井之用也勸民使相助法井之施也初六井泥不食舊井無禽井與鼎皆物也就物以為義六以隂柔居下上無應援無上水之象不能濟物乃井之不可食也井之不可食以泥汙也在井之下有泥之象井之用以其水之養人也無水則舍置不用矣井水之上人獲其用禽鳥亦就而求焉舊廢之井人既不食水不復上則禽鳥亦不復往矣蓋無以濟物也井本濟人之物六以隂居下無上水之象故為不食井之不食以泥也猶人當濟物之時而才弱無援不能及物為時所舍也象曰井泥不食下也舊井無禽時舍也以隂而居井之下泥之象也無水而泥人所不食也人不食則水不上無以及禽鳥禽鳥亦不至矣見其不能濟物為時所舍置不用也若能及禽鳥是亦有所濟也舍上聲與乾之時舍音不同九二井谷射鮒甕敝漏二雖剛陽之才而居下上無應而比於初不上而下之象也井之道上行者也澗谷之水則旁出而就下二居井而就下失井之道乃井而如谷也井上出則養人而濟物今乃下就汚泥注於鮒而已鮒或以為蝦或以為蟇井泥中微物耳射注也如谷之下流注於鮒也甕敝漏如甕之破漏也陽剛之才本可以養人濟物而上無應援故不能上而就下是以無濟用之功如水之在甕本可為用乃破敝而漏之不為用也井之初二無功而不言悔咎何也曰失則有悔過則為咎無應援而不能成用非悔咎也居二比初豈非過乎曰處中非過也不能上由無援非以比初也象曰井谷射鮒無與也井以上出為功二陽剛之才本可濟用以在下而上無應援是以下比而射鮒若上有與之者則當汲引而上成井之功矣九三井泄不食為我心惻可用汲王明並受其福三以陽剛居得其正是有濟用之才者也在井下之上水之清潔可食者也井以上為用居下未得其用也陽之性上又志應上六處剛而過中汲汲於上進乃有才用而切於施為未得其用則如井之泄治清潔而不見食為心之惻怛也三居井之時剛而不中故切於施為異乎用之則行舍之則藏者也然明王用人豈求備也故王明則受福矣三之才足以濟用如井之清潔可用汲而食也若上有明王則當用之而得其效賢才見用則已得行其道君得享其功下得被其澤上下並受其福也象曰井泄不食行惻也求王明受福也井泄治而不見食乃人有才知而不見用以不得行為憂惻也既以不得行為惻則豈免有求也故求王明而受福志切於行也六四井甃無咎四雖隂柔而處正上承九五之君才不足以廣施利物亦可自守者也故能修治則得無咎甃砌纍也謂修治也四雖才弱不能廣濟物之功修治其事不至於廢可也若不能修治廢其養人之功則失井之道其咎大矣居髙位而得剛陽中正之君但能處正承上不廢其事亦可以免咎也象曰井甃無咎修井也甃者修治於井也雖不能大其濟物之功亦能修治不廢也故無咎僅能免咎而已若在剛陽自不至如是如是則可咎矣九五井洌寒泉食五以陽剛中正居尊位其才其德盡善盡美井洌寒泉食也洌謂甘潔也井泉以寒為美甘潔之寒泉可為人食也於井道為至善也然而不言吉者井以上出為成功未至於上未及用也故至上而後言元吉象曰寒泉之食中正也寒泉而可食井道之至善者也九五中正之德為至善之義上六井收勿幕有孚元吉井以上出為用居井之上井道之成也收汲取也幕蔽覆也取而不蔽其利無窮井之施廣矣大矣有孚有常而不變也博施而有常大善之吉也夫體井之用博施而有常非大人孰能他卦之終為極為變唯井與鼎終乃為成功是以吉也象曰元吉在上大成也以大善之吉在卦之上井道之大成也井以上為成功離下兌上革序卦井道不可不革故受之以革井之為物存之則穢敗易之則清潔不可不革者也故井之後受之以革也為卦兌上離下澤中有火也革變革也水火相息之物水滅火火涸水相變革者也火之性上水之性下若相違行則暌而已乃火在下水在上相就而相尅相滅息者也所以為革也又二女同居而其歸各異其志不同為不相得也故為革也革已日乃孚元亨利貞悔亡革者變其故也變其故則人未能遽信故必已日然後人心信從元亨利貞悔亡弊壞而後革之革之所以致其通也故革之而可以大亨革之而利於正道則可久而得去故之義無變動之悔乃悔亡也革而無甚益猶可悔也况反害乎古人所以重改作也彖曰革水火相息二女同居其志不相得曰革澤火相滅息又二女志不相得故為革息為止息又為生息物止而後有生故為生義革之相息謂止息也已日乃孚革而信之事之變革人心豈能便信必終日而後孚在上者於改為之際當祥告申令至於己日使人信之人心不信雖强之行不能成也先王政令人心始以為疑者有矣然其久也必信終不孚而成善治者未之有也文明以說大亨以正革而當其悔乃亡以卦才言革之道也離為文明兌為說文明則理無不盡事無不察說則人心和順革而能照察事理和順人心可致大亨而得貞正如是變革得其至當故悔亡也天下之事革之不得其道則反致弊害故革有悔之道惟革之至當則新舊之悔皆亡也天地革而四時成湯武革命順乎天而應乎人革之時大矣哉推革之道極乎天地變易時運終始也天地隂陽推遷改易而成四時萬物於是生長成終各得其宜革而後四時成也時運既終必有革而新之者王者之興受命於天故易世謂之革命湯武之王上順天命下應人心順乎天而應乎人也天道變改世故遷易革之至大也故贊之曰革之時大矣哉象曰澤中有火革君子以治歷明時水火相息為革革變也君子觀變革之象推日月星辰之遷易以治歷數明四時之序也夫變易之道事之至大理之至明跡之至著莫如四時觀四時而順變革則與天地合其序矣初九鞏用黃牛之革變革事之大也必有其時有其位有其才審慮而慎動而後可以無悔九以時則初也動於事初則無審慎之意而有躁易之象以位則下也無時無援而動於下則有僭妄之咎而無體勢之重以才則離體而陽也離性上而剛體健皆速於動也其才如此有為則凶咎至矣蓋剛不中而體躁所不足者中與順也當以中順自固而無妄動則可也鞏局束也革所以包束黃中色牛順物鞏用黃牛之革謂以中順之道自固不妄動也不云吉凶何也曰妄動則有凶咎以中順自固則不革而已安得便有吉凶乎象曰鞏用黃牛不可以有為也以初九時位才皆不可以有為故當以中順自固也六二已日乃革之征吉無咎以六居二柔順而得中正又文明之主上有剛陽之君同德相應中正則無偏蔽文明則盡事理應上則得權勢體順則無違悖時可矣位得矣才足矣處革之至善者也然臣道不當為革之先又必待上下之信故已日乃革之也如二之才德所居之地所逢之時足以革天下之弊新天下之治當進而上輔於君以行其道則吉而無咎也不進則失可為之時為有咎也以二體柔而處當位體柔則其進緩當位則其處固變革者事之大故有此戒二得中而應剛未至失於柔也聖人因其有可戒之疑而明其義耳使賢才不失可為之時也象曰已日革之行有嘉也已日而革之征則吉而無咎者行則有嘉慶也謂可以革天下之弊新天下之事處而不行是無救弊濟世之心失時而有咎也九三征凶貞厲革言三就有孚九三以剛陽為下之上又居離之上而不得中躁動於革者也在下而躁於變革以是而行則有凶也然居下之上事苟當革豈可不為也在乎守貞正而懷危懼順從公論則可行之不疑革言謂當革之論就成也合也審察當革之言至於三而皆合則可信也言重慎之至能如是則必得至當乃有孚也己可信而衆所信也如此則可以革矣在革之時居下之上事之當革若畏懼而不為則失時為害唯當慎重之至不自任其剛明審稽公論至於三就而後革之則無過矣象曰革言三就又何之矣稽之衆論至於三就事至當也又何之矣力俗語更何往也如是而行乃順理時行非己之私意所欲為也必得其宜矣九四悔亡有孚改命吉九四革之盛也陽剛革之才也離下體而進上體革之時也居水火之際革之勢也得近君之位革之任也下無係應革之志也以九居四剛柔相際革之用也四既具此可謂當革之時也事之可悔而後革之革之而當其悔乃亡也革之既當唯在處之以至誠故有孚則改命吉改命改為也謂革之也既事當而弊革行之以誠上信而下順其吉可知四非中正而至善何也曰唯其處柔也故剛而不過近而不逼順承中正之君乃中正之人也易之取義無常也隨時而已象曰改命之吉信志也改命而吉以上下信其志也誠既至則上下信矣革之道以上下之信為本不當不孚則不信當而不信猶不可行也况不當乎九五大人虎變未占有孚九五以剛陽之才中正之德居尊位大人也以大人之道革天下之事無不當也無不時也所過變化事理炳著如虎之文采故云虎變龍虎大人之象也變者事物之變曰虎何也曰大人變之乃大人之變也以大人中正之道變革之炳然昭著不待占决知其至當而天下必信也天下蒙大人之革不待占决知其至當而信之也象曰大人虎變其文炳也事理明著若虎文之炳煥明盛也天下有不孚乎上六君子豹變小人革面征凶居貞吉革之終革道之成也居子謂善人良喜則已從革而變其著見若豹之彬蔚也小人昏愚難遷者雖未能心化亦革其面以從上之教令也龍虎大人之象故大人云虎君子云豹也人性本善皆可以變化然有下愚雖聖人不能移者以堯舜為君以聖繼聖百有餘年天下被化可謂深且久矣而有苖有象其來格蒸乂蓋亦革面而已小人既革其外革道可以為成也苟更從而深治之則為已甚已甚非道也故至革之終而又征則凶也當貞固以自守革至於極而不守以貞則所革隨復變矣天下之事始則患乎難革已革則患乎不能守也故革之終戒以居貞則吉也居貞非為六戒乎曰為革終言也莫不在其中矣人性本善有不可革者何也曰語其性則皆善也語其才則有下愚之不移所謂下愚有二焉自暴也自棄也人苟以善自治則無不可移者雖昏愚之至皆可漸磨而進也唯自暴者拒之以不信自棄者絶之以不為雖聖人與居不能化而入也仲尼之所謂下愚也然天下自棄自暴者非必皆昏愚也往往强戾而才力有過人者商辛是也聖人以其自絶於善謂之下愚然考其歸則誠愚也既曰下愚其能革面何也曰心雖絶於善道其畏威而寡罪則與人同也唯其有與人同所以知其非性之罪也象曰君子豹變其文蔚也小人革面順以從君也君子從化遷善成文彬蔚章見於外也中人以上莫不變革雖不移之小人則亦不敢肆其惡革易其外以順從君上之教令是革面也至此革道成矣小人勉而假善君子所容也更往而治之則凶矣巽下離上鼎序卦革物者莫若鼎故受之以鼎鼎之為用所以革物也變腥而為熟易堅而為柔水火不可同處也能使相合為用而不相害是能革物也鼎所以次革也為卦上離下巽所以為鼎則取其象焉取其義焉取其象者有二以全體言之則下植為足中實為腹受物在中之象對峙於上者耳也橫亘乎上者鉉也鼎之象也以上下二體言之則中虛在上下有足以承之亦鼎之象也取其義則木從火也巽入也順從之義以木從火為然之象火之用惟燔與烹燔不假器故取烹象而為鼎以木㢲火烹飪之象也制器取其象也乃象器以為卦乎曰制器取於象也象存乎卦而卦不必先器聖人制器不待見卦而後知象以衆人之不能知象也故設卦以示之卦器之先後不害於義也或疑鼎非自然之象乃人為也曰固人為也然烹飪可以成物形制如是則可用此非人為自然也在井亦然器雖在卦先而所取者乃卦之象卦復用器以為義也鼎元吉亨以卦才言也如卦之才可以致元亨也止當云元亨文羡吉字卦才可以致元亨未便有元吉也彖復止云元亨其羡明矣彖曰鼎象也卦之為鼎取鼎之象也鼎之為器法卦之象也有象而後有器卦復用器而為義也鼎大器也重寶也故其制作形模法象尤嚴鼎之名正也古人訓方方實正也以形言則耳對植於上足分峙於下周圓內外髙卑厚薄莫不有法而至正至正然後成安重之象故鼎者法象之器卦之為鼎以其象也以木㢲火亨飪也聖人亨以享上帝而大亨以養聖賢以二體言鼎之用也以木㢲火以木從火所以亨飪也鼎之為器生人所賴至切者也極其用之大則聖人亨以享上帝大亨以養聖賢聖人古之聖王大言其廣㢲而耳目聰明柔進而上行得中而應乎剛是以元亨上既言鼎之用矣復以卦才言人能如卦之才可以致元亨也下體㢲為㢲順於理離明而中虛於上為耳目聰明之象凡離在上者皆云柔進而上行柔在下之物乃居尊位進而上行也以明居尊而得中道應乎剛能用剛陽之道也五居中而又以柔而應剛為得中道其才如是所以能元亨也象曰木上有火鼎君子以正位凝命木上有火以木㢲火也烹飪之象故為鼎君子觀鼎之象以正位凝命鼎者法象之器其形端正其體安重取其端正之象則以正其位謂正其所居之位君子所處必正其小至於席不正不坐母跛母倚取其安重之象則凝其命令安重其命令也凝聚止之義謂安重也今世俗有凝然之語以命令而言耳凡動為皆當安重也初六鼎顛趾利出否得妾以其子無咎六在鼎下趾之象也上應於四趾而向上顛之象也鼎覆則趾顛趾顛則覆其實矣非順道也然有當顛之時謂傾出敗惡以致潔取新則可也故顛趾利在於出否否惡也四近君大臣之位初在下之人而相應乃上求於下下從其上也上能用下之善下能輔上之為可以成事功乃善道如鼎之顛趾有當顛之時未為悖理也得妾以其子無咎六隂而卑故為妾得妾謂得其人也若得良妾則能輔助其主使無過咎也子主也以其子致其主於無咎也六隂居下而卑巽從陽妾之象也以六上應四為顛趾而發此義初六本無才德可取故云得妾言得其人則如是也象曰鼎顛趾未悖也鼎覆而趾顛悖道也然非必為悖者蓋有傾出否惡之時也利出否以從貴也去故而納新瀉惡而受美從貴之義也應於四上從於貴者也九二鼎有實我仇有疾不我能即吉二以剛實居中鼎中有實之象鼎之有實上出則為用二剛陽有濟用之才與五相應上從六五之君則得正而其道可亨然與初密比隂從陽者也九二居中而應中不至失正己雖自守彼必相求故戒能逺之使不來即我則吉也仇對也隂陽相對之物謂初也相從則非正而害義是有疾也二當以正自守使之不能來就己人能自守以正則不正不能就之矣所以吉也象曰鼎有實慎所之也鼎之有實乃人之有才業也當慎所趨向不慎所往則亦陷於非義二能不昵於初而上從六五之正應乃是慎所之也我仇有疾終無尤也我仇有疾舉上文也我仇對已者謂初也初比已而非正是有疾也既自守以正則彼不能即我所以終無過尤也九三鼎耳革其行塞雉膏不食方雨虧悔終吉鼎耳六五也為鼎之主三以陽居㢲之上剛而能㢲其才足以濟務然與五非應而不同五中而非正三正而非中不同也未得於君者也不得於君則其道何由而行革變革為異也三與五異而不合也其行塞不能亨也不合於君則不得其任無以施其用膏甘美之物象祿位雉指五也有文明之德故謂之雉三有才用而不得六五之祿位是不得雉膏食之也君子藴其德久而必彰守其道其終必亨五有聰明之象而三終上進之物隂陽交暢則雨方雨且將雨也言五與三方將和合虧悔終吉謂不足之悔終當獲吉也三懷才而不偶故有不足之悔然其有剛陽之德上聰明而下㢲正終必相得故吉也三雖不中以㢲體故無過剛之失若過剛則豈能終吉象曰鼎耳革失其義也始與鼎耳革異者失其相求之義也與五非應失求合之道也不中非同志之象也是以其行塞而不通然上明而下才終必和合故方雨而吉也九四鼎折足覆公餗其形渥凶四大臣之位任天下之事者也天下之事豈一人所能獨任必當求天下之賢智與之協力得其人則天下之治可不勞而致也用非其人則敗國家之事貽天下之患四下應於初初隂柔小人不可用者也而四用之其不勝任而敗事猶鼎之折足也鼎折足則傾覆公上之餗餗鼎實也居大臣之位當天下之任而所用非人至於覆敗乃不勝其任可羞愧之甚也其形渥謂赧汙也其凶可知繫辭曰德薄而位尊知小而謀大力小而任重鮮不及矣言不勝其任也蔽於所私德薄知小也象曰覆公餗信如何也大臣當天下之任必能成天下之治安則不誤君上之所倚下民之所望與己致身任道之志不失所斯乃所謂信也不然則失其職誤上之委任得為信乎故曰信如何也六五鼎黃耳金鉉利貞五在鼎上耳之象也鼎之舉措在耳為鼎之主也五有中德故云黃耳鉉加耳者也二應於五來從於耳者鉉也二有剛中之德陽體剛中色黃故為金鉉五文明得中而應剛二剛中㢲體而上應才無不足也相應至善矣所利在貞固而已六五居中應中不至於失正而質本隂柔故戒以貞固於中也象曰鼎黃耳中以為實也六五以得中為善是以中為實德也五之所以聰明應剛為鼎之主得鼎之道皆由得中也上九鼎玉鉉大吉無不利井與鼎以上出為用處終鼎功之成也在上鉉之象剛而溫者玉也九雖剛陽而居隂履柔不極剛而能溫者也居成功之道唯善處而已剛柔適宜動靜不過則為大吉無所不利矣在上為鉉雖居無位之地實當用也與他卦異矣井亦然象曰玉鉉在上剛柔節也剛而溫乃有節也上居成功致用之地而剛柔中節所以大吉無不利也井鼎皆以終為成功而鼎不云元吉何也曰井之功用皆在上出又有博施有常之德是以元吉鼎以烹飪為功居上為成德與井異以剛柔節故得大吉也震下震上震序卦主器者莫若長子故受之以震鼎者器也震為長男故取主器之義而繼鼎之後長子傳國家繼位號者也故為主器之主序卦取其一義之大者為相繼之義震之為卦一陽生於二隂之下動而上者也故為震震動也不曰動者震有動而奮發震驚之義乾坤之交一索而成震生物之長也故為長男其象則為雷其義則為動雷有震奮之象動為驚懼之義震亨陽生於下而上進有亨之義又震為動為恐懼為有主震而奮發動而進懼而修有主而保大皆可以致亨故震則有亨震來虩虩笑言啞啞當震動之來則恐懼不敢自寧旋顧周慮虩虩然也虩虩顧慮不安之貌蠅虎謂之虩者以其周環顧慮不自寧也處震如是則能保其安裕故笑言啞啞啞啞笑言和適之貌震驚百里不喪匕鬯言震動之大而處之之道動之大者莫若雷震為雷故以雷言雷之震動驚及百里之逺人無不懼而自失雷聲所及百里也唯宗廟祭祀執匕鬯者則不至於喪失人之致其誠敬莫如祭祀匕以載鼎實升之於爼鬯以灌地而降神方其酌裸以求神薦牲而祈享盡其誠敬之心則雖雷震之威不能使之懼而失守故臨大震懼能安而不自失者唯誠敬而已此處震之道也卦才無取故但言處震之道彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震自有亨之義非由卦才震來而能恐懼自修自慎則可反致福吉也笑言啞啞言自若也由能恐懼而後自處有法則也有則則安而不懼矣處震之道也震驚百里驚逺而懼邇也雷之震及於百里逺者驚邇者懼言其威逺大也出可以守宗廟社稷以為祭主也彖文脫不喪匕鬯一句卦辭云不喪匕鬯本為誠敬之至威懼不能使之自失彖以長子宜如是因承上文用長子之義通解之謂其誠敬能不喪匕鬯則君出而可以守宗廟社稷為祭主也長子如是而後可以守世祀承國家也象曰洊雷震君子以恐懼修省洊重襲也上下皆震故為洊雷雷重仍則威益盛君子觀洊雷威震之象以恐懼自修飭循省也君子畏天之威則修正其身思省其過咎而改之不唯雷震凡遇驚懼之事皆當如是初九震來虩虩後笑言啞啞吉初九成震之主致震者也在卦之下處震之初也知震之來當震之始若能以為恐懼而周旋顧慮虩虩然不敢寧止則終必保其安吉故後笑言啞啞也象曰震來虩虩恐致福也笑言啞啞後有則也震來而能恐懼周顧則無患矣是能因恐懼而反致福也因恐懼而自修省不敢違於法度是由震而後有法則故能保其安吉而笑言啞啞也六二震來厲億喪貝躋于九陵勿逐七日得六二居中得正善處震者也而乘初九之剛九震之主震剛動而上奮孰能禦之厲猛也危也彼來既猛則已處危矣億度也貝所有之資也躋升也九陵陵之髙也逐往追也以震來之厲度不能當而必喪其所有則升至髙以避之也九言其重岡陵之重髙之至也九重之多也如九天九地也勿逐七日得二之所貴者中正也遇震懼之來雖量勢㢲避當守其中正無自失也億之必喪也故逺避以自守過則復其常矣是勿逐而自得也逐即物也以已即物失其守矣故戒勿逐避逺自守處震之大方也如二者當危懼而善處者也卦位有六七乃更始事既終時既易也不失其守雖一時不能禦其來然時過事已則復其常故云七日得象曰震來厲乘剛也當震而乘剛是以彼厲而已危震剛之來其可禦乎六三震蘇蘇震行無眚蘇蘇神氣緩散自失之狀三以隂居陽不正處不正於平時且不能安况處震乎故其震懼而蘇蘇然若因震懼而能行去不正而就正則可以無過眚過也三行則至四正也動以就正為善故二勿逐則自得三能行則無眚以不正而處震懼有眚可知象曰震蘇蘇位不當也其恐懼自失蘇蘇然由其所處不當故也不中不正其能安乎九四震遂泥九四居震動之時不中不正處柔失剛健之道居四無中正之德陷溺於重隂之間不能自震奮者也故云遂泥泥滯溺也以不正之陽而上下重隂安能免於泥乎遂無反之意處震懼則莫能守也欲震動則莫能奮也震道亡矣豈復能光亨也象曰震遂泥未光也陽者剛物震者動義以剛處動本有光亨之道乃失其剛正而陷於重隂以致遂泥豈能光也云未光見陽剛本能震也以失德故泥耳六五震往來厲億無喪有事六五雖以隂居陽不當位為不正然以柔居剛又得中乃有中德者也不失中則不違於正矣所以中為貴也諸卦二五雖不當位多以中為美三四雖當位或以不中為過中常重於正也蓋中則不違於正正不必中也天下之理莫善於中於六二六五可見五之動上往則柔不可居動之極下來則犯剛是往來皆危也當君位為動之主隨宜應變在中而已故當億度無喪失其所有之事而已所有之事謂中德苟不失中雖有危不至於凶也億度謂圖慮求不失中也五所以危由非剛陽而無助若以剛陽有助為動之主則能亨矣往來皆危時則甚難但期於不失中則可自守以柔主動固不能致亨濟也象曰震往來厲危行也其事在中大無喪也往來皆厲行則有危也動皆有危唯在無喪其事而已其事謂中也能不失其中則可自守也大無喪以無喪為大也上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言索索消索不存之狀謂其志氣如是六以隂柔居震動之極其驚懼之甚志氣殫索也矍矍不安定貌志氣索索則視瞻徊徨以隂柔不中正之質而處震動之極故征則凶也震之及身乃于其躬也不于其躬謂未及身也鄰者近於身者也能震懼於未及身之前則不至於極矣故得無咎苟未至於極尚有可改之道震終當變柔不固守故有畏鄰戒而能變之義聖人於震終示人知懼能改之義為勸深矣婚媾所親也謂同動者有言有怨咎之言也六居震之上始為衆動之首今乃畏鄰戒而不敢進與諸處震者異矣故婚媾有言也象曰震索索中未得也雖凶無咎畏鄰戒也所以恐懼自失如此以未得於中道也謂過中也使之得中則不至於索索矣極而復征則凶也若能見鄰戒而知懼變於未極之前則無咎也上六動之極震極則有變義也艮下艮上艮序卦震者動也物不可以終動止之故受之以艮艮者止也動靜相因動則有靜靜則有動物無常動之理艮所以次震也艮者止也不曰止者艮山之象有安重堅實之意非止義可盡也乾坤之交三索而成艮一陽居二隂之上陽動而上進之物既至於上則止矣隂者靜也上止而下靜故為艮也然則與畜止之義何異曰畜止者制畜之義力止之也艮止者安止之義止其所也艮其背不獲其身行其庭不見其人無咎人之所以不能安其止者動於欲也欲牽於前而求其止不可得也故艮之道當艮其背所見者在前而背乃背之是所不見也止於所不見則無欲以亂其心而止乃安不獲其身不見其身也謂忘我也無我則止矣不能無我無可止之道行其庭不見其人庭除之間至近也在背則雖至近不見謂不交於物也外物不接內欲不萌如是而止乃得止之道於止為無咎也彖曰艮止也時止則止時行則行動靜不失其時其道光明艮為止止之道唯其時行止動靜不以時則妄也不失其時則順理而合義在物為理處物為義動靜合理義不失其時也乃其道之光明也君子所貴乎時仲尼行止久速是也艮體篤實有光明之義艮其止止其所也艮其止謂止之而止也止之而能止者由止得其所也止而不得其所則無可止之理夫子曰於止知其所止謂當止之所也夫有物必有則父止於慈子止於孝君止於仁臣止於敬萬物庶事莫不各有其所得其所則安失其所則悖聖人所以能使天下順治非能為物作則也唯止之各於其所而已上下敵應不相與也以卦才言也上下二體以敵相應無相與之義隂陽相應則情通而相與乃以其敵故不相與也不相與則相背為艮其背止之義也是以不獲其身行其庭不見其人無咎也相背故不獲其身不見其人是以能止能止則無咎也象曰兼山艮君子以思不出其位上下皆山故為兼山此而并彼為兼謂重復也重艮之象也君子觀艮止之象而思安所止不出其位也位者所處之分也萬事各有其所得其所則止而安若當行而止當速而久或過或不及皆出其位也况踰分非據乎初六艮其趾無咎利永貞六在最下趾之象趾動之先也艮其趾止於動之初也事止於初未至失正故無咎也以柔處下當趾之時也行則失其正矣故止乃無咎隂柔患其不能常也不能固也故方止之初戒以利在常永貞固則不失止之道也象曰艮其趾未失正也當止而行非正也止之於初故未至失正事止於始則易而未至於失也六二艮其腓不拯其隨其心不快六二居中得正得止之道者也上無應援不獲其君矣三居下之上成止之主主乎止者也乃剛而失中不得止之宜剛止於上非能降而下求二雖有中正之德不能從也二之行止係乎所主非得自由故為腓之象股動則腓隨動止在股而不在腓也二既不得以中正之道拯救三之不中則必勉而隨之不能拯而唯隨也雖咎不在已然豈其所欲哉言不聽道不行也故其心不快不能行其志也士之處髙位則有拯而無隨在下位則有當拯有當隨有拯之不得而後隨象曰不極其隨未退聽也所以不拯之而唯隨者在上者未能下從也退聽下從也九三艮其限列其夤厲薰心限分隔也謂上下之際三以剛居剛而不中為成艮之主決止之極也已在下體之上而隔上下之限皆為止義故為艮其限是確乎止而不復能進退者也在人身如列其夤夤膂也上下之際也列絶其夤則上下不相從屬言止於下之堅也止道貴乎得宜行止不能以時而定於一其堅强如此則處世乖戾與物睽絶其危甚矣人之固止一隅而舉世莫與宜者則艱蹇忿畏焚撓其中豈有安裕之理厲薰心謂不安之勢薰爍其中也象曰艮其限危薰心也謂其固止不能進退危懼之慮常薰爍其中心也六四艮其身無咎四大臣之位止天下之當止者也以隂柔而不遇剛陽之君故不能止物唯自止其身則可無咎所以能無咎者以止於正也言止其身無咎則見其不能止物施於政則有咎矣在上位而僅能善其身無取之甚也象曰艮其身止諸躬也不能為天下之止能止於其身而已豈足稱大臣之位也六五艮其輔言有序悔亡五君位艮之主也主天下之止者也而隂柔之才不足以當此義故止以在上取輔義言之人之所當慎而止者惟言行也五在上故以輔言輔言之所由出也艮於輔則不妄出而有序也言輕發而無序則有悔止之於輔則悔亡也有序中節有次序也輔與頰舌皆言所由出而輔在中艮其輔謂止於中也象曰艮其輔以中正也五之所善者中也艮其輔謂止於中也言以得中為正止之於輔使不失中乃得正也上九敦艮吉九以剛實居上而又成艮之主在艮之終止之至堅篤者也敦篤實也居止之極故不過而為敦人之止難於久終故節或移於晚守或失於終事或廢於久人之所同患也上九能敦厚於終止道之至善所以吉也六爻之德唯此為吉象曰敦艮之吉以厚終也天下之事唯終守之為難能敦於止有終者也上之吉以其能厚於終也艮下㢲上漸序卦艮者止也物不可以終止故受之以漸漸者進也止必有進屈伸消息之理也止之所生亦進也所反亦進也漸所以次卦也進以序為漸今人以緩進為漸進以序不越次所以緩也為卦上㢲下艮山上有木木之髙而因山其髙有因也其髙有因乃其進有序也所以為漸也漸女歸吉利貞以卦才兼漸義而言也乾坤之變為㢲艮㢲艮重而為漸在漸體而言中二爻交也由二爻之交然後男女各得正位初終二爻雖不當位亦陽上隂下得尊卑之正男女各得其正亦得位也與歸妹正相對女之歸能如是之正則吉也天下之事進必以漸者莫如女歸臣之進於朝人之進於事固當有序不以其序則陵節犯義凶咎隨之然以義之輕重廉恥之道女之從人最為大也故以女歸為義且男女萬事之先也諸卦多有利貞而所施或不同有涉不正之疑而為之戒者有其事必貞乃得其宜者有言所以利者以其有貞也所謂涉不正之疑而為之戒者損之九二是也處隂居說故戒以宜貞也有其事必貞乃得宜者大畜是也言所畜利於貞也有言所以利者以其有貞者漸是也言女歸之所以吉利於如此貞正也蓋其固有非設戒也漸之義宜能亨而不云亨者蓋亨者通達之義非漸進之義也彖曰漸之進也女歸吉也如漸之義而進乃女歸之吉也謂正而有漸也女歸為大耳他進亦然進得位往有功也漸進之時而隂陽各得正位進而有功也四復由上進而得正位三離下而為上遂得正位亦為進得位之義進以正可以正邦也以正道而進可以正邦國至於天下也凡進於事進於德進於位莫不皆當以正也其位剛得中也上云進得位往有功也統言隂陽得位是以進而有功復云其位剛得中也所謂位者五以剛陽中正得尊位也諸爻之得正亦可謂之得位矣然未若五之得尊位故特言之止而㢲動不窮也內艮止外㢲順止為安靜之象㢲為和順之義人之進也若以欲心之動則躁而不得其漸故有困窮在漸之義內止靜而外㢲順故其進動不有困窮也象曰山上有木漸君子以居賢德善俗山上有木其髙有因漸之義也君子觀漸之象以居賢善之德化美於風俗人之進於賢德必有其漸習而後能安非可陵節而遽至也在已且然教化之於人不以漸其能入乎移風易俗非一朝一夕所能成故善俗必以漸也初六鴻漸于干小子厲有言無咎漸諸爻皆取鴻象鴻之為物至有時而羣有序不失其時序乃為漸也干水湄水鳥止於水之湄水至近也其進可謂漸矣行而以時乃所謂漸漸進不失漸得其宜矣六居初至下也隂之才至弱也而上無應援以此而進常情之所憂也君子則深識逺照知義理之所安時事之所宜處之不疑小人幼子唯能見已然之事從衆人之知非能燭理也故危懼而有言蓋不知在下所以有進也用柔所以不躁也無應所以能漸也於義自無咎也若漸之初而用剛急進則失漸之義不能進而有咎必矣象曰小子之厲義無咎也雖小子以為危厲在義理實無咎也六二鴻漸于磐飲食衎衎吉二居中得正上應於五進之安裕者也但居漸故進不速磐石之安平者江河之濱所有象進之安自干之磐又漸進也二與九五之君以中正之道相應其進之安固平易莫加焉故其飲食和樂衎衎然吉可知也象曰飲食衎衎不素飽也爻辭以其進之安平故取飲食和樂為言夫子恐後人之未喻又釋之云中正君子遇中正之主漸進于上將行其道以及天下所謂飲食衎衎謂其得志和樂不謂空飽飲食而已素空也九三鴻漸于陸夫征不復婦孕不育凶利禦寇平髙曰陸平原也三在下卦之上進至於陸也陽上進者也居漸之時志將漸進而上無應援當守正以俟時安處平地則得漸之道若或不能自守欲有所牽志有所就則失漸之道四隂在上而密此陽所說也三陽在下而相親隂所從也二爻相比而無應相比則相親而易合無應則無適而相求故為之戒夫陽也夫謂三三若不守正而與四合是知征而不知復征行也復反也不復謂不反顧義理婦謂四若以不正而合則雖孕而不育蓋非其道也如是則凶也三之所利在於禦冦非理而至者冦也守正以間邪所謂禦冦也不能禦冦則自夫而凶矣象曰夫征不復離羣醜也婦孕不育失其道也利用禦冦順相保也夫征不復則失漸之正從欲而失正離叛其羣類為可醜也卦之諸爻皆無不善若獨失正是離其羣類婦孕不由其道所以不育也所利在禦冦謂以順道相保君子之與小人比也自守以正豈唯君子自完其已而已乎亦使小人得不陷於非義是以順道相保禦止其惡故曰禦冦六四鴻漸于木或得其桷無咎當漸之時四以隂柔進據剛陽之上陽剛而上進豈能安處隂柔之下故四之處非安地如鴻之進于木也木漸髙矣而有不安之象鴻趾連不能握枝故不木棲桷橫平之柯唯平柯之上乃能安處謂四之處本危或能自得安寧之道則無咎也如鴻之於木本不安或得平柯而處之則安也四居正而㢲順宜無咎者也必以得失言者因得失以明其義也象曰或得其桷順以㢲也桷者平安之處求安之道唯順與㢲若其義順正其處卑㢲何處而不安如四之順正而㢲乃得桷也九五鴻漸于陵婦三歲不孕終莫之勝吉陵髙阜也鴻之所止最髙處也象君之位雖得尊位然漸之時其道之行固亦非遽與二為正應而中正之德同乃隔於三四三比二四比五皆隔其交者也未能即合故三歲不孕然中正之道有必亨之理不正豈能隔害之故終莫之能勝但其合有漸耳終得其吉也以不正而敵中正一時之為耳久其能勝乎象曰終莫之勝吉得所願也君臣以中正相交其道當行雖有間其間者終豈能勝哉徐必得其所願乃漸吉也上九鴻漸于陸其羽可用為儀吉安定胡公以陸為逵逵雲路也謂虛空之中爾雅九達謂之逵逵通達無阻蔽之義也上九在至髙之位又益上進是出乎位之外在他時則為過矣於漸之時居㢲之極必有其序如鴻之離所止而飛于雲空在人則超逸乎常事之外者也進至於是而不失其漸賢達之髙致也故可用為儀法而吉也羽鴻之所用進也以其進之用况上九進之道也象曰其羽可用為儀吉不可亂也君子之進自下而上由微而著跬步造次莫不有序不失其序則無所不得其吉故九雖窮髙而不失其吉可用為儀法者以其有序而不可亂也兌下震上歸妹序卦漸者進也進必有所歸故受之以歸妹進則必有所至故漸有歸義歸妹所以繼漸也歸妹者女之歸也妹少女之稱為卦震上兌下以少女從長男也男動而女說又以說而動皆男說女女從男之義卦有男女配合之義者四咸恆漸歸妹也咸男女之相感也男下女二氣感應止而說男女之情相感之象恆常也男上女下㢲順而動隂陽皆相應是男女居室夫婦唱隨之常道漸女歸之得其正也男下女而各得正位止靜而㢲順其進有漸男女配合得其道也歸妹女之嫁歸也男上女下女從男也而有說少之義以說而動動以說則不得其正矣故位皆不當初與上雖當隂陽之位而陽在下隂在上亦不當位也與漸正相對咸恆夫婦之道漸歸妹女歸之義咸與歸妹男女之情也咸止而說歸妹動於說皆以說也恆與漸夫婦之義也恆㢲而動漸止而㢲皆以㢲順也男女之道夫婦之義備於是矣歸妹為卦澤上有雷雷震而澤動從之象也物之隨動莫如水男動於上而女從之嫁歸從男之象震長男兌少女少女從長男以說而動動而相說也人之所說者少女故云妹為女歸之象又有長男說少女之義故為歸妹也歸妹征凶無攸利以說而動動而不當故凶不當位不當也征凶動則凶也如卦之義不獨女歸無所往而利也彖曰歸妹天地之大義也一隂一陽之謂道隂陽交感男女配合天地之常理也歸妹女歸於男也故云天地之大義也男在女上隂從陽動故為女歸之象天地不交而萬物不興歸妹人之終始也天地不交則萬物何從而生女之歸男乃生生相續之道男女交而後有生息有生息而後其終不窮前者有終而後者有始相續不窮是人之終始也說以動所歸妹也征凶位不當也以二體釋歸妹之義男女相感說而動者少女之事故以說而動所歸者妹也所以征則凶者以諸爻皆不當位也所處皆不正何動而不凶大率以說而動安有不失正者無攸利柔乘剛也不唯位不當也又有乘剛之過三五皆乘剛男女有尊卑之序夫婦有唱隨之禮此常理也如恆是也苟不由常正之道徇情肆欲惟說是動則夫婦瀆亂男牽欲而失其剛婦狃說而忘其順如歸妹之乘剛是也所以凶無所往而利也夫隂陽之配合男女之交媾理之常也然從欲而流放不由義理則淫邪無所不至傷身敗德豈人理哉歸妹之所以凶也象曰澤上有雷歸妹君子以永終知敝雷震於上澤隨而動陽動於上隂說而從女從男之象也故為歸妹君子觀男女配合生息相續之象而以永其終知有敝也永終謂生息嗣續永久其傳也知敝謂知物有敝壞而為相繼之道也女歸則有生息故有永終之義又夫婦之道當常永有終必知其有敝壞之理而戒慎之敝壞謂離隙歸妹說以動者也異乎恆之㢲而動漸之止而㢲也少女之說情之感動動則失正非夫婦正而可常之道久必敝壞知其必敝則當思永其終也天下之反目者皆不能永終者也不獨夫婦之道天下之事莫不有終有敝莫不有可繼可久之道觀歸妹則當思永終之戒也初九歸妹以娣跛能履征吉女之歸居下而無正應娣之象也剛陽在婦人為賢貞之德而處卑順娣之賢正者也處說居下為順義娣之卑下雖賢何所能為不過自善其身以承助其君而已如跛之能履言不能及逺也然在其分為善故以是而行則吉也象曰歸妹以娣以恆也跛能履吉相承也歸妹之義以說而動非夫婦能常之道九乃剛陽有賢貞之德雖娣之微乃能以常者也雖在下不能有所為如跛者之能履然征而吉者以其能相承助也能助其君娣之吉也九二眇能視利幽人之貞九二陽剛而得中女之賢正者也上有正應而反隂柔之質動於說者也乃女賢而配不良故二雖賢不能自遂以成其內助之功適可以善其身而小施之如眇者之能視而已言不能及逺也男女之際當以正禮五雖不正二自守其幽靜貞正乃所利也二有剛正之德幽靜之人也二之才如是而言利貞者利言宜於如是之貞非不足而為之戒也象曰利幽人之貞未變常也守其幽貞未失夫婦常正之道也世人以媟狎為常故以貞靜為變常不知乃常久之道也六三歸妹以須反歸以娣三居下之上本非賤者以失德而無正應故為欲有歸而未得其歸須待也待者未有所適也六居三不當位德不正也柔而尚剛行不順也為說之主以說求歸動非禮也上無應無受之者也無所適故須也女子之處如是人誰取之不可以為人配矣當反歸而求為娣媵則可也以不正而失其所也象曰歸妹以須未當也未當者其處其德其求歸之道皆不當故無取之者所以須也九四歸妹愆期遲歸有時九以陽居四四上體地之髙也陽剛在女子為正德賢明者也無正應未得其歸也過時未歸故云愆期女子居貴髙之地有賢明之資人情所願娶故其愆期乃為有時蓋自有待非不售也待得佳配而後行也九居四雖不當位而處柔乃婦人之道以無應故為愆期之義而聖人推理以女賢而愆期蓋有待也象曰愆期之志有待而行也所以愆期者由已而不由彼賢女人所願娶所以愆期乃其志欲有所待待得佳配而後行也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉六五居尊位妹之貴髙者也下應於二為下嫁之象王姬下嫁自古而然至帝乙而後正婚姻之禮明男女之分雖至貴之女不得失柔㢲之道有貴驕之志故易中隂尊而謙降者則曰帝乙歸妹泰六五是也貴女之歸唯謙降以從禮乃尊髙之德也不事容飾以說於人也娣媵者以容飾為事者也衣袂所以為容飾也六五尊貴之女尚禮而不尚飾故不袂不及其娣之袂良也良美好也月望隂之盈也盈則敵陽矣幾望未至於盈也五之貴髙常不至於盈極則不亢其夫乃為吉也女之處尊貴之道也象曰帝乙歸妹不如其娣之𬒮良也其位在中以貴行也以帝乙歸妹之道言其𬒮不如其娣之𬒮良尚禮而不尚飾也五以柔中在尊髙之位以尊貴而行中道也柔順降屈尚禮而不尚飾乃中道也上六女承筐無實士刲羊無血無攸利上六女歸之終而無應女歸之無終者也婦者所以承先祖奉祭祀不能奉祭祀則不可以為婦矣筐篚之實婦職所供也古者房中之爼葅歜之類后夫人職之諸侯之祭親割牲卿大夫皆然割取血以祭禮云血祭盛氣也女當承事筐篚而無實無實則無以祭謂不能奉祭祀也夫婦共承宗廟婦不能奉祭祀乃夫不能承祭祀也故刲羊而無血亦無以祭也謂不可以承祭祀也婦不能奉祭祀則當離絶矣是夫婦之無終者也何所往而利哉象曰上六無實承虛筐也筐無實是空筐也空筐可以祭乎言不可以奉祭祀也女不可以承祭祀則離絶而已是女歸之無終者也離下震上豐序卦得其所歸者必大故受之以豐物所歸聚必成其大故歸妹之後受之以豐也豐盛大之義為卦震上離下震動也離明也以明而動動而能明皆致豐之道明足以照動足以亨然後能致豐大也豐亨王假之勿憂宜日中豐為盛大其義自亨極天下之光大者唯王者能至之假至也天位之尊四海之富羣生之衆王道之大極豐之道其唯王者乎豐之時人民之繁庶事物之殷盛治之豈易周為可憂慮宜如日中之盛明廣照無所不及然後無憂也彖曰豐大也明以動故豐豐者盛大之義離明而震動明動相資而成豐大也王假之尚大也王者有四海之廣兆民之衆極天下之大也故豐大之道唯王者能致之所有既大其保之治之之道亦當大也故王者之所尚至大也勿憂宜日中宜照天下也所有既廣所治既衆當憂慮其不能周及宜如日中之盛明普照天下無所不至則可勿憂矣如是然後能保其豐大保有豐大豈小才小知之所能也日中則昃月盈則食天地盈虛與時消息而况于人乎况于鬼神乎既言豐盛之至復言其難常以為誡也日中盛極則當昃昳月既盈滿則有虧缺天地之盈虛尚與時消息况人與鬼神乎盈虛謂盛衰消息謂進退天地之運亦隨時進退也鬼神謂造化之迹於萬物盛衰可見其消息也於豐盛之時而為此誡欲其守中不至過盛處豐之道豈易也哉象曰雷電皆至豐君子以折獄致刑雷電皆至明震並行也二體相合故云皆至明動相資成豐之象離明也照察之象震動也威斷之象折獄者必照其情實唯明克允致刑者以威於姦惡唯斷乃成故君子觀雷電明動之象以折獄致刑也噬嗑言先王飭法豐言君子折獄以明在上而麗於威震王者之事故為制刑立法以明在下而麗於威震君子之用故為折獄致刑旅明在上而云君子者旅取慎用刑與不留獄君子皆當然也初九遇其配主雖旬無咎往有尚雷電皆至成豐之象明動相資致豐之道非明無以照非動無以行相須猶形影相資猶表裏初九明之初九四動之初宜相須以成其用故雖旬而相應位則相應用則相資故初謂四為配主已所配也配雖匹稱然就之者也如配天以配君子故初於四云配四於初云夷也雖旬無咎旬均也天下之相應者常非均敵如隂之應陽柔之從剛下之附上敵則安肯相從唯豐之初四其用則相資其應則相成故雖均是陽剛相從而無過咎也蓋非明則動無所之非動則明無所用相資而成用同舟則胡越一心共難則仇怨協力事勢使然也往而相從則能成其豐故云有尚有可嘉尚也在他卦則不相下而離隙矣象曰雖旬無咎過旬災也聖人因時而處宜隨事而順理夫勢均則不相下者常理也然有雖敵而相資者則相求也初四是也所以雖旬而無咎也與人同而力均者在乎降已以相求協力以從事若懷先已之私有加上之意則患當至矣故曰過旬災也均而先已是過旬也一求勝則不能同矣六二豐其蔀日中見斗往得疑疾有孚發若吉明動相資乃能成豐二為明之主又得中正可謂明者也而五在正應之地隂柔不正非能動者二五雖皆隂而在明動相資之時居相應之地五才不足既其應之才不足資則獨明不能成豐既不能成豐則喪其明功故為豐其蔀日中見斗二至明之才以所應不足與而不能成其豐喪其明功無明功則為昏暗故云見斗斗昏見者也蔀周匝之義用障蔽之物掩晦於明者也斗屬隂而主運乎象五以隂柔而當君位日中盛明之時乃見斗猶豐大之時乃遇柔弱之主斗以昏見言見斗則是明喪而暗矣二雖至明中正之才所遇乃柔暗不正之君既不能下求於已若往求之則反得疑猜忌疾暗主如是也然則如之何而可夫君子之事上也不得其心則盡其至誠以感發其志意而已苟誠意能動則雖昏蒙可開也雖柔弱可輔也雖不正可正也古人之事庸君常主而克行其道者已之誠意上達而君見信之篤耳管仲之相桓公孔明之輔後主是也若能以誠信發其志意則得行其道乃為吉也象曰有孚發若信以發志也有孚發若謂以已之孚信感發上之心志也苟能發則其吉可知雖柔暗有可發之道也九三豐其沛日中見沫折其右肱無咎沛字古本有作斾字者王弼以為幡幔則是斾也幡幔圍蔽於內者豐其沛其暗更甚於蔀也三明體而反暗於四者所應隂暗故也三居明體之上陽剛得正本能明者也豐之道必明動相資而成三應於上上隂柔又無位而處震之終既終則止矣不能動者也他卦至終則極震至終則止矣三無上之應則不能成豐沫星之微小無名數者見沫暗之甚也豐之時而遇上六日中而見沫者也右肱人之所用乃折矣其無能為可知賢智之才遇明君則能有為於天下上無可賴之主則不能有為如人之折其右肱也人之為有所失則有所歸咎曰由是故致是若欲動而無右肱欲為而上無所賴則不能而已更復何言無所歸咎也象曰豐其沛不可大事也折其右肱終不可用也三應於上上應而無位隂柔無勢力而處既終其可共濟大事乎既無所賴如右肱之折終不可用矣九四豐其蔀日中見斗遇其夷主吉四雖陽剛為動之主又得大臣之位然以不中正遇隂暗柔弱之主豈能致豐大也故為豐其蔀蔀周圍掩蔽之物周圍則不大掩蔽則不明日中見斗當盛明之時反昏暗也夷主其等夷也相應故謂之主初四皆陽而居初是其德同又居相應之地故為夷主居大臣之位而得在下之賢同德相輔其助豈小也哉故吉也如四之才得在下之賢為之助則能致豐大乎曰在下者上有當位為之與在上者下有賢才為之助豈無益乎故吉也然而致天下之豐有若而後能也五隂柔居尊而震體無虛中㢲順下賢之象下雖多賢亦將何為蓋非陽剛中正不能致天下之豐也象曰豐其蔀位不當也位不當謂以不中正居髙位所以暗而不能致豐日中見斗幽不明也謂幽暗不能光明君隂柔而臣不中正故也遇其夷主吉行也陽剛相遇吉之行也下就於初故云行下求則為吉也六五來章有慶譽吉五以隂柔之才為豐之主固不能成其豐大若能來致在下章美之才而用之則有福慶復得美譽所謂吉也六二文明中正章美之才也為五者誠能致之在位而委任之可以致豐大之慶名譽之美故吉也章美之才主二而言然初與三四皆陽剛之才五能用賢則彚征矣二雖隂有文明中正之德大賢之在下者也五與二雖非隂陽正應在明動相資之時有相為用之義五若能來章則有慶譽而吉也然六五無虛己下賢之義聖人設此義以為教耳象曰六五之吉有慶也其所謂吉者可以有慶福及于天下也人君雖柔暗若能用賢才則可以為天下之福唯患不能耳上六豐其屋蔀其家窺其户閴其無人三歲不覿凶六以隂柔之質而居豐之極處動之終其滿假躁動甚矣處豐大之時宜乎謙屈而處極髙致豐大之功在乎剛健而體隂柔當豐大之任在乎得時而不當位如上六者處無一當其凶可知豐其屋處太髙也蔀其家居不明也以隂柔居豐大而在無位之地乃髙亢昏暗自絶於人人誰與之故窺其戶閴其無人也至於三歲之久而不知變其凶宜矣不覿謂尚不見人蓋不變也六居卦終有變之義而不能遷是其才不能也象曰豐其屋天際翔也窺其户閴其無人自藏也六處豐大之極在上而自髙若飛翔於天際謂其髙大之甚窺其戶而無人者雖居豐大之極而實無位之地人以其昏暗自髙大故皆棄絶之自藏避而弗與親也艮下離上旅序卦豐大也窮大者必失其居故受之以旅豐盛至於窮極則必失其所安旅所以次豐也為卦離上艮下山止而不遷火行而不居違去而不處之象故為旅也又麗乎外亦旅之象旅小亨旅貞吉以卦才言也如卦之才可以小亨得旅之貞正而吉也彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也六上居五柔得中乎外也麗乎上下之剛順乎剛也下艮止上離麗止而麗於明也柔順而得在外之中所止能麗於明是以小亨得旅之貞正而吉也旅困之時非陽剛中正有助於下不能致大亨也所謂得在外之中中非一揆旅有旅之中也止麗於明則不失時宜然後得處旅之道旅之時義大矣哉天下之事當隨時各適其宜而旅為難處故稱其時義之大象曰山上有火旅君子以明慎用刑而不留獄火之在髙明無不照君子觀明照之象則以明慎用刑明不可恃故戒於慎明而止亦慎象觀火行不處之象則不留獄獄者不得已而設民有罪而入豈可留滯淹久也初六旅瑣瑣斯其所取災六以隂柔在旅之時處於卑下是柔弱之人處旅困而在卑賤所存汚下者也志卑之人既處旅困鄙猥瑣細無所不至乃其所以致悔辱取災咎也瑣瑣猥細之狀當旅困之時才質如是上雖有援無能為也四陽性而離體亦非就下者也又在旅與他卦為大臣之位者異矣象曰旅瑣瑣志窮災也志意窮迫益自取災也災眚對言則有分獨言則謂災患耳六二旅即次懷其資得童僕貞二有柔順中正之德柔順則衆與之中正則處不失當故能保其所有童僕亦盡其忠信雖不若五有文明之德上下之助亦處旅之善者也次舍旅所安也財貨旅所資也童僕旅所賴也得就次舍懷畜其資財又得童僕之貞良旅之善也柔弱在下者童也强壯處外者僕也二柔順中正故得內外之心在旅所親比者童僕也不云吉者旅寓之際得免於災厲則已善矣象曰得童僕貞終無尤也羇旅之人所賴者童僕也既得童僕之忠貞終無尤悔矣九三旅焚其次喪其童僕貞厲處旅之道以柔順謙下為先三剛而不中又居下體之上與艮之上有自髙之象在旅而過剛自髙致困災之道也自髙則不順於上故上不與而焚其次失所安也上離為焚象過剛則暴下故下離而喪其童僕之貞信謂失其心也如此則危厲之道也象曰旅焚其次亦以傷矣以旅與下其義喪也旅焚失其次舍亦以困傷矣以旅之時而與下之道如此義當喪也在旅而以過剛自髙待下必喪其忠貞謂失其心也在旅而失其童僕之心為可危也九四旅于處得其資斧我心不快四陽剛雖不居中而處柔在上體之下有用柔能下之象得旅之宜也以剛明之才為五所與為初所應在旅之善者也然四非正位故雖得其處止不若二之就次舍也有剛明之才為上下所與乃旅而得貨財之資器用之利也雖在旅為善然上無剛陽之與下唯隂柔之應故不能伸其才行其志其心不快也云我者據四而言象曰旅于處未得位也得其資斧心未快也四以近君為當位在旅五不取君義故四為未得位也曰然則以九居四不正為有咎矣曰以剛居柔旅之宜也九以剛明之才欲得時而行其志故雖得資斧於旅為善其心志未快也六五射雉一矢亡終以譽命六五有文明柔順之德處得中道而上下與之處旅之至善者也人之處旅能合文明之道可謂善矣羇旅之人動而或失則困辱隨之動而無失然後為善離為雉文明之物射雉謂取則於文明之道而必合如射雉一矢而亡之發無不中則終能致譽命也譽令聞也命福祿也五居文明之位有文明之德故動必中文明之道也五君位人君無旅旅則失位故不取君義象曰終以譽命上逮也有文明柔順之德則上下與之逮與也能順承於上而上與之為上所逮也言上而得乎下為下所上逮也在旅而上下與之所以致譽命也旅者困而未得所安之時也終以譽命終當致譽命也已譽命則非旅也困而親寡則為旅不必在外也上九鳥焚其巢旅人先笑後號咷喪牛于易凶烏飛騰處髙者也上九剛不中而處最髙又離體其亢可知故取鳥象在旅之時謙降柔和乃可自保而過剛自髙失其所宜安矣巢鳥所安止焚其巢失其所安無所止也在離上為焚象陽剛自處於至髙始快其意故先笑既而失安莫與故號咷輕易以喪其順德所以凶也牛順物喪牛于易謂忽易以失其順也離火性上為躁易之象上承鳥焚其巢故更加旅人字不云旅人則是鳥笑哭也象曰以旅在上其義焚也喪牛于易終莫之聞也以旅在上而以尊髙自處豈能保其居其義當有焚巢之事方以極剛自髙為得志而笑不知喪其順德於躁易是終莫之聞謂終不自聞知也使自覺知則不至於極而號咷矣陽剛不中而處極固有髙亢躁動之象而火復炎上則又甚焉㢲下㢲上㢲序卦旅而無所容故受之以㢲㢲者入也羇旅親寡非㢲順何所取容苟能㢲順雖旅困之中何往而不能入㢲所以次旅也為卦一隂在二陽之下㢲順於陽所以為㢲也㢲小亨利有攸往利見大人卦之才可以小亨利有攸往利見大人也㢲與兌皆剛中正㢲說義亦相類而兌則亨㢲乃小亨者兌陽之為也㢲隂之為也兑柔在外用柔也㢲柔在內性柔也㢲之亨所以小也彖曰重㢲以申命重㢲者上下皆㢲也上順道以出命下奉命而順從上下皆順重㢲之象也又重為重復之義君子體重㢲之義以申復其命令申重復也丁寧之謂也剛㢲乎中正而志行柔皆順乎剛是以小亨以卦才言也陽剛居㢲而得中正㢲順於中正之道也陽性上其志在以中正之道上行也又上下之柔皆㢲順於剛其才如是雖內柔可以小亨也利有攸往利見大人㢲順之道無往不能入故利有攸往㢲順雖善道必知所從能㢲順於陽剛中正之大人則為利故利見大人也如五二之陽剛中正大人也㢲順不於大人未必不為過也象曰隨風㢲君子以申命行事兩風相重隨風也隨相繼之義君子觀重㢲相繼以順之象而以申命令行政事隨與重上下皆順也上順下而出之下順上而從之上下皆順重㢲之義也命令政事順理則合民心而民順從矣初六進退利武人之貞六以隂柔居卑㢲而不中處最下而承剛過於卑㢲者也隂柔之人卑㢲太過則志意恐畏而不安或進或退不知所從其所利在武人之貞若能用武人剛貞之志則為宜也勉為剛貞則無過卑恐畏之失矣象曰進退志疑也利武人之貞志治也進退不知所安者其志疑懼也利用武人之剛貞以立其志則其志治也治謂修立也九二㢲在牀下用史巫紛若吉無咎二居㢲時以陽處隂而在下過於㢲者也牀人之所安㢲在牀下是過於㢲過所安矣人之過於卑㢲非恐怯則諂說皆非正也二實剛中雖㢲體而居柔為過於㢲非有邪心也恭㢲之過雖非正禮可以逺耻辱絶怨咎亦吉道也史巫者通誠意於神明者也紛若多也苟至誠安於謙㢲能使通其誠意者多則吉而無咎謂其誠足以動人也人不察其誠意則以過㢲為諂矣象曰紛若之吉得中也二以居柔在下為過㢲之象而能使通其誠意者衆多紛然由得中也陽居中為中實之象中既誠實則人自當信之以誠意則非諂畏也所以吉而無咎九三頻㢲吝三以陽處剛不得其中又在下體之上以剛亢之質而居㢲順之時非能㢲者勉而為之故屢失也居㢲之時處下而上臨之以㢲又四以柔㢲相親所乘者剛而上復有重剛雖欲不㢲得乎故頻失而頻㢲是可吝也象曰頻㢲之吝志窮也三之才質本非能㢲而上臨之以㢲承重剛而履剛𫝑不得行其志故頻失而頻㢲是其志窮困可吝之甚也六四悔亡田獲三品隂柔無援而承乘皆剛宜有悔也而四以隂居隂得㢲之正在上體之下居上而能下也居上之下㢲於上也以㢲臨下㢲於下也善處如此故得悔亡所以得悔亡以如田之獲三品也田獲三品及於上下也田獵之獲分三品一為乾豆一供賓客與充庖一頒徒御四能㢲於上下之陽如田之獲三品謂遍及上下也四之地本有悔以處之至善故悔亡而復有功天下之事苟善處則悔或可以為功也象曰田獲三品有功也㢲於上下如田之獲三品而遍及上下成㢲之功也九五貞吉悔亡無不利無初有終先庚三日後庚三日吉五居尊位為㢲之主命令之所出也處得中正盡㢲之善然㢲者柔順之道所利在貞非五之不足在㢲當戒也既貞則吉而悔亡無所不利貞正中也處㢲出令皆以中正為吉柔㢲而不貞則有悔安能無所不利也命令之出有所變更也無初始未善也有終更之使善也若已善則何用命也何用更也先庚三日後庚三日吉出命更改之道當如是也甲者事之端也庚者變更之始也十干戊己為中過中則變故謂之庚事之改更當原始要終如先甲後甲之義如是則吉也解在蠱卦象曰九五之吉位正中也九五之吉以處正中也得正中之道則吉而其悔亡也正中謂不過無不及正得其中也處柔㢲與出命令唯得中為善失中則悔也上九㢲在牀下喪其資斧貞凶牀人所安也在牀下過所安之義也九居㢲之極過於㢲者也資所有也斧以斷也陽剛本有斷以過㢲而失其剛斷失其所有喪資斧也居上而過㢲至於自失在正道為凶也象曰㢲在牀下上窮也喪其資斧正乎凶也㢲在牀下過於㢲也處卦之上㢲至於窮極也居上而過極於㢲至於自失得為正乎乃凶道也㢲本善行故疑之曰得為正乎復斷之曰乃凶也兌下兌上兌序卦㢲者入也入而後說之故受之以兌兌者說也物相入則相說相說則相入兌所以次㢲也兌亨利貞兌說也說致亨之道也能說於物物莫不說而與之足以致亨然為說之道利於貞正非道求說則為邪諂而有悔咎故戒利貞也彖曰兌說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉兌之義說也一隂居二陽之上隂說於陽而為陽所說也陽剛居中中心誠實之象柔爻在外接物和柔之象故為說而能貞也利貞說之道宜正也卦有剛中之德能貞者也說而能貞是以上順天理下應人心說道之至正至善者也若夫違道以干百姓之譽者苟說之道違道不順天干譽非應人苟取一時之說耳非君子之正道君子之道其說於民如天地之施感於其心而說服無斁故以之先民則民心說隨而忘其勞率之以犯難則民心說服於義而不恤其死說道之大民莫不知勸勸謂信之而勉力順從人君之道以人心說服為本故聖人贊其大象曰麗澤兌君子以朋友講習麗澤二澤相附麗也兩澤相麗交相浸潤互有滋益之象故君子觀其象而以朋友講習朋友講習互相益也先儒謂天下之可說莫如朋友講習朋友講習固可說之大者然當明相益之象初九和兌吉初雖陽爻居說體而在最下無所繫應是能卑下和順以為說而無所偏私者也以和為說而無所偏私說之正也陽剛則不卑居下則能㢲處說則能和無應則不偏處說如是所以吉也象曰和兌之吉行未疑也有求而和則涉於邪諂初隨時順處心無所繫無所為也以和而已是以吉也象又以其處說在下而非中正故云行未疑也其行未有可疑謂未見其有失也若得中正則無是言也說以中正為本爻直陳其義象則推而盡之九二孚兌吉悔亡二承比隂柔隂柔小人也說之則當有悔二剛中之德孚信內充雖比小人自守不失君子和而不同說而不失剛中故吉而悔亡非二之剛中則有悔矣以自守而亡也象曰孚兌之吉信志也心之所存為志二剛實居中孚信存於中也志存誠信豈至說小人而自失乎是以吉也六三來兌凶六三隂柔不中正之人說不以道者也來兌就之以求說也比於在下之陽枉已非道就以求說所以凶也之內為來上下俱陽而獨之內者以同體而隂性下也失道下行也象曰來兌之凶位不當也自處不中正無與而妄求說所以凶也九四商兌未寧介疾有喜四上承中正之五而下比柔邪之三雖剛陽而處非正三隂柔陽所說也故不能決而商度未寧謂擬議所從而未決未能有定也兩間謂之介分限也地之界則加田義乃同也故人有節守謂之介若介然守正而疾逺邪惡則有喜也從五正也說三邪也四近君之位若剛介守正疾逺邪惡將得君以行道福慶及物為有喜也若四者得失未有定繫所從耳象曰九四之喜有慶也所謂喜者若守正而君說之則得行其剛陽之道而福慶及物也九五孚于剝有厲九五得尊位而處中正盡說道之善矣而聖人復設有厲之戒蓋堯舜之盛未嘗無戒也戒所當戒而已雖聖賢在上天下未嘗無小人然不敢肆其惡也聖人亦說其能勉而革靣也彼小人者未嘗不知聖賢之可說也如四凶處堯朝隱惡而順命是也聖人非不知其終惡也取其畏罪而强仁耳五若誠心信小人之假善為實善而不知其包藏則危道也小人者備之不至則害於善聖人為戒之意深矣剝者消陽之名隂消陽者也蓋指上六故孚于剝則危也以五在說之時而密比於上六故為之戒雖舜之聖且畏巧言令色安得不戒也說之惑人易入而可懼也如此象曰孚于剝位正當也戒孚于剝者以五所處之位正當戒也密比隂柔有相說之道故戒在信之也上六引兌他卦至極則變兌為說極則愈說上六成說之主居說之極說不知已者也故說既極矣又引而長之然而不至悔咎何也曰方言其說不知己未見其所說善惡也又下乘九五之中正無所施其邪說六三則承乘皆非正是以有凶象曰上六引兌未光也說既極矣又引而長之雖說之之心不已而事理已過實無所說事之盛則有光輝既極而强引之長其無意味甚矣豈有光也未非必之辭象中多用非必能有光輝謂不能光也坎下㢲上渙序卦兌者說也說而後散之故受之以渙說則舒散也人之氣憂則結聚說則舒散故說有散義渙所以繼兌也為卦㢲上坎下風行於水上水遇風則渙散所以為渙也渙亨王假有廟利涉大川利貞渙離散也人之離散由乎中人心離則散矣治乎散亦本於中能收合人心則散可聚也故卦之義皆主於中利貞合渙散之道在乎正固也彖曰渙亨剛來而不窮柔得位乎外而上同渙之能亨者以卦才如是也渙之成渙由九來居二六上居四也剛陽之來則不窮極於下而處得其中柔之往則得正位於外而上同於五之中㢲順於五乃上同也四五君臣之位當渙而比其義相通同五乃從中也當渙之時而守其中則不至於離散故能亨也王假有廟王乃在中也王假有廟之義在萃卦詳矣天下離散之時王者收合人心至於有廟乃是在其中也在中謂求得其中攝其心之謂也中者心之象剛來而不窮柔得位而上同卦才之義皆主於中也王者拯渙之道在得其中而已孟子曰得其民有道得其心斯得民矣享帝立廟民心所歸從也歸人心之道無大於此故云至于有廟拯渙之道極於此也利涉大川乘木有功也治渙之道當濟於險難而卦有乘木濟川之象上㢲木也下坎水大川也利涉險以濟渙也木在水上乘木之象乘木所以涉川也涉則有濟渙之功卦有是義有是象也象曰風行水上渙先王以享于帝立廟風行水上有渙散之象先王觀是象救天下之渙散至于享帝立廟也收合人心無如宗廟祭祀之報出于其心故享帝立廟人心之所歸也繫人心合離散之道無大於此初六用拯馬壯吉六居卦之初渙之始也始渙而拯之又得馬壯所以吉也六爻獨初不云渙者離散之𫝑辨之宜早方始而拯之則不至於渙也為教深矣馬人之所託也託於壯馬故能拯渙馬謂二也二有剛中之才初隂柔順兩皆無應無應則親比相求初之柔順而託於剛中之才以拯其渙如得壯馬以致逺必有濟矣故吉也渙拯於始為力則易時之順也象曰初六之吉順也初之所以吉者以其能順從剛中之才也始渙而用拯能順乎時也九二渙奔其機悔亡諸爻皆云渙謂渙之時也在渙離之時而處險中其有悔可知若能奔就所安則得悔亡也機者俯慿以為安者也俯就下也奔急往也二與初雖非正應而當渙離之時兩皆無與以隂陽親比相求則相賴者也故二目初為機初謂二為馬二急就於初以為安則能亡其悔矣初雖坎體而不在險中也或疑初之柔微何足賴蓋渙之時合力為勝先儒皆以五為機非也方渙離之時二陽豈能同也若能同則成濟渙之功當大豈止悔亡而已機謂俯就也象曰渙奔其機得願也渙散之時以合為安二居險中急就於初求安也賴之如機而亡其悔乃得所願也六三渙其躬無悔三在渙時獨有應與無渙散之悔也然以隂柔之質不中正之才上居無位之地豈能拯時之渙而及人也止於其身可以無悔而已上加渙字在渙之時躬無渙之悔也象曰渙其躬志在外也志應於上在外也與上相應故其身得免於渙而無悔悔亡者本有而得亡無悔者本無也六四渙其羣元吉渙有丘匪夷所思渙四五二爻義相須故通言之彖故曰上同也四㢲順而正居大臣之位五剛中而正居君位君臣合力剛柔相濟以拯天下之渙者也方渙散之時用剛則不能使之懷附用柔則不足為之依歸四以巽順之正道輔剛中正之君君臣同功所以能濟渙也天下渙散而能使之羣聚可謂大善之吉也渙有丘匪夷所思贊美之辭也丘聚之大也方渙散而能致其大聚其功甚大其事甚難其用至妙夷平常也非平常之見所能思及也非大賢智孰能如是象曰渙其羣元吉光大也稱元吉者謂其功德光大也元吉光大不在五而在四者二爻之義通言也於四言其施用於五言其成功君臣之分也九五渙汗其大號渙王居無咎五與四君臣合德以剛中正㢲順之道治渙得其道矣唯在浹洽於人心則順從也當使號令洽於民心如人身之汗浹於四體則信服而從矣如是則可以濟天下之渙居王位為稱而無咎大號大政令也謂新民之大命救渙之大政再云渙者上謂渙之時下謂處渙如是則無咎也在四已言元吉五唯言稱其位也渙之四五通言者渙以離散為害拯之使合也非君臣同功合力其能濟乎爻義相須時之宜也象曰王居無咎正位也王居謂正位人君之尊位也能如五之為則居尊位為稱而無咎也上九渙其血去逖出無咎渙之諸爻皆無繫應亦渙離之象惟上應於三三居險陷之極上若下從於彼則不能出於渙也險有傷害畏懼之象故云血惕然九以陽剛處渙之外有出渙之象乂居㢲之極為能㢲順於事理故云若能使其血去其惕出則無咎也其者所有也渙之時以能合為功獨九居渙之極有繫而臨險故以能出渙逺害為善也象曰渙其血逺害也若如象文為渙其血乃與屯其膏同也義則不然蓋血字下脫去字血去惕出謂能逺害則無咎也兌下坎上節序卦渙者離也物不可以終離故受之以節物既離散則當節止之節所以次渙也為卦澤上有水澤之容有限澤上置水滿則不容為有節之象故為節節亨苦節不可貞事既有節則能致亨通故節有亨義節貴適中過則苦矣節至於苦豈能常也不可固守以為常不可貞也彖曰節亨剛柔分而剛得中節之道自有亨義事有節則能亨也又卦之才剛柔分處剛得中而不過亦所以為節所以能亨也苦節不可貞其道窮也節至於極而苦則不可堅固常守其道已窮極也說以行險當位以節中正以通以卦才言也內兌外坎說以行險也人於所說則不知已遇艱險則思止方說而止為節之義當位以節五居尊當位也在澤上有節也當位而以節主節者也處得中正節而能通也中正則通過則苦矣天地節而四時成節以制度不傷財不害民推言節之道天地有節故能成四時無節則失序也聖人立制度以為節故能不傷財害民人欲之無窮也苟非節以制度則侈肆至於傷財害民矣象曰澤上有水節君子以制數度議德行澤之容水有限過則盈溢是有節故為節也君子觀節之象以制立數度凡物之大小輕重髙下文質皆有數度所以為節也數多寡度法制議德行者存諸中為德發於外為行人之德行當義則中節議謂商度求中節也初九不出戶庭無咎戶庭戶外之庭門庭門內之庭初以陽在下上復有應非能節者也又當節之初故戒之謹守至於不出戶庭則無咎也初能固守終或渝之不謹於初安能有卒故於節之初為戒甚嚴也象曰不出戶庭知通塞也爻辭於節之初戒之謹守故云不出戶庭則無咎也象恐人之泥於言也故復明之云雖當謹守不出戶庭又必知時之通塞也通則行塞則止義當出則出矣尾生之信水至不去不知通塞也故君子貞而不諒繫辭所解獨以言者在人所節唯言與行節於言則行可知言當在先也九二不出門庭凶二雖剛中之質然處陰居說而承柔處隂不正也居說失剛也承柔近邪也節之道當以剛中正二失其剛中之德與九五剛中正異矣不出門庭不之於外也謂不從於五也二五非陰陽正應故不相從若以剛中之道相合則可以成節之功唯其失德失時是以凶也不合於五乃不正之節也以剛中正為節如懲忿窒欲捐過抑有餘是也不正之節如嗇節於用懦節於行是也象曰不出門庭凶失時極也不能上從九五剛中正之道成節之功乃繫於私昵之陰柔是失時之至極所以凶也失時失其所宜也六三不節若則嗟若無咎六三不中正乘剛而臨險固宜有咎然柔順而和說若能自節而順於義則可以無過不然則凶咎必至可傷嗟也故不節若則嗟若己所自致無所歸咎也象曰不節之嗟又誰咎也節則可以免過而不能自節以致可嗟將誰咎乎六四安節亨四順承九五剛中正之道是以中正為節也以陰居陰安於正也當位為有節之象下應於初四坎體水也水上溢為無節就下有節也如四之義非强節之安於節者也故能致亨節以安為善强守而不安則不能常豈能亨也象曰安節之亨承上道也四能安節之義非一象獨舉其重者上承九五剛中正之道以為節足以亨矣餘善亦不出於中正也九五甘節吉往有尚九五剛中正居尊位為節之主所謂當位以節中正以通者也在已則安行天下則說從節之甘美者也其吉可知以此而行其功大矣故往則有可嘉尚也象曰甘節之吉居位中也既居尊位又得中道所以吉而有功節以中為貴得中則正矣正不能盡中也上六苦節貞凶悔亡上六居節之極節之苦者也居險之極亦為苦義固守則凶悔則凶亡悔捐過從中之謂也節之悔亡與他卦之悔亡辭同而義異也象曰苦節貞凶其道窮也節既苦而貞固守之則凶蓋節之道至於窮極矣兌下㢲上中孚序卦節而信之故受之以中孚節者為之制節使不得過越也信而後能行上能信守之下則信從之節而信之也中孚所以次節也為卦澤上有風風行澤上而感于水中為中孚之象感謂感而動也內外皆實而中虛為中孚之象又二五皆陽中實亦為孚義在二體則中實在全體則中虛中虛信之本中實信之質中孚豚魚吉利涉大川利貞豚躁魚冥物之難感者也孚信能感於豚魚則無不至矣所以吉也忠信可以蹈水火况涉川乎守信之道在乎堅正故利於貞也象曰中孚柔在內而剛得中二柔在內中虛為誠之象二剛得上下體之中中實為孚之象卦所以為中孚也說而㢲孚乃化邦也以二體言卦之用也上㢲下說為上至誠以順㢲於下下有孚以說從其上如是其孚乃能化於邦國也若人不說從或違拂事理豈能化天下乎豚魚吉信及豚魚也信能及於豚魚信道至矣所以吉也利涉大川乘木舟虛也以中孚涉險難其利如乘木濟川而以虛舟也舟虛則無沉覆之患卦虛中為虛舟之象中孚以利貞乃應乎天也中孚而貞則應乎天矣天之道孚貞而已象曰澤上有風中孚君子以議獄緩死澤上有風感于澤中水體虛故風能入之人心虛故物能感之風之動乎澤猶物之感于中故為中孚之象君子觀其象以議獄與緩死君子之於議獄盡其忠而已於決死極於惻而已故誠意常求於緩緩寬也於天下之事無所不盡其忠而議獄緩死最其大者也初九虞吉有他不燕九當中孚之初故戒在審其所信虞度也度其可信而後從也雖有至信苦不得其所則有悔咎故虞度而後信則吉也既得所信則當誠一若有他則不得其燕安矣燕安裕也有他志不定也人志不定則惑而不安初與四為正應四㢲體而居正無不善也爻以謀始之義大故不取相應之義若用應則非虞也象曰初九虞吉志未變也當信之始志未有所從而虞度所信則得其正是以吉也蓋其志未有變動志有所從則是變動虞之不得其正矣在初言求所信之道也九二鳴鶴在陰其子和之我有好爵吾與爾靡之二剛實中孚之至者也孚至則能感通鶴鳴於幽隱之處不聞也而其子相應和中心之願相通也好爵我有而彼亦繫慕說好爵之意同也有孚於中物無不應誠同故也至誠無逺近幽深之間故繫辭云善則千里之外應之不善則千里之外違之言誠通也至誠感通之理知道者為能識之象曰其子和之中心願也中心願謂誠意所願也故通而相應六三得敵或鼓或罷或泣或歌敵對敵也謂所交孚者正應上九是也三四皆以虛中為成孚之主然所處則異四得位居正故亡匹以從上三不中失正故得敵以纍志以柔說之質既有所繫唯所信是從或鼓張或罷廢或悲泣或歌樂動息憂樂皆繫乎所信也唯繫所信故未知吉凶然非明達君子之所為也象曰或鼓或罷位不當也居不當位故無所主唯所信是從所處得正則所信有方矣六四月幾望馬匹亡無咎四為成孚之主居近君之位處得其正而上信之至當孚之任者也如月之幾望盛之至也已望則敵矣臣而敵君禍敗必至故以幾望為至盛馬匹亡四與初為正應匹也古者駕車用四馬不能備純色則兩服兩驂各一色又小大必相稱故兩馬為匹謂對也馬者行物也初上應四而四亦進從五皆上行故以馬為象孚道在一四既從五若復下繫於初則不一而害於孚為有咎矣故馬匹亡則無咎也上從五而不繫於初是亡其匹也繫初則不進不能成孚之功也象曰馬匹亡絶類上也絶其類而上從五也類謂應也九五有孚攣如無咎五居君位人君之道當以至誠感通天下使天下之心信之固結如拘攣然則為無咎也人君之孚不能使天下固結如是則億兆之心安能保其不離乎象曰有孚攣如位正當也五居君位之尊由中正之道能使天下信之如拘攣之固乃稱其位人君之道當如是也上九翰音登于天貞凶翰音者音飛而實不從處信之終信終則衰忠篤內喪華美外揚故云翰音登天正亦滅矣陽性上進風體飛揚九居中孚之時處於最上孚於上進而不知止者也其極至於羽翰之音登聞於天貞固於此而不知變凶可知矣夫子曰好信不好學其蔽也賊固守而不通之謂也象曰翰音登于天何可長也守孚至於窮極而不知變豈可長久也固守而不通如是則凶也艮下震上小過序卦有其信者必行之故受之以小過人之所信則必行行則過也小過所以繼中孚也為卦山上有雷雷震於髙其聲過常故為小過又陰居尊位陽失位而不中小者過其常也蓋為小者過又為小事過又為過之小小過亨利貞過者過其常也若矯枉而過正過所以就正也事有時而當然有待過而後能亨者故小過自有亨義利貞者過之道利於貞也不失時宜之謂正可小事不可大事飛鳥遺之音不宜上宜下大吉過所以求就中也所過者小事也事之大者豈可過也於大過論之詳矣飛鳥遺之音謂過之不逺也不宜上宜下謂宜順也順則大吉過以就之蓋順理也過而順理其吉必大彖曰小過小者過而亨也陽大陰小陰得位剛失位而不中是小者過也故為小事過過之小小者與小事有時而當過過之亦小故為小過事固有待過而後能亨者過之所以能亨也過以利貞與時行也過而利於貞謂與時行也時當過而過乃非過也時之宜也乃所謂正也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉小過之道於小事有過則吉者而彖以卦才言吉義柔得中二五居中也陰柔得位能致小事吉耳不能濟大事也剛失位而不中是以不可大事大事非剛陽之才不能濟三不中四失位是以不可大事小過之時自不可大事而卦才又不堪大事與時合也有飛鳥之象焉此一句不類彖體蓋解者之辭誤入彖中中剛外柔飛鳥之象卦有此象故就飛鳥為義飛鳥遺之音不宜上宜下大吉上逆而下順也事有時而當過所以從宜然豈可甚過也如過恭過哀過儉大過則不可所以在小過也所過當如飛鳥之遺音鳥飛迅疾聲出而身已過然豈能相逺也事之當過者亦如是身不能甚逺於聲事不可逺過其常在得宜耳不宜上宜下更就鳥音取宜順之義過之道當如飛鳥之遺音夫聲逆而上則難順而下則易故在髙則大山上有雷所以為過也過之道順行則吉如飛鳥之遺音宜順也所以過者為順乎宜也能順乎宜所以大吉象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉雷震於山上其聲過常故為小過天下之事有時當過而不可過甚故為小過君子觀小過之象事之宜過者則勉之行過乎恭喪過乎哀用過乎儉是也當過而過乃其宜也不當過而過則過矣初六飛鳥以凶初六陰柔在下小人之象又上應於四四復動體小人躁易而上有應助於所當過必至過甚况不當過而過乎其過如飛鳥之迅疾所以凶也躁疾如是所以過之速且逺救止莫及也象曰飛鳥以凶不可如何也其過之疾如飛鳥之迅豈容救止也凶其宜矣不可如何無所用其力也六二過其祖遇其妣不及其君遇其臣無咎陽之在上者父之象尊於父者祖之象四在三上故為祖二與五居相應之地同有柔中之德志不從於三四故過四而遇五是過其祖也五陰而尊祖妣之象與二同德相應在他卦則陰陽相求過之時必過其常故異也無所不過故二從五亦戒其過不及其君遇其臣謂上進而不陵及於君適當臣道則無咎也遇當也過臣之分則其咎可知象曰不及其君臣不可過也過之時事無不過其常故於上進則戒及其君臣不可過臣之分也九三弗過防之從或戕之凶小過陰過陽失位之時三獨居正然在下無所能為而為陰所忌惡故有當過者在過防於小人若弗過防之則或從而戕害之矣如是則凶也三於陰過之時以陽居剛過於剛也既戒之過防則過剛亦在所戒矣防小人之道正已為先三不失正故無必凶之義能過防則免矣三居下之上居上為下皆如是也象曰從或戕之凶如何也陰過之時必害於陽小人道盛必害君子當過為之防防之不至則為其所戕矣故曰凶如何也言其甚也九四無咎弗過遇之往厲必戒勿用永貞四當小過之時以剛處柔剛不過也是以無咎既弗過則合其宜矣故云遇之謂得其道也若往則有危必當戒懼也往去柔而以剛進也勿用永貞陽性堅剛故戒以隨宜不可固守也方陰過之時陽剛失位則君子當隨時順處不可固守其常也四居髙位而無上下之交雖比五應初方陰過之時彼豈肯從陽也故往則有厲象曰弗過遇之位不當也往厲必戒終不可長也位不當謂處柔九四當過之時不過剛而反居柔乃得其宜故曰遇之遇其宜也以九居四位不當也居柔乃遇其宜也當陰過之時陽退縮自保足矣終豈能長而盛也故往則有危必當戒也長上聲作平聲則大失易意以夬與剝觀之可見與夬之象文同而音異也六五密雲不雨自我西郊公弋取彼在穴五以陰柔居尊位雖欲過為豈能成功如密雲而不能成雨所以不能成雨自西郊故也陰不能成雨小畜卦中已解公弋取彼在穴弋射取之也射止是射弋有取義穴山中之空中虛乃空也在穴指六二也五與二本非相應乃弋而取之五當位故云公謂公上也同類相取雖得之兩陰豈能濟大事乎猶密雲之不能成雨也象曰密雲不雨已上也陽降陰升合則和而成雨陰已在上雲雖密豈能成雨乎陰過不能成大之義也上六弗遇過之飛鳥離之凶是謂災眚六陰而動體處過之極不與理遇動皆過之其違理過常如飛鳥之迅速所以凶也離過之逺也是謂災眚是當有災眚也災者天殃眚者人為既過之極豈唯人眚天災亦至其凶可知天理人事皆然也象曰弗遇過之已亢也居過之終弗遇於理而過之過已亢極其凶宜也離下坎上既濟序卦有過物者必濟故受之以既濟能過於物必可以濟故小過之後受之以既濟也為卦水在火上水火相交則為用矣各當其用故為既濟天下萬事已濟之時也既濟亨小利貞初吉終亂既濟之時大者既已亨矣小者尚有亨也雖既濟之時不能無小未亨也小字在下語當然也若言小亨則為亨之小也利貞處既濟之時利在貞固以守之也初吉方濟之時也終亂濟極則反也彖曰既濟亨小者亨也利貞剛柔正而位當也既濟之時大者固已亨矣唯有小者亨也時既濟矣固宜貞固以守之卦才剛柔正當其位當位者其常也乃正固之義利於如是之貞也陰陽各得正位所以為既濟也初吉柔得中也二以柔順文明而得中故能成既濟之功二居下體方濟之初也而又善處是以吉也終止則亂其道窮也天下之事不進則退無一定之理濟之終不進而止矣無常止也衰亂至矣蓋其道已窮極也九五之才非不善也時極道窮理當必變也聖人至此奈何曰唯聖人為能通其變於未窮不使至於極也堯舜是也故有終而無亂象曰水在火上既濟君子以思患而豫防之水火既交各得其用為既濟時當既濟唯慮患害之生故思而豫防使不至於患也自古天下既濟而致禍亂者蓋不能思患而豫防也初九曳其輪濡其尾無咎初以陽居下上應於四又火體其進之志鋭也然時既濟矣進不已則及於悔咎故曳其輪濡其尾乃得無咎輪所以行倒曳之使不進也獸之涉水必揭其尾濡其尾則不能濟方既濟之初能止其進乃得無咎不知已則至於咎也象曰曳其輪義無咎也既濟之初而能止其進則不至於極其義自無咎也六二婦喪其茀勿逐七日得二以文明中正之德上應九五剛陽中正之君宜得行其志也然五既得尊位時已既濟無復進而有為矣則於在下賢才豈有求用之意故二不得遂其行也自古既濟而能用人者鮮矣以唐太宗之用言尚怠於終况其下者乎於斯時也則剛中反為中滿坎離乃為相戾矣人能識時知變則可以言易矣二陰也故以婦言茀婦人出門以自蔽者也喪其茀則不可行矣二不為五之求用則不得行如婦之喪茀也然中正之道豈可廢也時過則行矣逐者從物也從物則失其素守故戒勿逐自守不失則七日當復得也卦有六位七則變矣七日得謂時變也雖不為上所用中正之道無終廢之理不得行於今必行於異時也聖人之勸戒深矣象曰七日得以中道也中正之道雖不為時所用然無終不行之理故喪茀七日當復得謂自守其中異時必行也不失其中則正矣九三髙宗伐鬼方三年克之小人勿用九三當既濟之時以剛居剛用剛之至也既濟而用剛如是乃髙宗伐鬼方之事髙宗必商之髙宗天下之事既濟而逺伐暴亂也威武可及而以救民為心乃王者之事也唯聖賢之君則可若騁威武忿不服貪土地則殘民肆欲也故戒不可用小人小人為之則以貪忿私意也非貪忿則莫肯為也三年克之見其勞憊之甚聖人因九三當既濟而用剛發此義以示人為法為戒豈淺見所能及也象曰三年克之憊也言憊以見其事之至難在髙宗為之則可無髙宗之心則貪忿以殃民也六四繻有衣袽終日戒四在濟卦而水體故取舟為義四近君之位當其任者也當既濟之時以防患慮變為急繻當作濡謂滲漏也舟有罅漏則塞以衣袽有衣袽以備濡漏又終日戒懼不怠慮患當如是也不言吉方免於患也既濟之時免患則足矣豈復有加也象曰終日戒有所疑也終日戒懼常疑患之將至也處既濟之時當畏慎如是也九五東鄰殺牛不如西鄰之禴祭實受其福五中實孚也二虛中誠也故皆取祭祀為義東鄰陽也謂五西鄰陰也謂二殺牛盛祭也禴薄祭也盛不如薄者時不同也二五皆有孚誠中正之德二在濟下尚有進也故受福五處濟極無所進矣以至誠中正守之苟未至於反耳理無極而終不反者也已至於極雖善處無如之何矣故爻象唯言其時也象曰東鄰殺牛不如西鄰之時也實受其福吉大來也五之才德非不善不如二之時也二在下有進之時故中正而孚則其吉大來所謂受福也吉大來者在既濟之時為大來也亨小初吉是也上六濡其首厲既濟之極固不安而危也又陰柔處之而在險體之上坎為水濟亦取水義故言其窮至於濡首危可知也既濟之終而小人處之其敗壞可立而待也象曰濡其首厲何可久也既濟之窮危至於濡首其能長久乎坎下離上未濟序卦物不可窮也故受之以未濟終焉既濟矣物之窮也物窮而不變則無不已之理易者變易而不窮也故既濟之後受之以未濟而終焉未濟則未窮也未窮則有生生之義為卦離上坎下火在水上不相為用故為未濟未濟亨小狐汔濟濡其尾無攸利未濟之時有亨之理而卦才復有致亨之道唯在慎處狐能度水濡尾則不能濟其老者多疑畏故履氷而聽懼其陷也小者則未能畏慎故勇於濟汔當為仡壯勇之狀書曰仡仡勇夫小狐果於濟則濡其尾而不能濟也未濟之時求濟之道當至慎則能亨若如小狐之果則不能濟也既不能濟無所利矣彖曰未濟亨柔得中也以卦才言也所以能亨者以柔得中也五以柔居尊位居剛而應剛得柔之中也剛柔得中處未濟之時可以亨也小狐汔濟未出中也據二而言也二以剛陽居險中將濟者也又上應於五險非可安之地五有當從之理故果於濟如小狐也既果於濟故有濡尾之患未能出於險中也濡其尾無攸利不續終也其進鋭者其退速始雖勇於濟不能繼續而終之無所往而利也雖不當位剛柔應也雖陰陽不當位然剛柔皆相應當未濟而有與若能重慎則有可濟之理二以汔濟故濡尾也卦之諸爻皆不得位故為未濟雜卦云未濟男之窮也謂三陽皆失位也斯義也聞之成都隱者象曰火在水上未濟君子以慎辨物居方水火不交不相濟為用故為未濟火在水上非其處也君子觀其處不當之象以慎處於事物辨其所當各居其才謂止於其所也初六濡其尾吝六以陰柔在下處險而應四處險則不安其居有應則志行於上然已既陰柔而四非中正之才不能援之以濟也獸之濟水必揭其尾尾濡則不能濟濡其尾言不能濟也不度其才力而進終不能濟可羞吝也象曰濡其尾亦不知極也不度其才力而進至於濡尾是不知之極也九二曳其輪貞吉在他卦九居二為居柔得中無過剛之義也於未濟聖人深取卦象以為戒明事上恭順之道未濟者君道艱難之時也五以柔處君位而二乃剛陽之才而居相應之地當用者也剛有陵柔之義水有勝火之象方艱難之時所賴者才臣耳尤當盡恭順之道故戒曳其輪則得正而吉也倒曳其輪殺其𫝑緩其進戒用剛之過也剛過則好犯上而順不足唐之郭子儀李晟當艱危未濟之時能極其恭順所以為得正而能保其終吉也於六五則言其貞吉光輝盡君道之善於九二則戒其恭順盡臣道之正盡上下之道也象曰九二貞吉中以行正也九二得正而吉者以曳輪而得中道乃正也六三未濟征凶利涉大川未濟征凶謂居險無出險之用而行則凶也必出險而後可征三以陰柔不中正之才而居險不足以濟未有可濟之道出險之用而征所以凶也然未濟有可濟之道險終有出險之理上有剛陽之應若能涉險而往從之則濟矣故利涉大川也然三之陰柔豈能出險而往非時不可才不能也象曰未濟征凶位不當也三征則凶者以位不當也謂陰柔不中正無濟險之才也若能涉險以從應則利矣九四貞吉悔亡震用伐鬼方三年有賞于大國九四陽剛居大臣之位上有虛中明順之主又已出於險未濟已過中矣有可濟之道也濟天下之艱難非剛健之才不能也九雖陽而居四故戒以貞固則吉而悔亡不貞則不能濟有悔者也震動之極也古之人用力之甚者伐鬼方也故以為義力勤而逺伐至于三年然後成功而行大國之賞必如是乃能濟也濟天下之道當貞固如是四居柔故設此戒象曰貞吉悔亡志行也如四之才與時合而加以貞固則能行其志吉而悔亡鬼方之伐貞之至也六五貞吉無悔君子之光有孚吉五文明之主居剛而應剛其處得中虛其心而陽為之輔雖以柔居尊處之至正至善無不足也既得貞正故吉而無悔貞其固有非戒也以此而濟無不濟也五文明之主故稱其光君子德輝之盛而功實稱之有孚也上云吉以貞也柔而能貞德之吉也下云吉以功也既光而有孚時可濟也象曰君子之光其暉吉也光盛則有暉暉光之散也君子積充而光盛至于有暉善之至也故重云吉上九有孚于飲酒無咎濡其首有孚失是九以剛在上剛之極也居明之上明之極也剛極而能明則不為躁而為決明能燭理剛能斷義居未濟之極非得濟之位無可濟之理則當樂天順命而已若否終則有傾時之變也未濟則無極而自濟之理故止為未濟之極至誠安於義命而自樂則可無咎飲酒自樂也不樂其處則忿躁隕穫入於凶咎矣若從樂而耽肆過禮至濡其首亦非能安其處也有孚自信于中也失是失其宜也如是則於有孚為失也人之處患難知其無可奈何而放意不反者豈安於義命者哉象曰飲酒濡首亦不知節也飲酒至於濡首不知節之甚也所以至如是不能安義命也能安則不失其常矣伊川易傳卷四
